<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION PRO | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .card-pro { background: #0d1117; border: 1px solid #30363d; border-radius: 20px; transition: all 0.3s; }
        .squad-view { max-height: 0; overflow: hidden; transition: all 0.6s cubic-bezier(0, 1, 0, 1); opacity: 0; }
        .squad-view.open { max-height: 3000px; opacity: 1; padding: 20px; border-top: 1px solid #1f2937; }
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 8px; display: inline-block !important; }
        .badge-c { background: #f1c40f !important; color: #000 !important; box-shadow: 0 0 10px #f1c40f55; }
        .badge-vc { background: #94a3b8 !important; color: #000 !important; }
        .podium-base { background: linear-gradient(180deg, #161b22 0%, #05070a 100%); border-top: 2px solid #30363d; }
        .fire-pulse { animation: fire 1.5s infinite; }
        @keyframes fire { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-20">
        <div class="mb-8 bg-yellow-500/5 border border-yellow-500/20 rounded-full py-2 px-6 flex justify-between items-center">
            <span class="text-[10px] font-black gold-glow animate-pulse uppercase tracking-widest">Live: KKR vs SRH</span>
            <span id="last-update" class="text-[9px] text-gray-600 font-bold uppercase">Syncing...</span>
        </div>

        <header class="text-center mb-10">
            <h1 class="text-4xl font-black font-cyber gold-glow italic tracking-tighter">REVOLUTION PRO</h1>
        </header>

        <div id="podium-area" class="flex justify-center items-end gap-2 mb-10 h-44"></div>
        <div id="leaderboard"></div>
        <div id="unsold-section"></div>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;
        const rosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Roster`;

        async function updateData() {
            try {
                const [lbRes, pcRes, rosRes] = await Promise.all([
                    fetch(lbUrl + '&t=' + Date.now()), fetch(pcUrl + '&t=' + Date.now()), fetch(rosUrl + '&t=' + Date.now())
                ]);
                const lbRows = (await lbRes.text()).split('\n').slice(1);
                const pcRows = (await pcRes.text()).split('\n').slice(1);
                const rosRows = (await rosRes.text()).split('\n').slice(1);

                const masterRoster = {};
                rosRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 3) return;
                    const pName = c[0].replace(/"/g, '').trim();
                    const owner = c[1].replace(/"/g, '').trim().toLowerCase();
                    const mult = parseFloat(c[2].replace(/"/g, '')) || 1; // Looking at Column C
                    
                    if (owner) {
                        if (!masterRoster[owner]) masterRoster[owner] = [];
                        masterRoster[owner].push({
                            name: pName,
                            role: mult === 2 ? 'C' : mult === 1.5 ? 'VC' : '',
                            pts: 0
                        });
                    }
                });

                pcRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 7) return;
                    const pName = c[1].replace(/"/g, '').trim();
                    const owner = c[2].replace(/"/g, '').trim().toLowerCase();
                    const pts = Math.round(parseFloat(c[6].replace(/"/g, '')) || 0);
                    
                    if (owner && masterRoster[owner]) {
                        let playerObj = masterRoster[owner].find(p => p.name === pName);
                        if (playerObj) playerObj.pts += pts;
                    }
                });

                let unsoldPoints = 0;
                const owners = lbRows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (!c[0]) return null;
                    const name = c[0].replace(/"/g, '').trim();
                    const score = Math.round(parseFloat(c[1].replace(/"/g, '')) || 0);
                    if (name.toLowerCase() === "unsold") { unsoldPoints = score; return null; }
                    return { displayName: name, cleanName: name.toLowerCase(), score: score };
                }).filter(o => o !== null).sort((a,b) => b.score - a.score);

                renderAll(owners, masterRoster, unsoldPoints);
                document.getElementById('last-update').innerText = "Update: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            } catch (e) { console.error(e); }
        }

        function renderAll(owners, squads, unsoldScore) {
            const pod = document.getElementById('podium-area');
            if (owners.length >= 3) {
                pod.innerHTML = `
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[9px] font-bold mb-2 text-center h-8 leading-tight text-gray-400">${owners[1].displayName}</div>
                        <div class="w-full podium-base h-20 rounded-t-xl flex justify-center items-center font-cyber text-xl font-bold">${owners[1].score}</div>
                    </div>
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[10px] font-black mb-2 gold-glow uppercase tracking-tighter text-center h-8 leading-tight">${owners[0].displayName}</div>
                        <div class="w-full podium-base border-t-yellow-500 h-32 rounded-t-xl flex justify-center items-center font-cyber text-2xl font-black gold-glow">${owners[0].score}</div>
                    </div>
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[9px] font-bold mb-2 text-center h-8 leading-tight text-gray-500">${owners[2].displayName}</div>
                        <div class="w-full podium-base h-12 rounded-t-xl flex justify-center items-center font-cyber text-lg font-bold text-gray-600">${owners[2].score}</div>
                    </div>`;
            }

            const lb = document.getElementById('leaderboard');
            lb.innerHTML = owners.map((o, i) => `
                <div class="card-pro overflow-hidden">
                    <div class="p-5 flex justify-between items-center cursor-pointer active:scale-95 transition" onclick="toggle('sq-${i}')">
                        <div class="flex items-center gap-6">
                            <span class="font-cyber text-xl ${i < 3 ? 'gold-glow' : 'text-gray-800'}">${i+1}</span>
                            <span class="font-bold text-sm text-gray-200 uppercase tracking-tighter">${o.displayName}</span>
                        </div>
                        <span class="text-xl font-cyber font-black ${i === 0 ? 'gold-glow' : ''}">${o.score}</span>
                    </div>
                    <div id="sq-${i}" class="squad-view">
                        <div class="space-y-1">
                            ${(squads[o.cleanName] || []).sort((a,b)=>b.pts-a.pts).map(p => `
                                <div class="flex justify-between items-center text-[11px] py-2 border-b border-white/5">
                                    <div class="flex items-center">
                                        <span class="${p.pts > 0 ? 'text-gray-300' : 'text-gray-600'}">${p.name}</span>
                                        ${p.role ? `<span class="badge badge-${p.role.toLowerCase()}">${p.role}</span>` : ''}
                                        ${p.pts >= 50 ? '<span class="ml-2 fire-pulse">🔥</span>' : ''}
                                    </div>
                                    <span class="font-cyber ${p.pts > 0 ? 'text-yellow-500' : 'text-gray-700'}">${p.pts}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`).join('');

            const us = document.getElementById('unsold-section');
            us.innerHTML = `<div class="card-pro p-4 opacity-50 flex justify-between items-center cursor-pointer" onclick="toggle('sq-u')">
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500 italic">Unsold Market Pool</span>
                <span class="font-cyber text-sm text-gray-600">${unsoldScore}</span>
            </div>
            <div id="sq-u" class="squad-view">
                ${(squads["unsold"] || []).sort((a,b)=>b.pts-a.pts).map(p => `<div class="flex justify-between text-[10px] text-gray-700 py-1.5 border-b border-white/5"><span>${p.name}</span><span class="font-cyber">${p.pts}</span></div>`).join('')}
            </div>`;
        }

        function toggle(id) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-view').forEach(s => s.classList.remove('open'));
            if (!isOpen) el.classList.add('open');
        }

        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
