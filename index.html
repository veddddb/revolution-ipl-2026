<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(17, 25, 40, 0.85); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #111827 0%, #030508 100%) no-repeat; background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .glass-card { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; }
        .tab-btn { padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; border: 1px solid var(--border); }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .podium-pillar { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.8) 100%); border-top: 2px solid var(--border); transition: height 1s ease; }
        .rank-1-pillar { border-top-color: var(--accent); box-shadow: 0 -15px 40px rgba(241, 196, 15, 0.15); }
        .squad-view { max-height: 0; overflow: hidden; transition: all 0.6s ease; opacity: 0; }
        .squad-view.open { max-height: 2000px; opacity: 1; padding: 20px; border-top: 1px solid var(--border); }
        .badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 6px; background: rgba(241, 196, 15, 0.15); border: 1px solid rgba(241, 196, 15, 0.3); color: var(--accent); }
        .role-tag { font-size: 7px; padding: 1px 4px; border-radius: 3px; background: rgba(255, 255, 255, 0.05); color: #94a3b8; text-transform: uppercase; margin-left: 5px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); }
        .live-dot { height: 8px; width: 8px; background: #ef4444; border-radius: 50%; display: inline-block; position: relative; }
        .live-dot::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; background: #ef4444; animation: live-pulse 2s infinite; }
        @keyframes live-pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        .impact-glow { color: #f1c40f !important; font-weight: 900 !important; text-shadow: 0 0 12px rgba(241, 196, 15, 0.9); }
        .win-prob-bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.1); overflow: hidden; display: flex; margin-top: 10px; }
        .team-a-prob { background: #2563eb; transition: width 1s ease; box-shadow: 0 0 10px rgba(37, 99, 235, 0.5); }
        .team-b-prob { background: #1e3a8a; transition: width 1s ease; }
        img:not([src]), img[src=""] { opacity: 0 !important; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-20">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black font-cyber gold-glow italic tracking-tighter mb-2 uppercase">REVOLUTION</h1>
            <div class="flex justify-center gap-2 mt-4">
                <button onclick="switchTab('main')" id="btn-main" class="tab-btn active">Live Ranks</button>
                <button onclick="switchTab('strategy')" id="btn-strat" class="tab-btn">Strategic Insights</button>
            </div>
        </header>

        <div id="live-ticker" class="glass-card mb-10 p-6 border-l-4 border-yellow-500 relative">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <div id="status-indicator" class="h-2 w-2 rounded-full bg-gray-600"></div>
                    <span id="live-label" class="font-cyber text-[8px] text-gray-500 uppercase tracking-widest">Standby</span>
                </div>
                <div id="match-venue" class="text-[9px] font-bold text-gray-500 uppercase tracking-tighter">Arun Jaitley Stadium</div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col items-center w-1/3 text-center">
                    <div class="w-12 h-12 rounded-full bg-blue-600/20 border border-blue-500/30 flex items-center justify-center overflow-hidden relative">
                        <span id="local-code" class="absolute font-black text-[10px] text-blue-400">DC</span>
                        <img id="local-logo" src="" onerror="this.style.opacity='0'" class="w-full h-full object-contain relative z-20">
                    </div>
                    <span id="local-name" class="mt-2 font-black text-[10px] uppercase text-gray-500 tracking-tighter">Delhi</span>
                </div>
                <div class="text-center w-1/3">
                    <div id="live-score" class="font-cyber text-2xl font-black gold-glow mb-1 italic">Match 8</div>
                    <div id="live-overs" class="text-[10px] font-bold text-gray-500 tracking-widest">Starts 3:30 PM</div>
                </div>
                <div class="flex flex-col items-center w-1/3 text-center">
                    <div class="w-12 h-12 rounded-full bg-blue-900/20 border border-blue-800/30 flex items-center justify-center overflow-hidden relative">
                        <span id="visitor-code" class="absolute font-black text-[10px] text-blue-700">MI</span>
                        <img id="visitor-logo" src="" onerror="this.style.opacity='0'" class="w-full h-full object-contain relative z-20">
                    </div>
                    <span id="visitor-name" class="mt-2 font-black text-[10px] uppercase text-gray-500 tracking-tighter">Mumbai</span>
                </div>
            </div>

            <div id="win-prob-section" class="pt-2">
                <div class="flex justify-between text-[9px] font-black uppercase tracking-widest mb-1">
                    <span id="prob-a-label" class="text-blue-500">DC 50%</span>
                    <span id="prob-b-label" class="text-blue-900">MI 50%</span>
                </div>
                <div class="win-prob-bar"><div id="bar-a" class="team-a-prob" style="width: 50%"></div><div id="bar-b" class="team-b-prob" style="width: 50%"></div></div>
            </div>
        </div>

        <div id="view-main">
            <div id="podium-area" class="flex justify-center items-end gap-3 mb-14 h-48 text-center"></div>
            <div id="leaderboard" class="space-y-4"></div>

            <div id="unsold-container" class="mt-12 glass-card overflow-hidden opacity-50">
                <div class="p-4 flex justify-between items-center cursor-pointer" onclick="toggleSection('sq-unsold')">
                    <div class="flex items-center gap-3">
                        <span class="text-gray-600 font-cyber text-[10px]">--</span>
                        <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">Unsold Player Pool</span>
                    </div>
                    <span id="unsold-total-val" class="font-cyber text-sm text-gray-600">0</span>
                </div>
                <div id="sq-unsold" class="squad-view">
                    <div id="unsold-items-list" class="space-y-1"></div>
                </div>
            </div>
        </div>

        <div id="view-strategy" class="hidden space-y-6">
            <div class="glass-card p-6 border-b-2 border-yellow-500/30">
                <h3 class="font-cyber text-xs gold-glow uppercase mb-2 tracking-widest">The "What If" Index</h3>
                <p class="text-[9px] text-gray-400 italic mb-6">Calculating optimal scores by picking the top 2 field performers as C/VC.</p>
                <div id="strategy-list" class="space-y-4"></div>
            </div>
        </div>

        <footer class="text-center py-10 opacity-30 mt-10">
            <p class="font-cyber text-[9px] uppercase tracking-[0.5em]">Dashboard by Vedant Bhansali</p>
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const SEASON_ID = '1795';
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;
        const rosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Roster`;

        let activePlayers = [];

        function switchTab(tab) {
            document.getElementById('view-main').classList.toggle('hidden', tab !== 'main');
            document.getElementById('view-strategy').classList.toggle('hidden', tab !== 'strategy');
            document.getElementById('btn-main').className = tab === 'main' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('btn-strat').className = tab === 'strategy' ? 'tab-btn active' : 'tab-btn';
        }

        async function fetchLiveScores() {
            try {
                const response = await fetch('/api/livescore');
                const json = await response.json();
                const matches = (json.data && Array.isArray(json.data)) ? json.data.filter(m => m.season_id == SEASON_ID) : [];
                const iplMatch = matches.length > 0 ? matches[matches.length - 1] : null;
                if (iplMatch) {
                    document.getElementById('match-venue').innerText = iplMatch.venue?.data?.name || "Arun Jaitley Stadium";
                    if (iplMatch.status === "Live" || iplMatch.status === "Innings Break") {
                        document.getElementById('status-indicator').className = "live-dot";
                        document.getElementById('live-label').innerText = "Live Now";
                        document.getElementById('live-label').style.color = "#ef4444";
                        activePlayers = [];
                        if (iplMatch.batting) iplMatch.batting.forEach(b => activePlayers.push(b.player?.data?.fullname));
                        if (iplMatch.bowling) iplMatch.bowling.forEach(bw => activePlayers.push(bw.player?.data?.fullname));
                        const score = iplMatch.runs ? iplMatch.runs[0] : null;
                        if (score) {
                            document.getElementById('live-score').innerText = `${score.score}/${score.wickets}`;
                            document.getElementById('live-overs').innerText = `(${score.overs} ov)`;
                        }
                    }
                }
            } catch (e) { console.log("Live Sync..."); }
        }

        async function updateData() {
            try {
                const [lbRes, pcRes, rosRes] = await Promise.all([
                    fetch(lbUrl + '&t=' + Date.now()), fetch(pcUrl + '&t=' + Date.now()), fetch(rosUrl + '&t=' + Date.now())
                ]);
                const lbRows = (await lbRes.text()).split('\n').slice(1);
                const pcRows = (await pcRes.text()).split('\n').slice(1);
                const rosRows = (await rosRes.text()).split('\n').slice(1);

                const masterRoster = {};
                rosRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 2) return;
                    const name = c[0].replace(/"/g, '').trim();
                    const owner = c[1].replace(/"/g, '').trim().toLowerCase();
                    const mult = parseFloat(c[2].replace(/"/g, '')) || 1;
                    const team = c[4] ? c[4].replace(/"/g, '').trim() : "";
                    const type = c[6] ? c[6].replace(/"/g, '').trim() : "";
                    if (owner) {
                        if (!masterRoster[owner]) masterRoster[owner] = [];
                        masterRoster[owner].push({ name, role: mult === 2 ? 'C' : mult === 1.5 ? 'VC' : '', pts: 0, team, type, mult });
                    }
                });

                pcRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 7) return;
                    const name = c[1].replace(/"/g, '').trim();
                    const owner = c[2].replace(/"/g, '').trim().toLowerCase();
                    const pts = Math.round(parseFloat(c[6].replace(/"/g, '')) || 0);
                    if (owner && masterRoster[owner]) {
                        let pObj = masterRoster[owner].find(p => p.name === name);
                        if (pObj) pObj.pts += pts;
                    }
                });

                let usTotal = 0;
                const owners = lbRows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (!c[0]) return null;
                    const n = c[0].replace(/"/g, '').trim();
                    const s = Math.round(parseFloat(c[1].replace(/"/g, '')) ||
