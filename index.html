<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(17, 25, 40, 0.75); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #111827 0%, #030508 100%); color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 20px rgba(241, 196, 15, 0.6); }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; transition: transform 0.3s ease; }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .podium-pillar { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.5) 100%); border-top: 2px solid var(--border); }
        .p-1 { border-top-color: var(--accent); box-shadow: 0 -15px 30px rgba(241, 196, 15, 0.1); }
        .squad-view { max-height: 0; overflow: hidden; transition: all 0.6s ease; opacity: 0; }
        .squad-view.open { max-height: 3000px; opacity: 1; padding: 20px; border-top: 1px solid var(--border); }
        .badge { font-size: 8px; padding: 1px 5px; border-radius: 3px; font-weight: 900; margin-left: 6px; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto">
        
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black font-cyber gold-glow italic tracking-tighter mb-2">REVOLUTION IPL 2026</h1>
            <div id="countdown" class="text-[9px] font-bold text-gray-500 uppercase tracking-[0.4em]">Initializing Live Feed...</div>
        </header>

        <div id="podium-area" class="flex justify-center items-end gap-3 mb-14 h-48 text-center"></div>

        <div id="leaderboard" class="space-y-4"></div>

        <div id="unsold-section" class="mt-12 mb-20 opacity-60"></div>

        <footer class="text-center py-10 border-t border-white/5">
            <p class="font-cyber text-[10px] text-gray-600 uppercase tracking-[0.5em]">Created by Vedant Bhansali</p>
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;
        const rosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Roster`;

        const nextMatch = new Date('2026-04-02T19:30:00+05:30').getTime();

        function startTimer() {
            setInterval(() => {
                const now = new Date().getTime();
                const diff = nextMatch - now;
                if (diff < 0) { document.getElementById('countdown').innerText = "LIVE MATCH IN PROGRESS"; return; }
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('countdown').innerText = `NEXT MATCH STARTS IN ${h}H : ${m}M : ${s}S`;
            }, 1000);
        }

        async function updateData() {
            try {
                const [lbRes, pcRes, rosRes] = await Promise.all([
                    fetch(lbUrl + '&t=' + Date.now()), fetch(pcUrl + '&t=' + Date.now()), fetch(rosUrl + '&t=' + Date.now())
                ]);
                const lbRows = (await lbRes.text()).split('\n').slice(1);
                const pcRows = (await pcRes.text()).split('\n').slice(1);
                const rosRows = (await rosRes.text()).split('\n').slice(1);

                const masterRoster = {};
                rosRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 3) return;
                    const pName = c[0].replace(/"/g, '').trim();
                    const owner = c[1].replace(/"/g, '').trim().toLowerCase();
                    const mult = parseFloat(c[2].replace(/"/g, '')) || 1;
                    if (owner) {
                        if (!masterRoster[owner]) masterRoster[owner] = [];
                        masterRoster[owner].push({ name: pName, role: mult === 2 ? 'C' : mult === 1.5 ? 'VC' : '', pts: 0 });
                    }
                });

                pcRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 7) return;
                    const pName = c[1].replace(/"/g, '').trim();
                    const owner = c[2].replace(/"/g, '').trim().toLowerCase();
                    const pts = Math.round(parseFloat(c[6].replace(/"/g, '')) || 0);
                    if (owner && masterRoster[owner]) {
                        let pObj = masterRoster[owner].find(p => p.name === pName);
                        if (pObj) pObj.pts += pts;
                    }
                });

                let usPts = 0;
                const owners = lbRows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (!c[0]) return null;
                    const n = c[0].replace(/"/g, '').trim();
                    const s = Math.round(parseFloat(c[1].replace(/"/g, '')) || 0);
                    if (n.toLowerCase() === "unsold") { usPts = s; return null; }
                    return { displayName: n, cleanName: n.toLowerCase(), score: s };
                }).filter(o => o !== null).sort((a,b) => b.score - a.score);

                render(owners, masterRoster, usPts);
            } catch (e) { console.error(e); }
        }

        function render(owners, squads, unsold) {
            const pod = document.getElementById('podium-area');
            if (owners.length >= 3) {
                pod.innerHTML = `
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[9px] font-bold text-gray-500 mb-2 h-8 flex items-center leading-tight uppercase">${owners[1].displayName}</div>
                        <div class="w-full podium-pillar h-24 rounded-t-2xl flex justify-center items-center font-cyber text-xl font-bold">${owners[1].score}</div>
                    </div>
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[10px] font-black gold-glow uppercase mb-2 h-8 flex items-center leading-tight tracking-tighter">${owners[0].displayName}</div>
                        <div class="w-full podium-pillar p-1 rounded-t-2xl flex justify-center items-center font-cyber text-2xl font-black gold-glow">${owners[0].score}</div>
                    </div>
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[9px] font-bold text-gray-600 mb-2 h-8 flex items-center leading-tight uppercase">${owners[2].displayName}</div>
                        <div class="w-full podium-pillar h-16 rounded-t-2xl flex justify-center items-center font-cyber text-lg font-bold text-gray-500">${owners[2].score}</div>
                    </div>`;
            }

            const lb = document.getElementById('leaderboard');
            lb.innerHTML = owners.map((o, i) => `
                <div class="glass-card overflow-hidden">
                    <div class="p-6 flex justify-between items-center cursor-pointer" onclick="toggle('sq-${i}')">
                        <div class="flex items-center gap-6">
                            <span class="font-cyber text-xl ${i < 3 ? 'gold-glow' : 'text-gray-700'}">${i+1}</span>
                            <span class="font-bold text-sm tracking-tighter uppercase">${o.displayName}</span>
                        </div>
                        <span class="text-xl font-cyber font-black ${i === 0 ? 'gold-glow' : ''}">${o.score}</span>
                    </div>
                    <div id="sq-${i}" class="squad-view">
                        <div class="space-y-1">
                            ${(squads[o.cleanName] || []).sort((a,b)=>b.pts-a.pts).map(p => `
                                <div class="flex justify-between items-center text-[11px] py-1.5 border-b border-white/5">
                                    <div class="flex items-center">
                                        <span class="${p.pts > 0 ? 'text-gray-300' : 'text-gray-600'}">${p.name}</span>
                                        ${p.role ? `<span class="badge font-cyber tracking-widest">${p.role}</span>` : ''}
                                    </div>
                                    <span class="font-cyber ${p.pts > 0 ? 'text-yellow-500' : 'text-gray-700'}">${p.pts}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`).join('');

            document.getElementById('unsold-section').innerHTML = `
                <div class="glass-card p-4 flex justify-between items-center cursor-pointer" onclick="toggle('sq-u')">
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 italic">Unsold Market Pool</span>
                    <span class="font-cyber text-sm text-gray-600">${unsold}</span>
                </div>
                <div id="sq-u" class="squad-view">
                    ${(squads["unsold"] || []).sort((a,b)=>b.pts-a.pts).map(p => `<div class="flex justify-between text-[10px] text-gray-700 py-1 border-b border-white/5"><span>${p.name}</span><span class="font-cyber">${p.pts}</span></div>`).join('')}
                </div>`;
        }

        function toggle(id) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-view').forEach(s => s.classList.remove('open'));
            if (!isOpen) el.classList.add('open');
        }

        startTimer();
        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
