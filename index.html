<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revolution IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: #e6edf3; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .gold { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter gold mb-2">REVOLUTION IPL</h1>
            <p class="text-gray-500 text-sm uppercase tracking-widest">Season 2026 • Live Standings</p>
        </header>

        <div id="podium" class="flex justify-center items-end gap-2 mb-10 h-32">
            </div>

        <div class="glass rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center">
                <h2 class="font-bold text-lg">League Table</h2>
                <span id="live-indicator" class="flex items-center text-xs text-green-500">
                    <span class="animate-ping w-2 h-2 bg-green-500 rounded-full mr-2"></span> LIVE
                </span>
            </div>
            <div id="leaderboard-list">
                </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;

        async function updateDashboard() {
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').slice(1).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            
            // Sort data by points (descending)
            const sorted = rows.map(r => ({
                name: r[0].replace(/"/g, ''),
                pts: Math.round(parseFloat(r[1].replace(/"/g, '')) || 0)
            })).sort((a, b) => b.pts - a.pts);

            // 1. Render Podium
            const podium = document.getElementById('podium');
            podium.innerHTML = `
                <div class="flex flex-col items-center">
                    <div class="text-xs font-bold text-gray-400">2nd</div>
                    <div class="w-16 bg-gray-700 rounded-t-lg flex items-end justify-center pb-2 h-20 text-xl font-bold">${sorted[1].name[0]}</div>
                </div>
                <div class="flex flex-col items-center">
                    <div class="text-xs font-bold gold">1st</div>
                    <div class="w-20 bg-yellow-600/20 border-t-4 border-yellow-500 rounded-t-lg flex items-end justify-center pb-2 h-28 text-2xl font-bold gold">${sorted[0].name[0]}</div>
                </div>
                <div class="flex flex-col items-center">
                    <div class="text-xs font-bold text-orange-400">3rd</div>
                    <div class="w-16 bg-orange-900/20 rounded-t-lg flex items-end justify-center pb-2 h-16 text-xl font-bold">${sorted[2].name[0]}</div>
                </div>
            `;

            // 2. Render List
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = sorted.map((owner, i) => `
                <div class="flex items-center justify-between p-4 border-b border-gray-800/50 hover:bg-white/5 transition">
                    <div class="flex items-center gap-4">
                        <span class="text-gray-600 font-mono w-4">${i + 1}</span>
                        <span class="font-semibold text-gray-200">${owner.name}</span>
                    </div>
                    <div class="text-right">
                        <span class="block text-xl font-black gold">${owner.pts}</span>
                        <span class="text-[10px] text-gray-500 uppercase font-bold">Total Points</span>
                    </div>
                </div>
            `).join('');
        }

        updateDashboard();
        setInterval(updateDashboard, 60000); // Auto-refresh every 60s
    </script>
</body>
</html>
