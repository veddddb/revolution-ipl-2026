<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: #e6edf3; font-family: 'Inter', sans-serif; }
        .glass { background: #161b22; border: 1px solid #30363d; transition: all 0.3s ease; }
        .gold { color: #f1c40f; }
        .hidden-squad { display: none; }
        .active-squad { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black gold tracking-tighter italic">REVOLUTION 2026</h1>
            <p class="text-gray-500 text-xs uppercase tracking-widest mt-1">Tap an owner to view squad points</p>
        </header>

        <div id="leaderboard" class="space-y-3">
            <div class="text-center py-10 text-gray-500">Connecting to Google Sheets...</div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        
        // URLs for the two data sources
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;

        async function init() {
            try {
                const [lbRes, pcRes] = await Promise.all([fetch(lbUrl), fetch(pcUrl)]);
                const lbText = await lbRes.text();
                const pcText = await pcRes.text();

                // 1. Process Leaderboard Data
                const lbData = lbText.split('\n').slice(1).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const sortedOwners = lbData.map(r => ({
                    name: r[0].replace(/"/g, ''),
                    total: Math.round(parseFloat(r[1].replace(/"/g, '')) || 0)
                })).sort((a, b) => b.total - a.total);

                // 2. Process Player Data
                const pcRows = pcText.split('\n').slice(1);
                const squads = {};
                pcRows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 7) return;
                    const pName = cols[1].replace(/"/g, '');
                    const owner = cols[2].replace(/"/g, '');
                    const pts = parseFloat(cols[6].replace(/"/g, '')) || 0;
                    if (!owner || owner === "Unsold") return;
                    if (!squads[owner]) squads[owner] = {};
                    squads[owner][pName] = (squads[owner][pName] || 0) + pts;
                });

                render(sortedOwners, squads);
            } catch (e) {
                console.error(e);
            }
        }

        function render(owners, squads) {
            const container = document.getElementById('leaderboard');
            container.innerHTML = owners.map((owner, i) => `
                <div class="glass rounded-xl overflow-hidden cursor-pointer" onclick="toggleSquad('${i}')">
                    <div class="p-4 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <span class="text-gray-600 font-mono text-sm">${i + 1}</span>
                            <span class="font-bold text-lg text-gray-100">${owner.name}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-xl font-black gold">${owner.total}</span>
                        </div>
                    </div>
                    <div id="squad-${i}" class="hidden-squad bg-black/30 border-t border-gray-800 p-4 space-y-2">
                        <div class="text-[10px] text-gray-500 uppercase font-bold mb-2">Player Performance</div>
                        ${renderPlayers(squads[owner.name])}
                    </div>
                </div>
            `).join('');
        }

        function renderPlayers(players) {
            if (!players) return '<div class="text-xs text-gray-600 italic">No points recorded yet</div>';
            return Object.entries(players)
                .sort((a, b) => b[1] - a[1]) // Sort players by points
                .map(([name, pts]) => `
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-400">${name}</span>
                        <span class="font-bold text-gray-200">${Math.round(pts)} pts</span>
                    </div>
                `).join('');
        }

        function toggleSquad(id) {
            const el = document.getElementById(`squad-${id}`);
            const isHidden = el.classList.contains('hidden-squad');
            // Close all others first
            document.querySelectorAll('.hidden-squad').forEach(s => s.classList.replace('active-squad', 'hidden-squad'));
            if (isHidden) el.classList.replace('hidden-squad', 'active-squad');
        }

        init();
        setInterval(init, 60000);
    </script>
</body>
</html>
