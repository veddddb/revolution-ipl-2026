<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(10, 15, 25, 0.98); --border: rgba(255, 255, 255, 0.08); }
        body { background: radial-gradient(circle at top, #0f172a 0%, #020617 100%) no-repeat; background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; transition: all 0.4s; }
        
        .tab-btn { padding: 10px 24px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; transition: 0.3s; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: #64748b; letter-spacing: 1px; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }

        .squad-container { display: none; padding: 0 24px 24px 24px; border-top: 1px solid rgba(255,255,255,0.05); }
        .squad-container.open { display: block; animation: slideIn 0.3s ease-out; }
        .player-row-dim { opacity: 0.2; filter: grayscale(1); }
        
        /* LIVE PULSE */
        .live-dot { height: 7px; width: 7px; background: #2ecc71; border-radius: 50%; display: inline-block; position: relative; box-shadow: 0 0 10px #2ecc71; }
        .live-dot::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; background: #2ecc71; animation: live-pulse 2s infinite; }
        @keyframes live-pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-24">
        
        <header class="text-center mb-10 flex flex-col items-center">
            <h1 class="text-5xl font-black font-cyber gold-glow italic tracking-tighter mb-6 uppercase">REVOLUTION</h1>
            <div class="flex justify-center gap-3 bg-black/40 p-1.5 rounded-2xl border border-white/5">
                <button onclick="switchTab('main')" id="btn-main" class="tab-btn active">Live Ranks</button>
                <button onclick="switchTab('strategy')" id="btn-strat" class="tab-btn">Luckiest Manager</button>
            </div>
        </header>

        <div id="view-main" class="space-y-6">
            <div id="podium-area" class="flex justify-center items-end gap-3 mb-16 h-48 text-center px-2"></div>
            <div id="leaderboard" class="space-y-5"></div>
        </div>

        <div id="view-strategy" class="hidden space-y-6">
            <div id="strategy-list" class="space-y-4 pt-4"></div>
        </div>

        <footer class="text-center py-20 opacity-20 font-cyber text-[8px] uppercase tracking-[0.6em]">
            Sync Status: Online • Vedant Bhansali Edition
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        
        const ownerColors = { 
            "vedant": "#3498db", "vedant bhansali": "#3498db", 
            "deep": "#e74c3c", "shlok": "#2ecc71", "rahul": "#9b59b6", 
            "soni": "#f1c40f", "yash soni": "#f1c40f",
            "dheer": "#e67e22", "kunal": "#1abc9c", "puneet": "#ff9f43", 
            "vivek": "#54a0ff", "bokaria": "#5f27cd", "prakshal": "#48dbfb", 
            "rishi": "#ff6b6b", "aamer": "#1dd1a1", "yashshah": "#f368e0",
            "yash shah": "#f368e0"
        };

        async function fetchJSON(sheet) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheet}`;
            const r = await fetch(url); const t = await r.text();
            const j = JSON.parse(t.substr(47).slice(0, -2));
            return j.table.rows.map(row => row.c.map(cell => cell ? cell.v : ''));
        }

        function switchTab(t) {
            document.getElementById('view-main').classList.toggle('hidden', t !== 'main');
            document.getElementById('view-strategy').classList.toggle('hidden', t !== 'strategy');
            document.getElementById('btn-main').classList.toggle('active', t === 'main');
            document.getElementById('btn-strat').classList.toggle('active', t === 'strategy');
        }

        async function updateApp() {
            try {
                const [lbData, rosData, lsData, pcData] = await Promise.all([
                    fetchJSON('Leaderboard'), fetchJSON('Roster'), fetchJSON('Livescore'), fetchJSON('PointsCalc')
                ]);

                // 1. Calculate stats
                const playerStats = {};
                pcData.slice(1).forEach(row => {
                    const name = row[1];
                    const actualPts = parseFloat(row[6]) || 0;
                    const mult = parseFloat(row[5]) || 1;
                    const raw = actualPts / mult;
                    if (!playerStats[name]) playerStats[name] = { totalActual: 0, totalRaw: 0 };
                    playerStats[name].totalActual += actualPts;
                    playerStats[name].totalRaw += raw;
                });

                // 2. Identify Live Players (Column B of Livescore)
                const activeNames = lsData.slice(1).map(r => r[1] ? r[1].toString().trim() : "");

                // 3. Map Squads
                const squadMap = {};
                rosData.slice(1).forEach(row => {
                    const name = row[0];
                    const ownerKey = row[1] ? row[1].toString().toLowerCase().trim() : "";
                    if (!ownerKey) return;
                    
                    const stats = playerStats[name] || { totalActual: 0, totalRaw: 0 };
                    const mult = parseFloat(row[2]) || 1;

                    if (!squadMap[ownerKey]) squadMap[ownerKey] = [];
                    squadMap[ownerKey].push({
                        name, team: row[4],
                        actualPts: Math.round(stats.totalActual),
                        rawPts: stats.totalRaw,
                        cvc: mult === 2 ? 'C' : mult === 1.5 ? 'VC' : '',
                        isLive: activeNames.some(an => an.toLowerCase() === name.toString().toLowerCase())
                    });
                });

                // 4. Process Owners
                const owners = lbData.slice(1)
                    .filter(row => row[0] && row[0].toString().toLowerCase() !== 'unsold')
                    .map(row => {
                        const fullName = row[0].toString();
                        return {
                            fullName: fullName,
                            score: Math.round(parseFloat(row[1])) || 0,
                            id: fullName.toLowerCase().trim(),
                            firstName: fullName.toLowerCase().split(' ')[0]
                        };
                    }).sort((a,b) => b.score - a.score);

                renderMain(owners, squadMap);
                renderStrategy(owners, squadMap);

            } catch (e) { console.error("Update Error:", e); }
        }

        function renderMain(owners, squads) {
            const pod = document.getElementById('podium-area');
            if(owners.length >= 3) {
                pod.innerHTML = `
                    <div class="w-1/3 flex flex-col items-center"><span class="text-[9px] font-cyber mb-2 opacity-60 uppercase">${owners[1].firstName}</span><div class="podium-pillar w-full h-24 rounded-t-2xl flex items-center justify-center font-cyber text-lg">${owners[1].score}</div></div>
                    <div class="w-1/3 flex flex-col items-center"><span class="text-[10px] font-cyber mb-2 gold-glow italic uppercase">${owners[0].firstName}</span><div class="podium-pillar w-full h-40 rounded-t-2xl border-t-yellow-500 flex items-center justify-center font-cyber text-2xl gold-glow">${owners[0].score}</div></div>
                    <div class="w-1/3 flex flex-col items-center"><span class="text-[9px] font-cyber mb-2 opacity-40 uppercase">${owners[2].firstName}</span><div class="podium-pillar w-full h-16 rounded-t-2xl flex items-center justify-center font-cyber text-base text-gray-600">${owners[2].score}</div></div>
                `;
            }

            document.getElementById('leaderboard').innerHTML = owners.map((o, i) => {
                const color = ownerColors[o.id] || ownerColors[o.firstName] || '#fff';
                const squad = squads[o.id] || [];
                const hasLive = squad.some(p => p.isLive);
                const safeId = o.id.replace(/\s+/g, '-');
                
                return `
                <div id="card-${safeId}" class="glass-card overflow-hidden mb-4">
                    <div class="p-6 flex justify-between items-center cursor-pointer" onclick="toggleSquad('${safeId}', '${color}')">
                        <div class="flex items-center gap-5">
                            <span class="font-cyber text-lg ${i<3?'gold-glow':'text-gray-700'}">#${i+1}</span>
                            <div>
                                <span class="font-black text-sm uppercase tracking-widest block">${o.fullName}</span>
                                ${hasLive ? `<span class="flex items-center gap-1.5 text-[8px] font-bold text-green-500 uppercase mt-1"><span class="live-dot"></span> Action Live</span>` : ''}
                            </div>
                        </div>
                        <span class="font-cyber text-2xl font-black italic tracking-tighter">${o.score}</span>
                    </div>
                    <div id="sq-${safeId}" class="squad-container"><div class="space-y-4 pt-4">
                        ${squad.sort((a,b)=>b.actualPts-a.actualPts).map(p => `
                            <div class="flex justify-between items-center ${p.actualPts === 0 && !p.isLive ? 'player-row-dim' : ''}">
                                <div class="flex items-center gap-2">
                                    <span class="text-[11px] font-bold text-gray-100">${p.name}</span>
                                    ${p.isLive ? `<span class="live-dot ml-1"></span>` : ''}
                                    ${p.cvc ? `<span class="font-cyber text-[8px] px-1 rounded border" style="color:${color}; border-color:${color}">${p.cvc}</span>` : ''}
                                </div>
                                <span class="font-cyber text-xs font-bold" style="color:${p.actualPts > 0 || p.isLive ? color : '#334155'}">${p.actualPts}</span>
                            </div>`).join('')}
                    </div></div>
                </div>`;
            }).join('');
        }

        function renderStrategy(owners, squads) {
            const stratData = owners.map(o => {
                const s = squads[o.id] || [];
                const sorted = [...s].sort((a,b) => b.rawPts - a.rawPts);
                const best = sorted[0], second = sorted[1];
                let potential = 0;
                s.forEach(p => {
                    if (best && p.name === best.name) potential += (p.rawPts * 2);
                    else if (second && p.name === second.name) potential += (p.rawPts * 1.5);
                    else potential += p.rawPts;
                });
                const finalPot = Math.round(potential);
                return { ...o, potential: finalPot, diff: finalPot - o.score, top2: [best?.name || '--', second?.name || '--'] };
            }).sort((a,b) => b.potential - a.potential);

            document.getElementById('strategy-list').innerHTML = stratData.map((d, i) => {
                const color = ownerColors[d.id] || ownerColors[d.firstName] || '#fff';
                return `
                <div class="glass-card p-5 border-l-4 mb-4" style="border-left-color: ${color}">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="font-cyber text-lg" style="color:${color}">#${i+1}</span>
                            <span class="font-black text-xs uppercase tracking-widest">${d.fullName}</span>
                            <p class="text-[8px] font-bold text-gray-500 mt-2 uppercase italic">Ideal C/VC: ${d.top2[0]} & ${d.top2[1]}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-cyber text-xl italic" style="color:${color}">${d.potential}</p>
                            <p class="text-[9px] font-black ${d.diff > 0 ? 'text-yellow-500' : 'text-gray-600'}">+${d.diff} MISSED</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleSquad(id, color) {
            const el = document.getElementById('sq-' + id);
            const card = document.getElementById('card-' + id);
            const wasOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-container').forEach(s => s.classList.remove('open'));
            document.querySelectorAll('.glass-card').forEach(c => { c.style.borderColor = 'rgba(255,255,255,0.08)'; c.style.boxShadow = 'none'; });
            if (!wasOpen) { el.classList.add('open'); card.style.borderColor = color; card.style.boxShadow = `0 0 40px ${color}15`; }
        }

        updateApp(); setInterval(updateApp, 60000);
    </script>
</body>
</html>
