<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(17, 25, 40, 0.85); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #111827 0%, #030508 100%) no-repeat; background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .glass-card { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; }
        .tab-btn { padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; border: 1px solid var(--border); background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .podium-pillar { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.8) 100%); border-top: 2px solid var(--border); transition: height 1.2s ease; }
        .rank-1-pillar { border-top-color: var(--accent); box-shadow: 0 -15px 40px rgba(241, 196, 15, 0.15); }
        .squad-view { max-height: 0; overflow: hidden; transition: all 0.5s ease; opacity: 0; }
        .squad-view.open { max-height: 2000px; opacity: 1; padding: 15px 20px; border-top: 1px solid var(--border); }
        .badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 6px; background: rgba(241, 196, 15, 0.15); border: 1px solid rgba(241, 196, 15, 0.3); color: var(--accent); }
        .role-tag { font-size: 7px; padding: 1px 4px; border-radius: 3px; background: rgba(255, 255, 255, 0.05); color: #94a3b8; text-transform: uppercase; margin-left: 5px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); }
        .player-row-dim { opacity: 0.4; filter: grayscale(0.5); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-20">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black font-cyber gold-glow italic tracking-tighter mb-2 uppercase">REVOLUTION</h1>
            <div class="flex justify-center gap-2 mt-4">
                <button onclick="switchTab('main')" id="btn-main" class="tab-btn active">Live Ranks</button>
                <button onclick="switchTab('strategy')" id="btn-strat" class="tab-btn">Strategic Insights</button>
            </div>
        </header>

        <div id="live-ticker" class="glass-card mb-10 p-6 border-l-4 border-yellow-500 relative">
            <div class="flex justify-between items-center mb-4 text-[9px] font-bold text-gray-500 uppercase">
                <div class="flex items-center gap-2"><div class="h-2 w-2 rounded-full bg-gray-600"></div><span class="font-cyber tracking-widest">Live Sync Active</span></div>
                <div id="match-venue">IPL 2026 Season</div>
            </div>
            <div class="flex justify-between items-center mb-6 text-center">
                <div class="w-1/3 flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-blue-600/10 border border-white/5 flex items-center justify-center font-black text-[10px] text-blue-400">HOME</div>
                </div>
                <div class="w-1/3 font-cyber text-2xl font-black gold-glow italic">VS</div>
                <div class="w-1/3 flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-blue-900/10 border border-white/5 flex items-center justify-center font-black text-[10px] text-blue-700">AWAY</div>
                </div>
            </div>
        </div>

        <div id="view-main">
            <div id="podium-area" class="flex justify-center items-end gap-3 mb-14 h-48 text-center px-4"></div>
            <div id="leaderboard" class="space-y-4"></div>
            <div id="unsold-container" class="mt-12 glass-card overflow-hidden opacity-60">
                <div class="p-4 flex justify-between items-center cursor-pointer" onclick="toggleSection('sq-unsold')">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Unsold Player Pool</span>
                    <span id="unsold-total-val" class="font-cyber text-sm text-gray-600">0</span>
                </div>
                <div id="sq-unsold" class="squad-view"><div id="unsold-items-list" class="space-y-1"></div></div>
            </div>
        </div>

        <div id="view-strategy" class="hidden space-y-6">
            <div class="glass-card p-6 border-b-2 border-yellow-500/30">
                <h3 class="font-cyber text-xs gold-glow uppercase mb-2">Luckiest Manager Index</h3>
                <p class="text-[9px] text-gray-400 italic mb-6">Optimized for Season Total based on Current Squads.</p>
                <div id="strategy-list" class="space-y-4"></div>
            </div>
        </div>

        <footer class="text-center py-10 opacity-30 mt-10">
            <p class="font-cyber text-[9px] uppercase tracking-[0.5em]">Dashboard by Vedant Bhansali</p>
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;
        const rosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Roster`;

        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                const res = []; let cur = '', q = false;
                for (let i = 0; i < line.length; i++) {
                    if (line[i] === '"') q = !q;
                    else if (line[i] === ',' && !q) { res.push(cur.trim()); cur = ''; }
                    else cur += line[i];
                }
                res.push(cur.trim());
                return res;
            }).filter(r => r.length > 1);
        }

        function switchTab(t) {
            document.getElementById('view-main').style.display = t === 'main' ? 'block' : 'none';
            document.getElementById('view-strategy').style.display = t === 'strategy' ? 'block' : 'none';
            document.getElementById('btn-main').classList.toggle('active', t === 'main');
            document.getElementById('btn-strat').classList.toggle('active', t === 'strategy');
        }

        async function updateData() {
            try {
                const [lbTxt, pcTxt, rosTxt] = await Promise.all([
                    fetch(lbUrl + '&t=' + Date.now()).then(r => r.text()),
                    fetch(pcUrl + '&t=' + Date.now()).then(r => r.text()),
                    fetch(rosUrl + '&t=' + Date.now()).then(r => r.text())
                ]);

                const lbRows = parseCSV(lbTxt).slice(1);
                const pcRows = parseCSV(pcTxt).slice(1);
                const rosRows = parseCSV(rosTxt).slice(1);

                const playerSeasonRaw = {};
                const masterRoster = {};

                rosRows.forEach(c => {
                    const name = c[0], owner = c[1]?.toLowerCase().trim(), mult = parseFloat(c[2]) || 1;
                    if (owner) {
                        if (!masterRoster[owner]) masterRoster[owner] = [];
                        masterRoster[owner].push({ name, currentRole: mult === 2 ? 'C' : mult === 1.5 ? 'VC' : '', pts: 0, seasonRaw: 0, team: c[4], type: c[6] });
                        playerSeasonRaw[name] = 0;
                    }
                });

                pcRows.forEach(c => {
                    const pName = c[1], ownerKey = c[2]?.toLowerCase().trim();
                    const actualG = parseFloat(c[6]) || 0, multF = parseFloat(c[5]) || 1;
                    const rawVal = actualG / multF;
                    
                    if (ownerKey && masterRoster[ownerKey]) {
                        let p = masterRoster[ownerKey].find(x => x.name === pName);
                        if (p) p.pts += actualG;
                    }
                    if (playerSeasonRaw.hasOwnProperty(pName)) playerSeasonRaw[pName] += rawVal;
                });

                Object.keys(masterRoster).forEach(owner => {
                    masterRoster[owner].forEach(p => { p.seasonRaw = playerSeasonRaw[p.name] || 0; });
                });

                let usScore = 0;
                const owners = lbRows.map(c => {
                    const n = c[0], s = Math.round(parseFloat(c[1])) || 0;
                    if (!n) return null;
                    if (n.toLowerCase().trim() === 'unsold') { usScore = s; return null; }
                    return { displayName: n, cleanName: n.toLowerCase().trim(), score: s };
                }).filter(o => o !== null).sort((a,b) => b.score - a.score);

                renderDashboard(owners, masterRoster, usScore);
            } catch (e) { console.error(e); }
        }

        function renderDashboard(owners, squads, unsoldScore) {
            // PODIUM
            const pod = document.getElementById('podium-area');
            if (owners.length >= 3) {
                pod.innerHTML = `
                    <div class="flex flex-col items-center w-1/3"><div class="text-[9px] mb-2 uppercase text-gray-500 font-bold">${owners[1].displayName}</div>
                    <div class="w-full podium-pillar h-24 rounded-t-2xl flex justify-center items-center border border-white/5"><span class="font-cyber text-xl font-bold">${owners[1].score}</span></div></div>
                    <div class="flex flex-col items-center w-1/3"><div class="text-[10px] gold-glow mb-2 uppercase font-black">${owners[0].displayName}</div>
                    <div class="w-full podium-pillar rank-1-pillar h-36 rounded-t-2xl flex justify-center items-center"><span class="font-cyber text-2xl font-black gold-glow">${owners[0].score}</span></div></div>
                    <div class="flex flex-col items-center w-1/3"><div class="text-[9px] mb-2 text-gray-700 uppercase font-bold">${owners[2].displayName}</div>
                    <div class="w-full podium-pillar h-16 rounded-t-2xl flex justify-center items-center border border-white/5"><span class="font-cyber text-lg font-bold text-gray-600">${owners[2].score}</span></div></div>`;
            }

            // LEADERBOARD
            document.getElementById('leaderboard').innerHTML = owners.map((o, i) => `
                <div class="glass-card">
                    <div class="p-5 flex justify-between items-center cursor-pointer" onclick="toggleSection('sq-${i}')">
                        <div class="flex items-center gap-6"><span class="font-cyber text-lg ${i < 3 ? 'gold-glow' : ''}">${i+1}</span><span class="font-bold text-sm uppercase">${o.displayName}</span></div>
                        <span class="text-xl font-cyber font-black">${o.score}</span>
                    </div>
                    <div id="sq-${i}" class="squad-view">
                        ${(squads[o.cleanName] || []).sort((a,b)=>b.pts-a.pts).map((p, idx) => `
                        <div class="flex justify-between items-center text-[11px] py-1.5 border-b border-white/5 ${p.pts === 0 ? 'player-row-dim' : ''}">
                            <span><span class="text-gray-500 mr-2">${idx+1}.</span><span class="font-medium">${p.name} (${p.team})</span>${p.type ? `<span class="role-tag">${p.type}</span>` : ''}${p.currentRole ? `<span class="badge font-cyber">${p.currentRole}</span>` : ''}</span>
                            <span class="font-cyber">${p.pts}</span>
                        </div>`).join('')}
                    </div>
                </div>`).join('');

            // STRATEGY
            const stratData = owners.map(o => {
                const s = squads[o.cleanName] || [];
                const sorted = [...s].sort((a, b) => b.seasonRaw - a.seasonRaw);
                const t1 = sorted[0], t2 = sorted[1];
                let potential = 0;
                s.forEach(p => {
                    if (t1 && p.name === t1.name) potential += (p.seasonRaw * 2);
                    else if (t2 && p.name === t2.name) potential += (p.seasonRaw * 1.5);
                    else potential += p.seasonRaw;
                });
                const potFinal = Math.round(potential);
                return { name: o.displayName, potential: potFinal, current: o.score, t1: t1?.name, t2: t2?.name, diff: potFinal - o.score };
            }).sort((a, b) => b.potential - a.potential);

            document.getElementById('strategy-list').innerHTML = stratData.map((d, i) => `
                <div class="p-4 rounded-xl bg-white/5 mb-3 flex justify-between items-center">
                    <div class="flex items-center gap-4"><span class="font-cyber text-xs text-gray-600">${i+1}</span>
                    <div><p class="text-[11px] font-black uppercase">${d.name}</p><div class="flex gap-2 text-[8px] font-bold uppercase"><span class="text-blue-500">C: ${d.t1 || '--'}</span><span class="text-purple-500">VC: ${d.t2 || '--'}</span></div></div></div>
                    <div class="text-right"><p class="font-cyber text-sm gold-glow">${d.potential}</p><p class="text-[8px] font-black uppercase ${d.diff > 0 ? 'text-green-500' : 'text-gray-600'}">${d.diff > 0 ? `+${d.diff} Missed` : 'Perfect'}</p></div>
                </div>`).join('');

            // UNSOLD
            document.getElementById('unsold-total-val').innerText = unsoldScore;
            const unsoldPlayers = squads['unsold'] || [];
            document.getElementById('unsold-items-list').innerHTML = unsoldPlayers.sort((a,b)=>b.pts-a.pts).map((p, idx) => `
                <div class="flex justify-between items-center text-[11px] py-1.5 border-b border-white/5 opacity-80">
                    <div class="flex items-center"><span class="text-[9px] font-bold text-gray-700 mr-2 w-4">${idx+1}.</span><span class="text-gray-400 font-medium">${p.name} (${p.team})</span></div>
                    <span class="font-cyber text-gray-500">${p.pts}</span>
                </div>`).join('');
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-view').forEach(s => s.classList.remove('open'));
            if (!isOpen) el.classList.add('open');
        }

        updateData(); setInterval(updateData, 60000);
    </script>
</body>
</html>
