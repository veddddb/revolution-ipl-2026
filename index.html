<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION PRO | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
        .card-pro { background: #0d1117; border: 1px solid #30363d; border-radius: 20px; transition: all 0.3s; }
        .squad-view { max-height: 0; overflow: hidden; transition: all 0.5s ease; opacity: 0; }
        .squad-view.open { max-height: 2000px; opacity: 1; padding: 20px; border-top: 1px solid #1f2937; }
        .role-tag { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 900; text-transform: uppercase; margin-left: 8px; }
        .tag-c { background: #f1c40f; color: #000; }
        .tag-vc { background: #94a3b8; color: #000; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto pb-20">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
            <div>
                <h1 class="text-3xl font-black font-cyber gold-glow tracking-tighter italic">REVOLUTION PRO</h1>
                <p class="text-gray-500 text-[10px] uppercase tracking-widest mt-1">Full Roster Management</p>
            </div>
            <div id="last-update" class="text-[10px] text-gray-500 font-bold uppercase">Syncing...</div>
        </header>

        <div class="card-pro p-6 mb-10"><canvas id="mainChart" height="100"></canvas></div>

        <div id="leaderboard" class="grid gap-4 mb-10"></div>
        <div id="unsold-section"></div>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;
        const rosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Roster`;

        let myChart;

        async function updateData() {
            try {
                const [lbRes, pcRes, rosRes] = await Promise.all([
                    fetch(lbUrl + '&t=' + Date.now()), fetch(pcUrl + '&t=' + Date.now()), fetch(rosUrl + '&t=' + Date.now())
                ]);
                
                const lbRows = (await lbRes.text()).split('\n').slice(1);
                const pcRows = (await pcRes.text()).split('\n').slice(1);
                const rosRows = (await rosRes.text()).split('\n').slice(1);

                // 1. Process Master Roster (Every Player)
                const masterRoster = {};
                rosRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 7) return;
                    const pName = c[0].replace(/"/g, '').trim();
                    const owner = c[1].replace(/"/g, '').trim();
                    const mult = parseFloat(c[6].replace(/"/g, '')) || 1;
                    if (owner) {
                        if (!masterRoster[owner]) masterRoster[owner] = [];
                        masterRoster[owner].push({ name: pName, role: mult === 2 ? 'C' : mult === 1.5 ? 'VC' : '', pts: 0 });
                    }
                });

                // 2. Add Points from PointsCalc
                pcRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 7) return;
                    const pName = c[1].replace(/"/g, '').trim();
                    const owner = c[2].replace(/"/g, '').trim();
                    const pts = Math.round(parseFloat(c[6].replace(/"/g, '')) || 0);
                    if (owner && masterRoster[owner]) {
                        let p = masterRoster[owner].find(x => x.name === pName);
                        if (p) p.pts += pts;
                    }
                });

                // 3. Process Leaderboard
                let unsoldPoints = 0;
                const owners = lbRows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const name = c[0].replace(/"/g, '').trim();
                    const score = Math.round(parseFloat(c[1].replace(/"/g, '')) || 0);
                    if (name.toLowerCase() === "unsold") { unsoldPoints = score; return null; }
                    return { name, score };
                }).filter(o => o && o.name !== "").sort((a,b) => b.score - a.score);

                renderDashboard(owners, masterRoster, unsoldPoints);
                updateChart(owners);
                document.getElementById('last-update').innerText = "Sync: " + new Date().toLocaleTimeString();
            } catch (e) { console.error(e); }
        }

        function renderDashboard(owners, squads, unsoldScore) {
            const list = document.getElementById('leaderboard');
            list.innerHTML = owners.map((o, i) => `
                <div class="card-pro overflow-hidden mb-4">
                    <div class="p-5 flex justify-between items-center cursor-pointer" onclick="toggle('sq-${i}')">
                        <div class="flex items-center gap-6">
                            <span class="font-cyber text-2xl ${i < 3 ? 'gold-glow' : 'text-gray-800'}">${i+1}</span>
                            <div class="font-extrabold text-sm text-gray-200">${o.name}</div>
                        </div>
                        <div class="text-2xl font-cyber font-black ${i === 0 ? 'gold-glow' : ''}">${o.score}</div>
                    </div>
                    <div id="sq-${i}" class="squad-view">
                        <div class="space-y-2">
                            ${(squads[o.name] || []).sort((a,b)=>b.pts-a.pts).map(p => `
                                <div class="flex justify-between items-center text-[11px] py-1 border-b border-white/5">
                                    <div class="flex items-center">
                                        <span class="${p.pts > 0 ? 'text-gray-300' : 'text-gray-600'}">${p.name}</span>
                                        ${p.role ? `<span class="role-tag tag-${p.role.toLowerCase()}">${p.role}</span>` : ''}
                                    </div>
                                    <span class="font-cyber ${p.pts > 0 ? 'text-yellow-500' : 'text-gray-700'}">${p.pts}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');

            const uDiv = document.getElementById('unsold-section');
            uDiv.innerHTML = `<div class="card-pro p-4 opacity-50 flex justify-between items-center cursor-pointer" onclick="toggle('sq-u')">
                <span class="text-xs font-bold uppercase tracking-widest text-gray-500">Unsold Pool</span>
                <span class="font-cyber text-gray-600">${unsoldScore}</span>
            </div>
            <div id="sq-u" class="squad-view">
                ${(squads["Unsold"] || []).map(p => `<div class="flex justify-between text-[10px] text-gray-700 py-1"><span>${p.name}</span><span>${p.pts}</span></div>`).join('')}
            </div>`;
        }

        function updateChart(owners) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: owners.map(o => o.name), datasets: [{ data: owners.map(o => o.score), backgroundColor: '#f1c40f', borderRadius: 4 }] },
                options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { color: '#6b7280', font: { size: 9 } }, grid: { display: false } } } }
            });
        }

        function toggle(id) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-view').forEach(s => s.classList.remove('open'));
            if (!isOpen) el.classList.add('open');
        }

        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
