<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(17, 25, 40, 0.85); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #111827 0%, #030508 100%) no-repeat; background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .glass-card { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; }
        .tab-btn { padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; border: 1px solid var(--border); background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .podium-pillar { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.8) 100%); border-top: 2px solid var(--border); transition: height 1s ease; }
        .rank-1-pillar { border-top-color: var(--accent); box-shadow: 0 -15px 40px rgba(241, 196, 15, 0.15); }
        .squad-view { max-height: 0; overflow: hidden; transition: all 0.5s ease; opacity: 0; }
        .squad-view.open { max-height: 2000px; opacity: 1; padding: 15px 20px; border-top: 1px solid var(--border); }
        .badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 6px; background: rgba(241, 196, 15, 0.15); border: 1px solid rgba(241, 196, 15, 0.3); color: var(--accent); }
        .role-tag { font-size: 7px; padding: 1px 4px; border-radius: 3px; background: rgba(255, 255, 255, 0.05); color: #94a3b8; text-transform: uppercase; margin-left: 5px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); }
        .live-dot { height: 8px; width: 8px; background: #ef4444; border-radius: 50%; display: inline-block; position: relative; }
        .live-dot::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; background: #ef4444; animation: live-pulse 2s infinite; }
        @keyframes live-pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        .impact-glow { color: #f1c40f !important; font-weight: 900 !important; text-shadow: 0 0 12px rgba(241, 196, 15, 0.9); }
        img:not([src]), img[src=""] { opacity: 0 !important; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-20">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black font-cyber gold-glow italic tracking-tighter mb-2 uppercase">REVOLUTION</h1>
            <div class="flex justify-center gap-2 mt-4">
                <button onclick="switchTab('main')" id="btn-main" class="tab-btn active">Live Ranks</button>
                <button onclick="switchTab('strategy')" id="btn-strat" class="tab-btn">Strategic Insights</button>
            </div>
        </header>

        <div id="live-ticker" class="glass-card mb-10 p-6 border-l-4 border-yellow-500 relative">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <div id="status-indicator" class="h-2 w-2 rounded-full bg-gray-600"></div>
                    <span id="live-label" class="font-cyber text-[8px] text-gray-500 uppercase tracking-widest">Standby</span>
                </div>
                <div id="match-venue" class="text-[9px] font-bold text-gray-500 uppercase tracking-tighter">Arun Jaitley Stadium</div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col items-center w-1/3 text-center">
                    <div class="w-12 h-12 rounded-full bg-blue-600/20 border border-blue-500/30 flex items-center justify-center overflow-hidden relative">
                        <span id="local-code" class="absolute font-black text-[10px] text-blue-400">DC</span>
                        <img id="local-logo" src="" onerror="this.style.opacity='0'" class="w-full h-full object-contain relative z-20">
                    </div>
                    <span id="local-name" class="mt-2 font-black text-[10px] uppercase text-gray-500 tracking-tighter">Delhi</span>
                </div>
                <div class="text-center w-1/3">
                    <div id="live-score" class="font-cyber text-2xl font-black gold-glow mb-1 italic">Match 8</div>
                    <div id="live-overs" class="text-[10px] font-bold text-gray-400 tracking-widest">Starts 3:30 PM</div>
                </div>
                <div class="flex flex-col items-center w-1/3 text-center">
                    <div class="w-12 h-12 rounded-full bg-blue-900/20 border border-blue-800/30 flex items-center justify-center overflow-hidden relative">
                        <span id="visitor-code" class="absolute font-black text-[10px] text-blue-700">MI</span>
                        <img id="visitor-logo" src="" onerror="this.style.opacity='0'" class="w-full h-full object-contain relative z-20">
                    </div>
                    <span id="visitor-name" class="mt-2 font-black text-[10px] uppercase text-gray-500 tracking-tighter">Mumbai</span>
                </div>
            </div>
        </div>

        <div id="view-main">
            <div id="podium-area" class="flex justify-center items-end gap-3 mb-14 h-48 text-center"></div>
            <div id="leaderboard" class="space-y-4"></div>
        </div>

        <div id="view-strategy" class="hidden space-y-6">
            <div class="glass-card p-6 border-b-2 border-yellow-500/30">
                <h3 class="font-cyber text-xs gold-glow uppercase mb-2">The Season Perfectionist Table</h3>
                <p class="text-[9px] text-gray-400 italic mb-6">Ranking based on optimal Season-long C/VC picks (Raw Points).</p>
                <div id="strategy-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const SEASON_ID = '1795';
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;
        const rosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Roster`;

        let activePlayers = [];

        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                const result = [];
                let current = '', inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    if (line[i] === '"') inQuotes = !inQuotes;
                    else if (line[i] === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                    else current += line[i];
                }
                result.push(current.trim());
                return result;
            }).filter(row => row.length > 1);
        }

        function switchTab(tab) {
            document.getElementById('view-main').style.display = tab === 'main' ? 'block' : 'none';
            document.getElementById('view-strategy').style.display = tab === 'strategy' ? 'block' : 'none';
            document.getElementById('btn-main').classList.toggle('active', tab === 'main');
            document.getElementById('btn-strat').classList.toggle('active', tab === 'strategy');
        }

        async function fetchLiveScores() {
            try {
                const response = await fetch('/api/livescore');
                const json = await response.json();
                const matches = (json.data && Array.isArray(json.data)) ? json.data.filter(m => m.season_id == SEASON_ID) : [];
                const iplMatch = matches.length > 0 ? matches[matches.length - 1] : null;
                if (iplMatch) {
                    document.getElementById('match-venue').innerText = iplMatch.venue?.data?.name || "Arun Jaitley Stadium";
                    if (iplMatch.status === "Live" || iplMatch.status === "Innings Break") {
                        document.getElementById('status-indicator').className = "live-dot";
                        document.getElementById('live-label').innerText = "Live Now";
                        activePlayers = [];
                        if (iplMatch.batting) iplMatch.batting.forEach(b => activePlayers.push(b.player?.data?.fullname));
                        if (iplMatch.bowling) iplMatch.bowling.forEach(bw => activePlayers.push(bw.player?.data?.fullname));
                        if (iplMatch.localteam?.image_path) document.getElementById('local-logo').src = iplMatch.localteam.image_path;
                        if (iplMatch.visitorteam?.image_path) document.getElementById('visitor-logo').src = iplMatch.visitorteam.image_path;
                        const score = iplMatch.runs ? iplMatch.runs[0] : null;
                        if (score) document.getElementById('live-score').innerText = `${score.score}/${score.wickets}`;
                    }
                }
            } catch (e) {}
        }

        async function updateData() {
            try {
                const [lbTxt, pcTxt, rosTxt] = await Promise.all([
                    fetch(lbUrl + '&t=' + Date.now()).then(r => r.text()),
                    fetch(pcUrl + '&t=' + Date.now()).then(r => r.text()),
                    fetch(rosUrl + '&t=' + Date.now()).then(r => r.text())
                ]);

                const lbRows = parseCSV(lbTxt).slice(1);
                const pcRows = parseCSV(pcTxt).slice(1);
                const rosRows = parseCSV(rosTxt).slice(1);

                const playerSeasonRaw = {};
                const masterRoster = {};

                rosRows.forEach(c => {
                    const name = c[0], owner = c[1]?.toLowerCase().trim(), mult = parseFloat(c[2]) || 1;
                    const team = c[4] || "", role = c[6] || "";
                    if (owner) {
                        if (!masterRoster[owner]) masterRoster[owner] = [];
                        masterRoster[owner].push({ name, currentRole: mult === 2 ? 'C' : mult === 1.5 ? 'VC' : '', pts: 0, seasonRaw: 0, team, type: role });
                        playerSeasonRaw[name] = 0;
                    }
                });

                pcRows.forEach(c => {
                    const pName = c[1], ownerKey = c[2]?.toLowerCase().trim();
                    const actualG = parseFloat(c[6]) || 0, multF = parseFloat(c[5]) || 1;
                    const rawPoints = actualG / multF; // REVERSE MULTIPLIER
                    
                    if (ownerKey && masterRoster[ownerKey]) {
                        let p = masterRoster[ownerKey].find(x => x.name === pName);
                        if (p) p.pts += actualG;
                    }
                    if (playerSeasonRaw.hasOwnProperty(pName)) playerSeasonRaw[pName] += rawPoints;
                });

                Object.keys(masterRoster).forEach(owner => {
                    masterRoster[owner].forEach(p => { p.seasonRaw = playerSeasonRaw[p.name] || 0; });
                });

                const owners = lbRows.map(c => {
                    const n = c[0], s = Math.round(parseFloat(c[1])) || 0;
                    if (!n || n.toLowerCase().trim() === 'unsold') return null;
                    return { displayName: n, cleanName: n.toLowerCase().trim(), score: s };
                }).filter(o => o !== null).sort((a,b) => b.score - a.score);

                renderDashboard(owners, masterRoster);
            } catch (e) {}
        }

        function renderDashboard(owners, squads) {
            // Leaderboard
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = owners.map((o, i) => `
                <div class="glass-card">
                    <div class="p-5 flex justify-between items-center cursor-pointer" onclick="toggleSection('sq-${i}')">
                        <div class="flex items-center gap-6"><span class="font-cyber text-lg ${i < 3 ? 'gold-glow' : ''}">${i+1}</span><span class="font-bold text-sm uppercase">${o.displayName}</span></div>
                        <span class="text-xl font-cyber font-black">${o.score}</span>
                    </div>
                    <div id="sq-${i}" class="squad-view">
                        ${(squads[o.cleanName] || []).sort((a,b)=>b.pts-a.pts).map((p, idx) => {
                            const isLive = activePlayers.some(name => name && name.includes(p.name));
                            return `<div class="flex justify-between items-center text-[11px] py-1.5 border-b border-white/5">
                                <span><span class="text-gray-500 mr-2">${idx+1}.</span><span class="${isLive ? 'impact-glow' : 'text-gray-300'} font-medium">${p.name} (${p.team})</span>${p.type ? `<span class="role-tag">${p.type}</span>` : ''}${p.currentRole ? `<span class="badge">${p.currentRole}</span>` : ''}</span>
                                <span class="font-cyber">${p.pts}</span>
                            </div>`}).join('')}
                    </div>
                </div>`).join('');

            // Strategy
            const stratData = owners.map(o => {
                const s = squads[o.cleanName] || [];
                const sorted = [...s].sort((a, b) => b.seasonRaw - a.seasonRaw);
                const t1 = sorted[0], t2 = sorted[1];
                let potential = 0;
                s.forEach(p => {
                    if (t1 && p.name === t1.name) potential += (p.seasonRaw * 2);
                    else if (t2 && p.name === t2.name) potential += (p.seasonRaw * 1.5);
                    else potential += p.seasonRaw;
                });
                return { name: o.displayName, potential: Math.round(potential), current: o.score, t1: t1?.name, t2: t2?.name };
            }).sort((a, b) => b.potential - a.potential);

            document.getElementById('strategy-list').innerHTML = stratData.map((d, i) => `
                <div class="p-4 rounded-xl bg-white/5 mb-3 flex justify-between items-center">
                    <div><p class="text-[11px] font-black uppercase">${d.name}</p><div class="flex gap-2 text-[8px] font-bold uppercase"><span class="text-blue-500">C: ${d.t1 || '--'}</span><span class="text-purple-500">VC: ${d.t2 || '--'}</span></div></div>
                    <div class="text-right"><p class="font-cyber text-sm gold-glow">${d.potential}</p><p class="text-[8px] font-black uppercase ${d.potential > d.current ? 'text-green-500' : 'text-gray-600'}">${d.potential > d.current ? `+${d.potential - d.current} Missed` : 'Perfect'}</p></div>
                </div>`).join('');
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-view').forEach(s => s.classList.remove('open'));
            if (!isOpen) el.classList.add('open');
        }

        updateData(); fetchLiveScores();
        setInterval(updateData, 60000); setInterval(fetchLiveScores, 15000);
    </script>
</body>
</html>
