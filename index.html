<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(10,15,25,0.98); --border: rgba(255,255,255,0.08); }
        body { background: radial-gradient(circle at top, #0f172a 0%, #020617 100%) fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow  { color: var(--accent); text-shadow: 0 0 15px rgba(241,196,15,0.5); }

        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; transition: 0.4s cubic-bezier(0.4,0,0.2,1); margin-bottom: 1rem; position: relative; overflow: hidden; cursor: pointer; }
        .glass-card:hover { transform: translateY(-4px); border-color: var(--owner-color, var(--accent)); box-shadow: 0 0 30px -5px var(--owner-glow, rgba(241,196,15,0.2)); z-index: 20; }

        .logo-bg { position: absolute; right: 8%; top: 50%; transform: translateY(-50%); width: 120px; height: 120px; opacity: 0.13; pointer-events: none; z-index: 0; filter: blur(0.5px); transition: opacity 0.4s ease, filter 0.4s ease, transform 0.4s ease; }
        .glass-card:hover .logo-bg { opacity: 0.4; filter: blur(0px); transform: translateY(-50%) scale(1.08); }

        .podium-pillar { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.05); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 10px; transform-origin: bottom; }
        .podium-rank-label { font-family: 'Orbitron'; font-size: 8px; font-weight: 900; opacity: 0.5; color: white; letter-spacing: 1px; margin-top: 2px; }
        .trophy-bg { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 50px; height: 50px; opacity: 0.08; color: var(--accent); pointer-events: none; }
        @keyframes riseUp { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: 1; } }
        .pillar-rise { animation: riseUp 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }

        .role-tag  { font-size: 7px; padding: 2px 5px; border-radius: 4px; background: rgba(255,255,255,0.05); color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-left: 5px; }
        .team-tag  { font-size: 7px; color: #475569; text-transform: uppercase; font-weight: 800; margin-left: 4px; }
        .badge     { font-size: 8px; padding: 1px 5px; border-radius: 4px; font-weight: 900; border: 1px solid currentColor; margin-left: 6px; }

        .mvp-banner { background: linear-gradient(90deg, rgba(241,196,15,0.15), rgba(241,196,15,0.05)); border: 1px solid rgba(241,196,15,0.3); border-radius: 20px; padding: 15px 20px; margin-bottom: 25px; box-shadow: 0 0 20px rgba(241,196,15,0.1); }

        .tab-btn { padding: 10px 24px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; transition: 0.3s; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: #64748b; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 20px rgba(241,196,15,0.2); }

        .squad-container { display: none; padding: 0 24px 24px 24px; border-top: 1px solid rgba(255,255,255,0.05); }
        .squad-container.open { display: block; animation: slideIn 0.3s ease-out; }
        .player-row-ghost { opacity: 0.25; filter: grayscale(1); transition: 0.3s; }
        .player-row-ghost:hover { opacity: 0.6; }

        /* --- SEARCH STYLES --- */
        .search-wrap { position: relative; width: 100%; max-width: 400px; margin: 0 auto 2rem; z-index: 50; }
        .search-box { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px 12px 40px; font-size: 13px; color: white; transition: 0.3s; outline: none; }
        .search-box:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); box-shadow: 0 0 20px rgba(241,196,15,0.1); }
        .search-icon-svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.3; pointer-events: none; }
        .search-results { position: absolute; top: 110%; left: 0; right: 0; background: #0f172a; border: 1px solid var(--accent); border-radius: 16px; max-height: 280px; overflow-y: auto; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .search-item { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .search-item:hover { background: rgba(255,255,255,0.06); }
        /* --- END SEARCH STYLES --- */

        @keyframes shimmer  { 0%{background-position:-600px 0} 100%{background-position:600px 0} }
        .skel { background: linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.1) 50%,rgba(255,255,255,0.04) 75%); background-size:600px 100%; animation:shimmer 1.4s infinite linear; border-radius:8px; }
        .skel-card { background:rgba(10,15,25,0.98); border:1px solid rgba(255,255,255,0.06); border-radius:24px; padding:24px; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; }

        #splash { position:fixed; inset:0; z-index:999; background:radial-gradient(circle at 50% 40%,#0f172a,#020617); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; transition:opacity 0.8s ease,transform 0.8s ease; }
        #splash.hide { opacity:0; transform:scale(1.04); pointer-events:none; }
        .sp { opacity:0; }
        .sp1 { animation:fadeUp 0.6s ease 0.2s forwards; }
        .sp2 { animation:fadeUp 0.7s ease 0.5s forwards; }
        .sp3 { animation:fadeUp 0.7s ease 0.75s forwards; }
        .sp4 { animation:fadeUp 0.6s ease 1.0s forwards; }
        .sp5 { animation:fadeUp 0.6s ease 1.1s forwards; }
        .sp6 { animation:fadeUp 0.7s ease 1.2s forwards; }
        .sp7 { animation:fadeUp 0.6s ease 1.8s forwards, blink 1.4s ease 2.4s infinite; }

        @keyframes fadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
        @keyframes blink   { 0%,100%{opacity:0.4} 50%{opacity:1} }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="splash" onclick="dismissSplash()">
        <p class="sp sp1" style="font-size:9px;font-family:Orbitron,sans-serif;font-weight:700;letter-spacing:0.4em;color:#475569;text-transform:uppercase;margin-bottom:2rem;">IPL Fantasy League</p>
        <h1 class="sp sp2" style="font-family:Orbitron,sans-serif;font-weight:900;font-style:italic;font-size:clamp(2.8rem,12vw,5rem);line-height:1;color:#f1c40f;text-shadow:0 0 40px rgba(241,196,15,0.35);text-transform:uppercase;letter-spacing:-0.02em;">Revo</h1>
        <p class="sp sp3" style="font-family:Orbitron,sans-serif;font-size:clamp(0.65rem,3vw,0.85rem);font-weight:700;letter-spacing:0.25em;color:#64748b;text-transform:uppercase;margin-top:0.75rem;">IPL 2026 Championship</p>
        <div class="sp sp4" style="width:60px;height:1px;background:rgba(241,196,15,0.3);margin:2.5rem auto;"></div>
        <p class="sp sp5" style="font-size:8px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:#334155;margin-bottom:0.5rem;">Designed by</p>
        <p class="sp sp6" style="font-family:Orbitron,sans-serif;font-size:clamp(0.75rem,3.5vw,1rem);font-weight:900;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase;">Vedant Bhansali</p>
        <p class="sp sp7" style="margin-top:3.5rem;font-size:9px;font-family:Orbitron,sans-serif;font-weight:700;letter-spacing:0.4em;color:#475569;text-transform:uppercase;cursor:pointer;">Tap anywhere to enter →</p>
    </div>

    <div class="max-w-xl mx-auto pb-24">
        <header class="mb-10 text-center">
            <div class="flex justify-between items-center mb-8 px-2">
                <div class="role-tag uppercase tracking-widest px-3 py-1">EST. 2026</div>
                <div id="match-counter" class="role-tag tracking-widest text-yellow-500 uppercase px-3 py-1">MATCHES: —/74</div>
            </div>
            <h1 class="text-5xl font-black font-cyber gold-glow italic tracking-tighter mb-6 uppercase">REVOLUTION</h1>
            
            <div class="search-wrap">
                <svg class="search-icon-svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
                <input type="text" id="playerSearch" class="search-box" placeholder="Search Player (e.g. Kohli, Rashid)..." oninput="handlePlayerSearch()">
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="flex justify-center gap-3 bg-black/40 p-1.5 rounded-2xl border border-white/5 inline-flex">
                <button onclick="switchTab('main')"     id="btn-main"  class="tab-btn active">Live Ranks</button>
                <button onclick="switchTab('strategy')" id="btn-strat" class="tab-btn">Best Probable Outcome!</button>
            </div>
        </header>

        <div id="error-banner" class="error-banner hidden">
            <div class="error-dot"></div>
            <div>
                <p class="text-xs font-black uppercase tracking-widest text-red-400 mb-0.5">Sync Failed</p>
                <p id="error-msg" class="text-[10px] text-red-300 opacity-70">Could not reach the data sheet. Retrying in 60s…</p>
            </div>
            <button onclick="updateApp()" class="ml-auto text-[9px] font-black uppercase tracking-widest text-red-400 border border-red-500/30 rounded-lg px-3 py-1.5 hover:bg-red-500/10 transition-colors">Retry</button>
        </div>

        <div id="view-main" class="space-y-6">
            <div id="mvp-spotlight"></div>
            <div id="podium-area" class="flex justify-center items-end gap-3 mb-16 h-48 text-center px-2"></div>
            <div id="streak-tracker"></div>
            <div id="leaderboard" class="space-y-2"></div>
        </div>

        <div id="view-strategy" class="hidden space-y-4 pt-4">
            <div id="strategy-list" class="space-y-4"></div>
        </div>

        <footer class="text-center py-20 opacity-20 font-cyber text-[8px] uppercase tracking-[0.6em]">
            Precision Sync • Vedant Bhansali Edition
        </footer>
    </div>

    <script>
        const SHEET_ID             = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const TOTAL_SEASON_MATCHES = 74;

        // Global list for search
        let _allPlayers = [];

        const ownerColors = {
            vedant:'#3498db', deep:'#e74c3c',    shlok:'#2ecc71',
            rahul:'#9b59b6',  soni:'#f1c40f',    dheer:'#e67e22',
            kunal:'#1abc9c',  puneet:'#ff9f43',  vivek:'#54a0ff',
            bokaria:'#5f27cd',prakshal:'#48dbfb', rishi:'#ff6b6b',
            aamer:'#1dd1a1',  yashshah:'#f368e0', jash:'#e67e22',
        };

        function getColor(raw) {
            const n = fixID(raw);
            if (ownerColors[n]) return ownerColors[n];
            for (const w of n.split(/\s+/)) if (ownerColors[w]) return ownerColors[w];
            if (ownerColors[n.replace(/\s/g,'')]) return ownerColors[n.replace(/\s/g,'')];
            return '#64748b';
        }
        const fixID = s => s ? s.toString().toLowerCase().trim() : '';

        const IPL_TEAMS = {
            MI:{color:'#004BA0',accent:'#89CFF0'}, CSK:{color:'#F4C430',accent:'#ffffff'},
            RCB:{color:'#C8102E',accent:'#FFD700'}, KKR:{color:'#3A225D',accent:'#B8960C'},
            SRH:{color:'#F26522',accent:'#1a1a1a'}, DC:{color:'#00529A',accent:'#E8001C'},
            PBKS:{color:'#ED1C24',accent:'#DCDDDF'}, RR:{color:'#EA1A85',accent:'#254AA5'},
            GT:{color:'#1D4E89',accent:'#C8A84B'}, LSG:{color:'#A4D65E',accent:'#1a1a1a'},
        };

        function teamBadgeSVG(code, size=110) {
            const t = IPL_TEAMS[code]; if (!t) return '';
            const fs = code.length <= 2 ? 22 : code.length === 3 ? 18 : 14;
            return `<svg viewBox="0 0 100 115" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="sg${code}" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="${t.color}" stop-opacity="0.9"/>
                    <stop offset="100%" stop-color="${t.color}" stop-opacity="0.5"/>
                </linearGradient></defs>
                <path d="M50 4 L92 18 L92 54 C92 80 50 110 50 110 C50 110 8 80 8 54 L8 18 Z"
                      fill="url(#sg${code})" stroke="${t.accent}" stroke-width="2" stroke-opacity="0.6"/>
                <text x="50" y="${fs<=14?62:60}" text-anchor="middle" font-family="Orbitron,sans-serif"
                      font-size="${fs}" font-weight="900" fill="${t.accent}" fill-opacity="0.95" letter-spacing="1">${code}</text>
            </svg>`;
        }

        function getDominantTeams(squad) {
            if (!squad || !squad.length) return [];
            const counts = {};
            squad.forEach(p => { const t=(p.team||'').toString().trim().toUpperCase(); if(t) counts[t]=(counts[t]||0)+1; });
            const max = Math.max(...Object.values(counts));
            return Object.entries(counts).filter(([,v])=>v===max).map(([t])=>t).filter(t=>IPL_TEAMS[t]);
        }

        function dismissSplash() {
            const s = document.getElementById('splash');
            s.classList.add('hide');
            setTimeout(() => s.remove(), 900);
        }
        setTimeout(dismissSplash, 5000);

        function switchTab(t) {
            document.getElementById('view-main').classList.toggle('hidden', t !== 'main');
            document.getElementById('view-strategy').classList.toggle('hidden', t !== 'strategy');
            document.getElementById('btn-main').classList.toggle('active', t === 'main');
            document.getElementById('btn-strat').classList.toggle('active', t === 'strategy');
        }

        function showError(msg) {
            document.getElementById('error-msg').textContent = msg || 'Could not reach the data sheet. Retrying in 60s…';
            document.getElementById('error-banner').classList.remove('hidden');
        }
        function hideError() { document.getElementById('error-banner').classList.add('hidden'); }

        function renderSkeleton() {
            document.getElementById('podium-area').innerHTML = `
                <div style="display:flex;justify-content:center;align-items:flex-end;gap:12px;width:100%;height:192px;">
                    <div class="w-1/3"><div class="skel w-full h-24" style="border-radius:12px 12px 0 0"></div></div>
                    <div class="w-1/3"><div class="skel w-full h-40" style="border-radius:12px 12px 0 0"></div></div>
                    <div class="w-1/3"><div class="skel w-full h-16" style="border-radius:12px 12px 0 0"></div></div>
                </div>`;
            document.getElementById('leaderboard').innerHTML = Array.from({length:6}).map(()=>`
                <div class="skel-card">
                    <div class="flex items-center gap-5"><div class="skel w-4 h-4 rounded"></div><div class="skel w-28 h-3 rounded"></div></div>
                    <div class="skel w-12 h-6 rounded"></div>
                </div>`).join('');
        }

        async function fetchSheet(name) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=${encodeURIComponent(name)}`;
            const r = await fetch(url);
            if (!r.ok) throw new Error(`Sheet fetch failed: ${name}`);
            const t = await r.text();
            const j = JSON.parse(t.substr(47).slice(0,-2));
            return j.table.rows.map(row => row.c.map(cell => cell ? (cell.v !== null ? cell.v : '') : ''));
        }

        let _state = { squads:{}, cumulScores:{}, completedMatches:[] };

        async function updateApp() {
            hideError();
            if (!document.getElementById('leaderboard').querySelector('.glass-card')) renderSkeleton();

            try {
                const [lbRows, rosRows, pcRows] = await Promise.all([
                    fetchSheet('Leaderboard'), fetchSheet('Roster'), fetchSheet('PointsCalc')
                ]);

                const completedMatches = [...new Set(pcRows.filter(r => r[0] && parseFloat(r[6]) > 0).map(r => r[0].toString().trim()))];
                document.getElementById('match-counter').innerText = `MATCHES: ${completedMatches.length}/${TOTAL_SEASON_MATCHES}`;

                const pPoints = {};
                pcRows.forEach(row => {
                    if (!row[1]) return;
                    const k = fixID(row[1]);
                    const v = parseFloat(row[6]) || 0;
                    const m = parseFloat(row[5]) || 1;
                    if (!pPoints[k]) pPoints[k] = { act:0, raw:0 };
                    pPoints[k].act += v; pPoints[k].raw += (v / m);
                });

                let matchPlayers = [], lastMatchName = '';
                if (pcRows.length) {
                    lastMatchName = pcRows[pcRows.length-1][0];
                    pcRows.forEach(r => { if (r[0] === lastMatchName) matchPlayers.push({ name:r[1], pts:parseFloat(r[6])||0, owner:r[2] }); });
                }

                // --- POPULATE SEARCH LIST ---
                const squads = {};
                _allPlayers = []; // Reset global list
                rosRows.forEach(row => {
                    const oRaw = row[1] ? row[1].toString() : "";
                    const oKey = fixID(oRaw);
                    if (!oKey || oKey.includes('owner')) return;
                    if (!squads[oKey]) squads[oKey] = [];
                    const stats = pPoints[fixID(row[0])] || { act:0, raw:0 };
                    const pData = {
                        name:row[0], team:row[4], role:row[6],
                        act:Math.round(stats.act), raw:stats.raw,
                        cvc: parseFloat(row[2])===2 ? 'C' : parseFloat(row[2])===1.5 ? 'VC' : '',
                        ownerFull: oRaw, ownerID: oKey
                    };
                    squads[oKey].push(pData);
                    _allPlayers.push(pData); // Save to search
                });

                let owners = lbRows.map(row => {
                    const full = row[0] ? row[0].toString().trim() : '';
                    const id   = full.toLowerCase();
                    if (!full || ['owner name','owner','name'].includes(id)) return null;
                    return { full, score: Math.round(parseFloat(row[1]))||0, id, first:full.split(' ')[0] };
                }).filter(Boolean);

                const active   = owners.filter(o => o.id !== 'unsold').sort((a,b) => b.score - a.score);
                const unsold   = owners.find(o => o.id === 'unsold');
                const allOwners = unsold ? [...active, unsold] : active;
                const cumulScores = buildCumulScores(active, pcRows, completedMatches);
                _state = { squads, cumulScores, completedMatches };

                renderMVP(matchPlayers.sort((a,b) => b.pts-a.pts)[0], lastMatchName);
                renderPodium(active);
                renderStreakTracker(active, cumulScores, completedMatches);
                renderLeaderboard(allOwners, squads, cumulScores);
                renderStrategy(active, squads);

            } catch(e) { showError(e.message); }
        }

        // --- SEARCH FUNCTIONS ---
        function handlePlayerSearch() {
            const query = fixID(document.getElementById('playerSearch').value);
            const resultsBox = document.getElementById('searchResults');
            if (query.length < 2) { resultsBox.style.display = 'none'; return; }

            const filtered = _allPlayers.filter(p => fixID(p.name).includes(query)).slice(0, 10);
            if (filtered.length === 0) { resultsBox.style.display = 'none'; return; }

            resultsBox.innerHTML = filtered.map(p => {
                const color = getColor(p.ownerID);
                const idForScroll = 'c-' + p.ownerID.replace(/\s+/g,'-');
                return `
                <div class="search-item" onclick="jumpToOwner('${idForScroll}')">
                    <div>
                        <p class="text-xs font-black uppercase italic">${p.name} <span class="opacity-40">(${p.team})</span></p>
                        <p class="text-[8px] font-bold uppercase tracking-widest" style="color:${color}">OWNER: ${p.ownerFull}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-cyber text-sm font-black gold-glow">${p.act}</p>
                        <p class="text-[8px] opacity-40 uppercase">PTS</p>
                    </div>
                </div>`;
            }).join('');
            resultsBox.style.display = 'block';
        }

        function jumpToOwner(id) {
            switchTab('main');
            const target = document.getElementById(id);
            if(target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                const squad = document.getElementById('sq-'+id);
                if(squad) squad.classList.add('open');
                document.getElementById('searchResults').style.display = 'none';
                document.getElementById('playerSearch').value = "";
            }
        }
        // Close search on click outside
        document.addEventListener('click', (e) => {
            if (!document.getElementById('playerSearch').contains(e.target)) {
                document.getElementById('searchResults').style.display = 'none';
            }
        });

        // (Remaining logic functions like buildCumulScores, renderPodium etc. stay the same as your source)
        function buildCumulScores(owners, pcRows, completedMatches) {
            const cumul   = {}, running = {};
            owners.forEach(o => { cumul[o.id]=[]; running[o.id]=0; });
            const nameToId = {};
            owners.forEach(o => { nameToId[fixID(o.full)] = o.id; nameToId[o.id] = o.id; });

            completedMatches.forEach(matchName => {
                const totals = {};
                pcRows.filter(r => r[0] && r[0].toString().trim() === matchName && r[2])
                    .forEach(r => {
                        const raw = fixID(r[2]);
                        const id = nameToId[raw] || owners.find(o => raw.includes(o.id) || o.id.includes(raw))?.id;
                        if (id) totals[id] = (totals[id]||0) + (parseFloat(r[6])||0);
                    });
                owners.forEach(o => {
                    running[o.id] += (totals[o.id]||0);
                    cumul[o.id].push(Math.round(running[o.id]));
                });
            });
            return cumul;
        }

        function renderMVP(mvp, matchName) {
            const el = document.getElementById('mvp-spotlight');
            if (!mvp || !mvp.owner) { el.innerHTML=''; return; }
            const color = getColor(mvp.owner);
            el.innerHTML = `
                <div class="mvp-banner flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-yellow-500 uppercase tracking-widest mb-1">MATCH HERO • ${matchName}</p>
                        <h2 class="text-xl font-black uppercase italic tracking-tighter">${mvp.name}</h2>
                        <p class="text-[10px] font-bold opacity-60 uppercase">OWNED BY <span style="color:${color}">${mvp.owner}</span></p>
                    </div>
                    <div class="text-right">
                        <p class="font-cyber text-2xl gold-glow font-black italic tracking-tighter">${mvp.pts}</p>
                        <p class="text-[8px] font-bold opacity-40 uppercase">POINTS</p>
                    </div>
                </div>`;
        }

        function renderPodium(top) {
            const pod = document.getElementById('podium-area');
            if (top.length < 3) { pod.innerHTML=''; return; }
            pod.innerHTML = `
                <div class="w-1/3 flex flex-col items-center">
                    <span class="text-[9px] font-cyber mb-2 opacity-60 uppercase">${top[1].first}</span>
                    <div class="podium-pillar pillar-rise w-full h-24 rounded-t-2xl" style="animation-delay:0.15s">
                        <span class="font-cyber text-lg mt-4">${top[1].score}</span>
                        <div class="podium-rank-label">2ND</div>
                    </div>
                </div>
                <div class="w-1/3 flex flex-col items-center">
                    <span class="text-[10px] font-cyber mb-2 gold-glow italic uppercase tracking-widest">${top[0].first}</span>
                    <div class="podium-pillar pillar-rise w-full h-40 rounded-t-2xl shadow-[0_-10px_30px_rgba(241,196,15,0.1)]" style="animation-delay:0s">
                        <div class="trophy-bg"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18,2H6V4H2V9C2,12 4.24,14.64 7.28,14.94C8.25,17.29 10.3,19 12.82,19.26V22H10V24H14V22H11.18V19.26C13.7,19 15.75,17.29 16.72,14.94C19.76,14.64 22,12 22,9V4H18V2M4,9V6H6V12.75C4.83,12.28 4,11.23 4,9M18,12.75V6H20V9C20,11.23 19.17,12.28 18,12.75Z"/></svg></div>
                        <span class="font-cyber text-2xl font-black relative z-10 mt-12">${top[0].score}</span>
                        <div class="podium-rank-label">1ST</div>
                    </div>
                </div>
                <div class="w-1/3 flex flex-col items-center">
                    <span class="text-[9px] font-cyber mb-2 opacity-60 uppercase">${top[2].first}</span>
                    <div class="podium-pillar pillar-rise w-full h-16 rounded-t-2xl" style="animation-delay:0.3s">
                        <span class="font-cyber text-base text-gray-400 mt-2">${top[2].score}</span>
                        <div class="podium-rank-label">3RD</div>
                    </div>
                </div>`;
        }

        function renderStreakTracker(owners, cumulScores, completedMatches) {
            const el = document.getElementById('streak-tracker');
            if (!el || completedMatches.length === 0) return;
            const leadCount = {};
            owners.forEach(o => leadCount[o.id] = 0);
            for (let m = 0; m < completedMatches.length; m++) {
                let best=-1, bestId=null;
                owners.forEach(o => { const s=(cumulScores[o.id]||[])[m]||0; if(s>best){best=s;bestId=o.id;} });
                if (bestId) leadCount[bestId]++;
            }
            const leader = [...owners].sort((a,b) => b.score-a.score)[0];
            let streak = 0;
            if (leader) {
                for (let m = completedMatches.length-1; m >= 0; m--) {
                    let best=-1, bestId=null;
                    owners.forEach(o => { const s=(cumulScores[o.id]||[])[m]||0; if(s>best){best=s;bestId=o.id;} });
                    if (bestId === leader.id) streak++; else break;
                }
            }
            const sorted = [...owners].sort((a,b) => (leadCount[b.id]||0)-(leadCount[a.id]||0));
            const lc = leader ? getColor(leader.id) : '#f1c40f';
            el.innerHTML = `
                <div style="background:rgba(10,15,25,0.98);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:18px 20px;margin-bottom:1rem;">
                    <p style="font-family:Orbitron,sans-serif;font-size:8px;font-weight:900;letter-spacing:0.3em;color:#475569;text-transform:uppercase;margin-bottom:14px;">Streak Tracker</p>
                    ${leader && streak > 0 ? `
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.05);">
                        <div>
                            <p style="font-size:9px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:3px;">Current Leader Streak</p>
                            <p style="font-family:Orbitron,sans-serif;font-size:13px;font-weight:900;color:${lc};text-transform:uppercase;">${leader.first}</p>
                        </div>
                        <div style="text-align:right;">
                            <p style="font-family:Orbitron,sans-serif;font-size:28px;font-weight:900;color:${lc};line-height:1;">${streak}</p>
                            <p style="font-size:8px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:0.2em;">match days</p>
                        </div>
                    </div>` : ''}
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        ${sorted.slice(0,5).map((o,i) => {
                            const c=getColor(o.id), cnt=leadCount[o.id]||0;
                            const pct=Math.round((cnt/completedMatches.length)*100);
                            return `<div style="display:flex;align-items:center;gap:10px;">
                                <span style="font-size:8px;font-weight:900;color:#334155;width:14px;">${i+1}</span>
                                <span style="font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;flex:1;">${o.first}</span>
                                <div style="flex:2;background:rgba(255,255,255,0.04);border-radius:4px;height:4px;overflow:hidden;">
                                    <div style="height:100%;width:${pct}%;background:${c};border-radius:4px;transition:width 0.8s ease;"></div>
                                </div>
                                <span style="font-family:Orbitron,sans-serif;font-size:9px;font-weight:900;color:${c};min-width:28px;text-align:right;">${cnt}d</span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        function renderLeaderboard(owners, squads, cumulScores) {
            document.getElementById('leaderboard').innerHTML = owners.map((o,i) => {
                const color = getColor(o.id);
                const squad = squads[o.id] || [];
                const cID   = 'c-' + o.id.replace(/\s+/g,'-');
                const teams = getDominantTeams(squad);
                const logoBg = teams.length === 0 ? '' : teams.length === 1 ? `<div class="logo-bg">${teamBadgeSVG(teams[0],110)}</div>` : `<div class="logo-bg" style="display:flex;gap:6px;width:150px;align-items:center;justify-content:center;">${teams.slice(0,2).map(t=>teamBadgeSVG(t,68)).join('')}</div>`;
                const playerRows = squad.length === 0 ? `<p style="font-size:10px;color:#475569;text-transform:uppercase;font-weight:700;letter-spacing:0.1em;text-align:center;padding:16px 0;">No players</p>` : squad.sort((a,b)=>b.act-a.act).map((p,idx)=>`
                        <div class="flex justify-between items-center ${p.act===0?'player-row-ghost':''}">
                            <div class="flex items-center">
                                <span class="text-[8px] font-bold text-gray-600 mr-3 w-3">${idx+1}</span>
                                <span class="text-[11px] font-bold text-gray-200">${p.name} <span class="team-tag">(${p.team})</span></span>
                                <span class="role-tag">${p.role}</span>
                                ${p.cvc?`<span class="badge font-cyber" style="color:${color};border-color:${color}">${p.cvc}</span>`:''}
                            </div>
                            <span class="font-cyber text-xs font-bold" style="color:${p.act>0?color:'#334155'}">${p.act}</span>
                        </div>`).join('');
                return `
                <div id="${cID}" class="glass-card ${o.id==='unsold'?'opacity-40 mt-12':''}" style="--owner-color:${color};--owner-glow:${color}33">
                    ${logoBg}
                    <div class="p-6 flex justify-between items-center relative z-10" onclick="toggleSquad('${cID}')">
                        <div class="flex items-center gap-5">
                            <span class="font-cyber text-lg ${i<3&&o.id!=='unsold'?'gold-glow':'text-gray-700'}">${o.id==='unsold'?'•':i+1}</span>
                            <span class="font-black text-sm uppercase tracking-widest italic">${o.full}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-cyber text-2xl font-black italic tracking-tighter">${o.score}</span>
                            ${o.id!=='unsold'?`<button class="share-btn" onclick="event.stopPropagation();shareCard('${cID}','${o.full}',${o.score},${i+1})">Share</button>`:''}
                        </div>
                    </div>
                    <div id="sq-${cID}" class="squad-container"><div class="space-y-4 pt-4">${playerRows}</div></div>
                </div>`;
            }).join('');
        }

        function toggleSquad(id) { const s = document.getElementById('sq-'+id); if (s) s.classList.toggle('open'); }

        function renderStrategy(owners, squads) {
            const data = owners.map(o => {
                const s=squads[o.id]||[], sorted=[...s].sort((a,b)=>b.raw-a.raw);
                const pot=Math.round((sorted[0]?.raw||0)*2+(sorted[1]?.raw||0)*1.5+sorted.slice(2).reduce((sum,p)=>sum+p.raw,0));
                return {...o, pot, diff:pot-o.score, ideal:[sorted[0]?.name||'—',sorted[1]?.name||'—']};
            }).sort((a,b)=>b.pot-a.pot);
            document.getElementById('strategy-list').innerHTML = data.map((d,i) => {
                const color=getColor(d.id), curRank=owners.findIndex(o=>o.id===d.id)+1;
                const icon=curRank>i+1?'🟢 ↑':curRank<i+1?'🔴 ↓':'⚪';
                return `
                <div class="glass-card p-5" style="border-left:4px solid ${color};--owner-color:${color};--owner-glow:${color}33">
                    <div class="flex justify-between items-center mb-4">
                        <div><span class="font-cyber text-[10px]" style="color:${color}">${icon} POTENTIAL RANK #${i+1}</span><h3 class="font-black uppercase italic">${d.full}</h3></div>
                        <div class="text-right"><span class="font-cyber text-2xl font-black">${d.pot}</span><p class="text-[8px] font-bold opacity-40">MAX POTENTIAL</p></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-4 text-[10px] font-bold">
                        <div><p class="opacity-40 uppercase mb-1">Ideal C/VC</p><p class="text-yellow-500 uppercase">${d.ideal[0]} / ${d.ideal[1]}</p></div>
                        <div class="text-right"><p class="opacity-40 uppercase mb-1">Points Lost</p><p class="text-red-500">-${d.diff} PTS</p></div>
                    </div>
                </div>`;
            }).join('');
        }

        async function shareCard(cID, ownerFull, score, rank) {
            const color = getColor(cID.replace('c-','').replace(/-/g,' '));
            const squad = (_state.squads[fixID(ownerFull)] || []).sort((a,b) => b.act - a.act);
            const W=600, H=200+Math.max(squad.length,1)*26+60;
            const canvas = document.createElement('canvas'); canvas.width=W*2; canvas.height=H*2;
            const ctx=canvas.getContext('2d'); ctx.scale(2,2);
            const bg=ctx.createLinearGradient(0,0,W,H); bg.addColorStop(0,'#0f172a'); bg.addColorStop(1,'#020617'); ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
            ctx.fillStyle=color; ctx.fillRect(0,0,W,4);
            const glow=ctx.createRadialGradient(W*0.8,H*0.25,0,W*0.8,H*0.25,180); glow.addColorStop(0,color+'22'); glow.addColorStop(1,'transparent'); ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);
            ctx.font='700 11px monospace'; ctx.fillStyle=color+'aa'; ctx.fillText(`RANK #${rank}`,28,48);
            ctx.font='900 30px monospace'; ctx.fillStyle='#f8fafc'; ctx.fillText(ownerFull.toUpperCase(),28,82);
            ctx.font='900 48px monospace'; ctx.fillStyle=color; ctx.textAlign='right'; ctx.fillText(score,W-28,82); ctx.textAlign='left';
            ctx.font='700 9px monospace'; ctx.fillStyle='#334155'; ctx.fillText('TOTAL POINTS • REVOLUTION IPL 2026',28,102);
            ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(28,118); ctx.lineTo(W-28,118); ctx.stroke();
            ctx.font='700 9px monospace'; ctx.fillStyle='#475569'; ctx.fillText('SQUAD',28,140);
            squad.forEach((p,i) => { const y=160+i*26; ctx.font='600 12px monospace'; ctx.fillStyle=i%2===0?'#94a3b8':'#64748b'; ctx.fillText(`${p.name} (${p.team})`,28,y); ctx.font='900 12px monospace'; ctx.fillStyle=color; ctx.textAlign='right'; ctx.fillText(`${p.act}`,W-28,y); ctx.textAlign='left'; });
            ctx.font='700 8px monospace'; ctx.fillStyle='#1e293b'; ctx.fillText('REVOLUTION • VEDANT BHANSALI EDITION',28,H-16);
            const filename = `revo-${ownerFull.toLowerCase().replace(/\s/g,'-')}.png`;
            if (navigator.share) { const blob = await new Promise(res => canvas.toBlob(res, 'image/png')); const file = new File([blob], filename, { type: 'image/png' }); navigator.share({ files: [file], title: `Revolution IPL 2026`, text: `${ownerFull} is ranked #${rank} with ${score} points! 🏏` }).catch(()=>{}); }
            else { const a = document.createElement('a'); a.download = filename; a.href = canvas.toDataURL('image/png'); a.click(); }
        }

        let _tid = null;
        function startPolling() { if (!_tid) _tid=setInterval(updateApp,60000); }
        function stopPolling()  { clearInterval(_tid); _tid=null; }
        document.addEventListener('visibilitychange', () => { if (document.hidden) stopPolling(); else { updateApp(); startPolling(); } });

        updateApp();
        startPolling();
    </script>
</body>
</html>
