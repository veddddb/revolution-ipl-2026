<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026 | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
        .card-pro { background: #0d1117; border: 1px solid #30363d; border-radius: 20px; }
        .squad-view { max-height: 0; overflow: hidden; transition: all 0.5s ease; opacity: 0; }
        .squad-view.open { max-height: 1500px; opacity: 1; padding: 20px; transition: all 0.5s ease; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
            <div>
                <h1 class="text-3xl font-black font-cyber gold-glow tracking-tighter">REVOLUTION PRO</h1>
                <p class="text-gray-500 text-[10px] uppercase tracking-widest mt-1">Advanced League Analytics</p>
            </div>
            <div class="text-right">
                <div class="text-[10px] text-green-500 font-bold animate-pulse">● LIVE SYNC</div>
                <div class="text-xs text-gray-500" id="last-update">Updating...</div>
            </div>
        </header>

        <div class="card-pro p-6 mb-10">
            <h3 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">Points Distribution</h3>
            <canvas id="mainChart" height="100"></canvas>
        </div>

        <div id="leaderboard" class="grid gap-4">
            </div>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;

        let myChart;

        async function updateData() {
            try {
                const [lbRes, pcRes] = await Promise.all([fetch(lbUrl), fetch(pcUrl)]);
                const lbRows = (await lbRes.text()).split('\n').slice(1);
                const pcRows = (await pcRes.text()).split('\n').slice(1);

                const owners = lbRows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { name: c[0].replace(/"/g, '').trim(), score: Math.round(parseFloat(c[1].replace(/"/g, '')) || 0) };
                }).filter(o => o.name.toLowerCase() !== "unsold").sort((a,b) => b.score - a.score);

                const squads = {};
                pcRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 7) return;
                    const owner = c[2].replace(/"/g, '').trim();
                    const player = c[1].replace(/"/g, '');
                    const pts = Math.round(parseFloat(c[6].replace(/"/g, '')) || 0);
                    if (owner) {
                        if (!squads[owner]) squads[owner] = [];
                        let ex = squads[owner].find(p => p.name === player);
                        if (ex) ex.pts += pts; else squads[owner].push({name: player, pts: pts});
                    }
                });

                renderDashboard(owners, squads);
                updateChart(owners);
                document.getElementById('last-update').innerText = "Last Sync: " + new Date().toLocaleTimeString();
            } catch (e) { console.error(e); }
        }

        function renderDashboard(owners, squads) {
            const list = document.getElementById('leaderboard');
            list.innerHTML = owners.map((o, i) => `
                <div class="card-pro overflow-hidden">
                    <div class="p-5 flex justify-between items-center cursor-pointer hover:bg-white/5 transition" onclick="toggle('${i}')">
                        <div class="flex items-center gap-6">
                            <span class="font-cyber text-2xl ${i < 3 ? 'gold-glow' : 'text-gray-800'}">${i+1}</span>
                            <div>
                                <div class="font-extrabold text-sm text-gray-200">${o.name}</div>
                                <div class="text-[10px] text-gray-500 uppercase tracking-tighter">${squads[o.name]?.length || 0} Players Deployed</div>
                            </div>
                        </div>
                        <div class="text-2xl font-cyber font-black ${i === 0 ? 'gold-glow' : ''}">${o.score}</div>
                    </div>
                    <div id="sq-${i}" class="squad-view">
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-white/5 p-3 rounded-lg"><div class="text-[9px] text-gray-500 uppercase">Top Scorer</div><div class="text-xs font-bold">${squads[o.name]?.sort((a,b)=>b.pts-a.pts)[0]?.name || '-'}</div></div>
                            <div class="bg-white/5 p-3 rounded-lg"><div class="text-[9px] text-gray-500 uppercase">Avg / Player</div><div class="text-xs font-bold">${Math.round(o.score / (squads[o.name]?.length || 1))}</div></div>
                        </div>
                        <div class="space-y-2 border-t border-white/5 pt-4">
                            ${(squads[o.name] || []).sort((a,b)=>b.pts-a.pts).map(p => `
                                <div class="flex justify-between text-[11px]">
                                    <span class="text-gray-400">${p.name}</span>
                                    <span class="font-bold text-gray-200">${p.pts}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateChart(owners) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: owners.map(o => o.name),
                    datasets: [{
                        label: 'Season Points',
                        data: owners.map(o => o.score),
                        backgroundColor: owners.map((_, i) => i === 0 ? '#f1c40f' : '#30363d'),
                        borderRadius: 5,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#4b5563', font: { size: 10 } } },
                        y: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 } } }
                    }
                }
            });
        }

        function toggle(id) {
            const el = document.getElementById(`sq-${id}`);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-view').forEach(s => s.classList.remove('open'));
            if (!isOpen) el.classList.add('open');
        }

        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
