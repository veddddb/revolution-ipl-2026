<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(17, 25, 40, 0.9); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #111827 0%, #030508 100%) no-repeat; background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 20px rgba(241, 196, 15, 0.6); }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 28px; }
        
        /* THE BOUNCY SPRING ANIMATION */
        @keyframes springIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            70% { opacity: 1; transform: translateY(-5px) scale(1.05); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .squad-container { display: none; padding: 20px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.3); }
        .squad-container.open { display: block; }
        
        /* Each player "pops" in sequence */
        .player-card { 
            opacity: 0; 
            animation: springIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .tab-btn { padding: 10px 20px; border-radius: 14px; font-size: 11px; font-weight: 800; text-transform: uppercase; transition: 0.4s; border: 1px solid var(--border); background: rgba(255,255,255,0.03); }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 20px rgba(241, 196, 15, 0.3); }
        
        .podium-pillar { background: linear-gradient(180deg, rgba(241, 196, 15, 0.1) 0%, rgba(0,0,0,0.9) 100%); border-top: 3px solid var(--border); transition: height 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .rank-1-pillar { border-top-color: var(--accent); box-shadow: 0 -20px 50px rgba(241, 196, 15, 0.2); }
        
        .badge { font-size: 8px; padding: 2px 8px; border-radius: 6px; font-weight: 900; background: rgba(241, 196, 15, 0.15); border: 1px solid rgba(241, 196, 15, 0.3); color: var(--accent); }
        .role-tag { font-size: 7px; padding: 2px 5px; border-radius: 4px; background: rgba(255, 255, 255, 0.05); color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-left: 5px; }
        .player-row-dim { opacity: 0.3; filter: grayscale(1); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-24">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black font-cyber gold-glow italic tracking-tighter mb-4 uppercase">REVOLUTION</h1>
            <div class="flex justify-center gap-3">
                <button onclick="switchTab('main')" id="btn-main" class="tab-btn active">Live Ranks</button>
                <button onclick="switchTab('strategy')" id="btn-strat" class="tab-btn">Strategic Insights</button>
            </div>
        </header>

        <div id="view-main" class="space-y-6">
            <div id="podium-area" class="flex justify-center items-end gap-4 mb-16 h-56 text-center px-4"></div>
            <div id="leaderboard" class="space-y-5"></div>
            
            <div id="unsold-container" class="mt-16 glass-card overflow-hidden opacity-50">
                <div class="p-5 flex justify-between items-center cursor-pointer" onclick="toggleSquad('unsold')">
                    <span class="text-xs font-black uppercase tracking-[0.3em] text-gray-400 italic">Unsold Player Pool</span>
                    <span id="unsold-total-val" class="font-cyber text-lg gold-glow">0</span>
                </div>
                <div id="sq-unsold" class="squad-container"><div id="unsold-list" class="space-y-2"></div></div>
            </div>
        </div>

        <div id="view-strategy" class="hidden space-y-6">
            <div class="glass-card p-8 border-b-4 border-yellow-500">
                <h3 class="font-cyber text-sm gold-glow uppercase mb-3 tracking-widest">The Perfectionist Standings</h3>
                <p class="text-[10px] text-gray-400 italic leading-relaxed">Alternate leaderboard if every owner had selected their top 2 raw season performers as C/VC from Day 1.</p>
                <div id="strategy-list" class="mt-8 space-y-4"></div>
            </div>
        </div>

        <footer class="text-center py-16">
            <div class="inline-block px-6 py-2 rounded-full border border-white/5 bg-white/5">
                <p class="font-cyber text-[9px] uppercase tracking-[0.4em] opacity-40">Designed by Vedant Bhansali</p>
            </div>
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;
        const rosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Roster`;

        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                const res = []; let cur = '', q = false;
                for (let i = 0; i < line.length; i++) {
                    if (line[i] === '"') q = !q;
                    else if (line[i] === ',' && !q) { res.push(cur.trim()); cur = ''; }
                    else cur += line[i];
                }
                res.push(cur.trim());
                return res;
            }).filter(r => r.length > 1);
        }

        function switchTab(t) {
            document.getElementById('view-main').classList.toggle('hidden', t !== 'main');
            document.getElementById('view-strategy').classList.toggle('hidden', t !== 'strategy');
            document.getElementById('btn-main').classList.toggle('active', t === 'main');
            document.getElementById('btn-strat').classList.toggle('active', t === 'strategy');
        }

        async function updateData() {
            try {
                const [lbTxt, pcTxt, rosTxt] = await Promise.all([
                    fetch(lbUrl + '&t=' + Date.now()).then(r => r.text()),
                    fetch(pcUrl + '&t=' + Date.now()).then(r => r.text()),
                    fetch(rosUrl + '&t=' + Date.now()).then(r => r.text())
                ]);

                const lbRows = parseCSV(lbTxt).slice(1);
                const pcRows = parseCSV(pcTxt).slice(1);
                const rosRows = parseCSV(rosTxt).slice(1);

                const playerSeasonRaw = {};
                const masterRoster = {};

                // 1. Map Roster (Current Multipliers & Metadata)
                rosRows.forEach(c => {
                    const name = c[0], owner = c[1]?.toLowerCase().trim();
                    if (owner) {
                        if (!masterRoster[owner]) masterRoster[owner] = [];
                        masterRoster[owner].push({ 
                            name, 
                            currentRole: parseFloat(c[2]) === 2 ? 'C' : parseFloat(c[2]) === 1.5 ? 'VC' : '', 
                            pts: 0, 
                            rawSeason: 0, 
                            team: c[4], 
                            type: c[6] 
                        });
                        playerSeasonRaw[name] = 0;
                    }
                });

                // 2. Sum points from PointsCalc (Reverse Multiplier to get RAW)
                pcRows.forEach(c => {
                    const pName = c[1], owner = c[2]?.toLowerCase().trim();
                    const actualG = parseFloat(c[6]) || 0, multF = parseFloat(c[5]) || 1;
                    const nakedRaw = actualG / multF;

                    if (owner && masterRoster[owner]) {
                        let p = masterRoster[owner].find(x => x.name === pName);
                        if (p) p.pts += actualG;
                    }
                    if (playerSeasonRaw.hasOwnProperty(pName)) playerSeasonRaw[pName] += nakedRaw;
                });

                // 3. Attach Season Raw to Squads
                Object.keys(masterRoster).forEach(o => {
                    masterRoster[o].forEach(p => p.rawSeason = playerSeasonRaw[p.name] || 0);
                });

                const owners = lbRows.map(c => {
                    const n = c[0], s = Math.round(parseFloat(c[1])) || 0;
                    if (!n || n.toLowerCase().trim() === 'unsold') return null;
                    return { name: n, id: n.toLowerCase().trim(), score: s };
                }).filter(o => o).sort((a,b) => b.score - a.score);

                renderUI(owners, masterRoster, lbRows.find(r => r[0]?.toLowerCase().trim() === 'unsold')?.[1] || 0);
            } catch (e) { console.error(e); }
        }

        function renderUI(owners, squads, unsoldPts) {
            // Render Podium
            const pod = document.getElementById('podium-area');
            pod.innerHTML = `
                <div class="flex flex-col items-center w-1/3"><div class="text-[10px] mb-3 uppercase text-gray-500 font-bold">${owners[1].name}</div><div class="w-full podium-pillar h-32 rounded-t-3xl flex items-center justify-center font-cyber text-2xl">${owners[1].score}</div></div>
                <div class="flex flex-col items-center w-1/3"><div class="text-xs gold-glow mb-3 uppercase font-black tracking-widest">${owners[0].name}</div><div class="w-full podium-pillar rank-1-pillar h-48 rounded-t-3xl flex items-center justify-center font-cyber text-3xl gold-glow">${owners[0].score}</div></div>
                <div class="flex flex-col items-center w-1/3"><div class="text-[10px] mb-3 uppercase text-gray-700 font-bold">${owners[2].name}</div><div class="w-full podium-pillar h-20 rounded-t-3xl flex items-center justify-center font-cyber text-xl text-gray-600">${owners[2].score}</div></div>`;

            // Render Official Leaderboard
            document.getElementById('leaderboard').innerHTML = owners.map((o, i) => `
                <div class="glass-card overflow-hidden">
                    <div class="p-6 flex justify-between items-center cursor-pointer active:scale-95 transition-transform" onclick="toggleSquad('${o.id}')">
                        <div class="flex items-center gap-6"><span class="font-cyber text-xl ${i<3?'gold-glow':'text-gray-700'}">${i+1}</span><span class="font-black text-sm uppercase tracking-widest">${o.name}</span></div>
                        <span class="font-cyber text-2xl font-black">${o.score}</span>
                    </div>
                    <div id="sq-${o.id}" class="squad-container">
                        ${(squads[o.id] || []).sort((a,b)=>b.pts-a.pts).map((p, idx) => `
                            <div class="player-card flex justify-between items-center py-3 border-b border-white/5 ${p.pts===0?'player-row-dim':''}" style="animation-delay: ${idx * 0.05}s">
                                <div class="flex items-center gap-3">
                                    <span class="text-[10px] font-bold text-gray-500 w-4">${idx+1}</span>
                                    <span class="text-sm font-bold text-gray-200">${p.name} <span class="text-[10px] text-gray-500">(${p.team})</span></span>
                                    ${p.type ? `<span class="role-tag">${p.type}</span>` : ''}
                                    ${p.currentRole ? `<span class="badge font-cyber">${p.currentRole}</span>` : ''}
                                </div>
                                <span class="font-cyber font-bold text-sm text-yellow-500">${p.pts}</span>
                            </div>`).join('')}
                    </div>
                </div>`).join('');

            // Render Luckiest Manager (Strategy)
            const stratData = owners.map(o => {
                const s = squads[o.id] || [];
                const sorted = [...s].sort((a,b) => b.rawSeason - a.rawSeason);
                const t1 = sorted[0], t2 = sorted[1];
                let potential = 0;
                s.forEach(p => {
                    if (t1 && p.name === t1.name) potential += (p.rawSeason * 2);
                    else if (t2 && p.name === t2.name) potential += (p.rawSeason * 1.5);
                    else potential += p.rawSeason;
                });
                const potFinal = Math.round(potential);
                return { name: o.name, pot: potFinal, diff: potFinal - o.score, c: t1?.name, vc: t2?.name };
            }).sort((a,b) => b.pot - a.pot);

            document.getElementById('strategy-list').innerHTML = stratData.map((d, i) => `
                <div class="p-5 rounded-2xl bg-white/5 flex justify-between items-center border border-white/5">
                    <div class="flex items-center gap-4">
                        <span class="font-cyber text-xs opacity-30">${i+1}</span>
                        <div>
                            <p class="text-xs font-black uppercase tracking-widest mb-1">${d.name}</p>
                            <div class="flex gap-3 text-[9px] font-bold opacity-60 uppercase">
                                <span class="text-blue-400">C: ${d.c || '--'}</span><span class="text-purple-400">VC: ${d.vc || '--'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-cyber text-xl gold-glow">${d.pot}</p>
                        <p class="text-[9px] font-black uppercase ${d.diff>0?'text-green-400':'text-gray-600'}">${d.diff>0?`+${d.diff} Missed`:'Perfect'}</p>
                    </div>
                </div>`).join('');

            document.getElementById('unsold-total-val').innerText = unsoldPts;
            document.getElementById('unsold-list').innerHTML = (squads['unsold'] || []).sort((a,b)=>b.pts-a.pts).map(p => `
                <div class="flex justify-between py-1 text-[10px] opacity-60">
                    <span>${p.name} <span class="text-[8px]">(${p.team})</span></span>
                    <span class="font-cyber">${p.pts}</span>
                </div>`).join('');
        }

        function toggleSquad(id) {
            const el = document.getElementById('sq-' + id);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-container').forEach(c => c.classList.remove('open'));
            if (!isOpen) el.classList.add('open');
        }

        updateData(); setInterval(updateData, 60000);
    </script>
</body>
</html>
