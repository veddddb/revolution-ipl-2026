<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(10,15,25,0.98); --border: rgba(255,255,255,0.08); }

        /* ── LIGHT MODE ── */
        body.light {
            --glass: rgba(240,244,255,0.92);
            --border: rgba(0,0,0,0.1);
            background: radial-gradient(circle at top, #e8eef8 0%, #c8d8f0 100%) fixed !important;
            color: #0f172a;
        }
        body.light .gold-glow  { color: #b8860b; text-shadow: none; }
        body.light .font-cyber { color: #1e293b; }
        body.light .role-tag   { background: rgba(0,0,0,0.06); color: #475569; }
        body.light .team-tag   { color: #64748b; }
        body.light .tab-btn    { color: #475569; border-color: rgba(0,0,0,0.1); background: rgba(0,0,0,0.04); }
        body.light .tab-btn.active { background: #b8860b; color: #fff; border-color: #b8860b; }
        body.light .podium-pillar  { background: linear-gradient(180deg,rgba(0,0,0,0.06),rgba(0,0,0,0.02)); border-color: rgba(0,0,0,0.08); }
        body.light .podium-rank-label { color: #334155; }
        body.light .squad-container { border-top-color: rgba(0,0,0,0.06); }
        body.light #player-search  { background: rgba(240,244,255,0.95) !important; color: #0f172a !important; border-color: rgba(0,0,0,0.12) !important; }
        body.light #search-dropdown { background: rgba(240,244,255,0.99) !important; border-color: rgba(0,0,0,0.1) !important; }
        body.light .search-item:hover { background: rgba(0,0,0,0.04) !important; }
        body.light .skel { background: linear-gradient(90deg,rgba(0,0,0,0.04) 25%,rgba(0,0,0,0.1) 50%,rgba(0,0,0,0.04) 75%); }
        body.light .error-banner { background: rgba(220,38,38,0.08); }
        body.light .mvp-banner { background: linear-gradient(90deg,rgba(184,134,11,0.1),rgba(184,134,11,0.04)); border-color: rgba(184,134,11,0.3); }
        body.light .player-row-ghost { opacity: 0.35; }

        body { background: radial-gradient(circle at top, #0f172a 0%, #020617 100%) fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; transition: background 0.4s ease, color 0.3s ease; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow  { color: var(--accent); text-shadow: 0 0 15px rgba(241,196,15,0.5); }

        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; transition: 0.4s cubic-bezier(0.4,0,0.2,1); margin-bottom: 1rem; position: relative; overflow: hidden; cursor: pointer; }
        .glass-card:hover { transform: translateY(-4px); border-color: var(--owner-color, var(--accent)); box-shadow: 0 0 30px -5px var(--owner-glow, rgba(241,196,15,0.2)); z-index: 20; }

        .logo-bg { position: absolute; right: 8%; top: 50%; transform: translateY(-50%); width: 120px; height: 120px; opacity: 0.13; pointer-events: none; z-index: 0; filter: blur(0.5px); transition: opacity 0.4s ease, filter 0.4s ease, transform 0.4s ease; }
        .glass-card:hover .logo-bg { opacity: 0.4; filter: blur(0px); transform: translateY(-50%) scale(1.08); }

        .podium-pillar { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.05); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 10px; transform-origin: bottom; }
        .podium-rank-label { font-family: 'Orbitron'; font-size: 8px; font-weight: 900; opacity: 0.5; color: white; letter-spacing: 1px; margin-top: 2px; }
        .trophy-bg { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 50px; height: 50px; opacity: 0.08; color: var(--accent); pointer-events: none; }
        @keyframes riseUp { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: 1; } }
        .pillar-rise { animation: riseUp 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }

        .role-tag  { font-size: 7px; padding: 2px 5px; border-radius: 4px; background: rgba(255,255,255,0.05); color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-left: 5px; }
        .team-tag  { font-size: 7px; color: #475569; text-transform: uppercase; font-weight: 800; margin-left: 4px; }
        .badge     { font-size: 8px; padding: 1px 5px; border-radius: 4px; font-weight: 900; border: 1px solid currentColor; margin-left: 6px; }

        .mvp-banner { background: linear-gradient(90deg, rgba(241,196,15,0.15), rgba(241,196,15,0.05)); border: 1px solid rgba(241,196,15,0.3); border-radius: 20px; padding: 15px 20px; margin-bottom: 25px; box-shadow: 0 0 20px rgba(241,196,15,0.1); }

        .tab-btn { padding: 9px 16px; border-radius: 12px; font-size: 9px; font-weight: 900; text-transform: uppercase; transition: 0.3s; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: #64748b; white-space:nowrap; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 20px rgba(241,196,15,0.2); }

        .squad-container { display: none; padding: 0 24px 24px 24px; border-top: 1px solid rgba(255,255,255,0.05); }
        .squad-container.open { display: block; animation: slideIn 0.3s ease-out; }
        .player-row-ghost { opacity: 0.25; filter: grayscale(1); transition: 0.3s; }
        .player-row-ghost:hover { opacity: 0.6; }

        @keyframes shimmer  { 0%{background-position:-600px 0} 100%{background-position:600px 0} }
        .skel { background: linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.1) 50%,rgba(255,255,255,0.04) 75%); background-size:600px 100%; animation:shimmer 1.4s infinite linear; border-radius:8px; }
        .skel-card { background:rgba(10,15,25,0.98); border:1px solid rgba(255,255,255,0.06); border-radius:24px; padding:24px; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; }

        .error-banner { background:rgba(220,38,38,0.12); border:1px solid rgba(220,38,38,0.35); border-radius:16px; padding:14px 20px; margin-bottom:20px; display:flex; align-items:center; gap:12px; animation:slideIn 0.3s ease-out; }
        .error-dot { width:8px; height:8px; border-radius:50%; background:#ef4444; flex-shrink:0; animation:blink 2s infinite; }

        .share-btn { font-size:9px; font-family:'Orbitron',sans-serif; font-weight:900; letter-spacing:0.1em; text-transform:uppercase; padding:4px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:#64748b; transition:0.2s; cursor:pointer; }
        .share-btn:hover { color:var(--owner-color); border-color:var(--owner-color); }

        #splash { position:fixed; inset:0; z-index:999; background:radial-gradient(circle at 50% 40%,#0f172a,#020617); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; transition:opacity 0.8s ease,transform 0.8s ease; }
        #splash.hide { opacity:0; transform:scale(1.04); pointer-events:none; }
        .sp { opacity:0; }
        .sp1 { animation:fadeUp 0.6s ease 0.2s forwards; }
        .sp2 { animation:fadeUp 0.7s ease 0.5s forwards; }
        .sp3 { animation:fadeUp 0.7s ease 0.75s forwards; }
        .sp4 { animation:fadeUp 0.6s ease 1.0s forwards; }
        .sp5 { animation:fadeUp 0.6s ease 1.1s forwards; }
        .sp6 { animation:fadeUp 0.7s ease 1.2s forwards; }
        .sp7 { animation:fadeUp 0.6s ease 1.8s forwards, blink 1.4s ease 2.4s infinite; }

        @keyframes fadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
        #player-search::placeholder { color:#334155; }
        #player-search:focus { border-color:rgba(255,255,255,0.2); }
        .search-item:hover { background:rgba(255,255,255,0.05); }
        #search-dropdown::-webkit-scrollbar { width:4px; }
        #search-dropdown::-webkit-scrollbar-track { background:transparent; }
        #search-dropdown::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
        @keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
        @keyframes blink      { 0%,100%{opacity:0.4} 50%{opacity:1} }
        @keyframes neonPulse  { 0%,100%{opacity:0.7} 50%{opacity:1} }
        @keyframes livePulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
        .live-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#4ade80; margin-left:6px; vertical-align:middle; flex-shrink:0; animation:livePulse 1.2s ease-in-out infinite; box-shadow:0 0 6px #4ade80; }
        @keyframes todayGlow  { 0%,100%{box-shadow:0 0 12px 2px rgba(241,196,15,0.15),inset 0 0 0 1px rgba(241,196,15,0.2)} 50%{box-shadow:0 0 26px 8px rgba(241,196,15,0.32),inset 0 0 0 1px rgba(241,196,15,0.5)} }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- SPLASH -->
    <div id="splash" onclick="dismissSplash()">
        <p class="sp sp1" style="font-size:9px;font-family:Orbitron,sans-serif;font-weight:700;letter-spacing:0.4em;color:#475569;text-transform:uppercase;margin-bottom:2rem;">IPL Fantasy League</p>
        <h1 class="sp sp2" style="font-family:Orbitron,sans-serif;font-weight:900;font-style:italic;font-size:clamp(2.8rem,12vw,5rem);line-height:1;color:#f1c40f;text-shadow:0 0 40px rgba(241,196,15,0.35);text-transform:uppercase;letter-spacing:-0.02em;">Revo</h1>
        <p class="sp sp3" style="font-family:Orbitron,sans-serif;font-size:clamp(0.65rem,3vw,0.85rem);font-weight:700;letter-spacing:0.25em;color:#64748b;text-transform:uppercase;margin-top:0.75rem;">IPL 2026 Championship</p>
        <div class="sp sp4" style="width:60px;height:1px;background:rgba(241,196,15,0.3);margin:2.5rem auto;"></div>
        <p class="sp sp5" style="font-size:8px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:#334155;margin-bottom:0.5rem;">Designed by</p>
        <p class="sp sp6" style="font-family:Orbitron,sans-serif;font-size:clamp(0.75rem,3.5vw,1rem);font-weight:900;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase;">Vedant Bhansali</p>
        <p class="sp sp7" style="margin-top:3.5rem;font-size:9px;font-family:Orbitron,sans-serif;font-weight:700;letter-spacing:0.4em;color:#475569;text-transform:uppercase;cursor:pointer;">Tap anywhere to enter →</p>
    </div>

    <div class="max-w-xl mx-auto pb-24">
        <header class="mb-10 text-center">
            <div class="flex justify-between items-center mb-8 px-2">
                <div class="role-tag uppercase tracking-widest px-3 py-1">EST. 2026</div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div id="match-counter" class="role-tag tracking-widest text-yellow-500 uppercase px-3 py-1">MATCHES: —/74</div>
                    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme"
                        style="width:32px;height:32px;border-radius:50%;border:1px solid var(--glass-border);background:var(--glass-bg);backdrop-filter:var(--glass-blur);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.3s;font-size:15px;">🌙</button>
                </div>
            </div>
            <h1 class="text-5xl font-black font-cyber gold-glow italic tracking-tighter mb-6 uppercase">REVOLUTION</h1>
            <div style="width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;">
                <div style="display:flex;justify-content:center;gap:6px;background:rgba(0,0,0,0.4);padding:5px;border-radius:18px;border:1px solid rgba(255,255,255,0.05);min-width:fit-content;margin:0 auto;">
                    <button onclick="switchTab('main')"     id="btn-main"     class="tab-btn active">Live Ranks</button>
                    <button onclick="switchTab('strategy')" id="btn-strat"    class="tab-btn">Luckiest</button>
                    <button onclick="switchTab('weekly')"   id="btn-weekly"   class="tab-btn">Weekly</button>
                    <button onclick="switchTab('schedule')"  id="btn-schedule"  class="tab-btn">Schedule</button>
                    <button onclick="switchTab('standings')" id="btn-standings" class="tab-btn">Standings</button>
                </div>
            </div>
        </header>

        <div id="error-banner" class="error-banner hidden">
            <div class="error-dot"></div>
            <div>
                <p class="text-xs font-black uppercase tracking-widest text-red-400 mb-0.5">Sync Failed</p>
                <p id="error-msg" class="text-[10px] text-red-300 opacity-70">Could not reach the data sheet. Retrying in 60s…</p>
            </div>
            <button onclick="updateApp()" class="ml-auto text-[9px] font-black uppercase tracking-widest text-red-400 border border-red-500/30 rounded-lg px-3 py-1.5 hover:bg-red-500/10 transition-colors">Retry</button>
        </div>

        <div id="view-main" class="space-y-6">
            <!-- TODAY'S MATCH BAR -->
            <div id="today-match-bar"></div>
            <!-- PLAYER SEARCH -->
            <div style="position:relative;">
                <input id="player-search" type="text" placeholder="Search player…"
                    oninput="onSearchInput(this.value)"
                    onfocus="onSearchInput(this.value)"
                    style="width:100%;background:rgba(10,15,25,0.98);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:12px 16px 12px 38px;color:#f8fafc;font-size:12px;font-family:Inter,sans-serif;font-weight:600;outline:none;box-sizing:border-box;"
                    autocomplete="off">
                <svg style="position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:0.3;pointer-events:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <div id="search-dropdown" style="display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:rgba(8,12,20,0.99);border:1px solid rgba(255,255,255,0.1);border-radius:14px;overflow:hidden;z-index:100;max-height:320px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.5);"></div>
            </div>
                        <div id="mvp-spotlight"></div>
            <div id="podium-area" class="flex justify-center items-end gap-3 mb-16 h-48 text-center px-2"></div>
            <div id="streak-tracker"></div>
            <div id="leaderboard" class="space-y-2"></div>
        </div>

        <div id="view-strategy" class="hidden space-y-4 pt-4">
            <div id="strategy-list" class="space-y-4"></div>
        </div>

        <div id="view-weekly" class="hidden pt-4">
            <div id="weekly-list" class="space-y-4"></div>
        </div>

        <div id="view-schedule" class="hidden pt-4">
            <div id="schedule-list"></div>
        </div>

        <div id="view-standings" class="hidden pt-4">
            <div id="standings-list"></div>
        </div>

        <footer class="text-center py-20 opacity-20 font-cyber text-[8px] uppercase tracking-[0.6em]">
            Precision Sync • Vedant Bhansali Edition
        </footer>
    </div>

    <script>
        const SHEET_ID             = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const TOTAL_SEASON_MATCHES = 74;

        const ownerColors = {
            vedant:'#3498db', deep:'#e74c3c',    shlok:'#2ecc71',
            rahul:'#9b59b6',  soni:'#f1c40f',    dheer:'#e67e22',
            kunal:'#1abc9c',  puneet:'#ff9f43',  vivek:'#54a0ff',
            bokaria:'#5f27cd',prakshal:'#48dbfb', rishi:'#ff6b6b',
            aamer:'#1dd1a1',  yashshah:'#f368e0', jash:'#e67e22',
        };

        function getColor(raw) {
            const n = fixID(raw);
            if (ownerColors[n]) return ownerColors[n];
            for (const w of n.split(/\s+/)) if (ownerColors[w]) return ownerColors[w];
            if (ownerColors[n.replace(/\s/g,'')]) return ownerColors[n.replace(/\s/g,'')];
            return '#64748b';
        }
        const fixID = s => s ? s.toString().toLowerCase().trim() : '';

        const IPL_TEAMS = {
            MI:{color:'#004BA0',accent:'#89CFF0'}, CSK:{color:'#F4C430',accent:'#ffffff'},
            RCB:{color:'#C8102E',accent:'#FFD700'}, KKR:{color:'#3A225D',accent:'#B8960C'},
            SRH:{color:'#F26522',accent:'#1a1a1a'}, DC:{color:'#00529A',accent:'#E8001C'},
            PBKS:{color:'#ED1C24',accent:'#DCDDDF'}, RR:{color:'#EA1A85',accent:'#254AA5'},
            GT:{color:'#1D4E89',accent:'#C8A84B'}, LSG:{color:'#A4D65E',accent:'#1a1a1a'},
        };

        function teamBadgeSVG(code, size=110) {
            const t = IPL_TEAMS[code]; if (!t) return '';
            const fs = code.length <= 2 ? 22 : code.length === 3 ? 18 : 14;
            return `<svg viewBox="0 0 100 115" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="sg${code}" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="${t.color}" stop-opacity="0.9"/>
                    <stop offset="100%" stop-color="${t.color}" stop-opacity="0.5"/>
                </linearGradient></defs>
                <path d="M50 4 L92 18 L92 54 C92 80 50 110 50 110 C50 110 8 80 8 54 L8 18 Z"
                      fill="url(#sg${code})" stroke="${t.accent}" stroke-width="2" stroke-opacity="0.6"/>
                <text x="50" y="${fs<=14?62:60}" text-anchor="middle" font-family="Orbitron,sans-serif"
                      font-size="${fs}" font-weight="900" fill="${t.accent}" fill-opacity="0.95" letter-spacing="1">${code}</text>
            </svg>`;
        }

        function getDominantTeams(squad) {
            if (!squad || !squad.length) return [];
            const counts = {};
            squad.forEach(p => { const t=(p.team||'').toString().trim().toUpperCase(); if(t) counts[t]=(counts[t]||0)+1; });
            const max = Math.max(...Object.values(counts));
            return Object.entries(counts).filter(([,v])=>v===max).map(([t])=>t).filter(t=>IPL_TEAMS[t]);
        }

        // ── SPLASH ──
        function dismissSplash() {
            const s = document.getElementById('splash');
            s.classList.add('hide');
            setTimeout(() => s.remove(), 900);
        }
        setTimeout(dismissSplash, 5000);

        const TAB_ORDER = ['main','strategy','weekly','schedule','standings'];
        let _currentTab = 'main';

        function switchTab(t, animate) {
            const views = { main:'view-main', strategy:'view-strategy', weekly:'view-weekly', schedule:'view-schedule', standings:'view-standings' };
            const btns  = { main:'btn-main', strategy:'btn-strat', weekly:'btn-weekly', schedule:'btn-schedule', standings:'btn-standings' };
            Object.keys(views).forEach(k => {
                const el = document.getElementById(views[k]);
                if (k === t) {
                    el.classList.remove('hidden');
                    if (animate) {
                        el.style.animation = 'none';
                        el.offsetHeight; // reflow
                        el.style.animation = 'slideIn 0.25s ease-out';
                    }
                } else {
                    el.classList.add('hidden');
                }
                document.getElementById(btns[k]).classList.toggle('active', k === t);
            });
            _currentTab = t;
            // Scroll tab button into view
            const btn = document.getElementById(btns[t]);
            if (btn) btn.scrollIntoView({ inline:'center', behavior:'smooth', block:'nearest' });
        }



        function showError(msg) {
            document.getElementById('error-msg').textContent = msg || 'Could not reach the data sheet. Retrying in 60s…';
            document.getElementById('error-banner').classList.remove('hidden');
        }
        function hideError() { document.getElementById('error-banner').classList.add('hidden'); }

        function renderSkeleton() {
            document.getElementById('podium-area').innerHTML = `
                <div style="display:flex;justify-content:center;align-items:flex-end;gap:12px;width:100%;height:192px;">
                    <div class="w-1/3"><div class="skel w-full h-24" style="border-radius:12px 12px 0 0"></div></div>
                    <div class="w-1/3"><div class="skel w-full h-40" style="border-radius:12px 12px 0 0"></div></div>
                    <div class="w-1/3"><div class="skel w-full h-16" style="border-radius:12px 12px 0 0"></div></div>
                </div>`;
            document.getElementById('leaderboard').innerHTML = Array.from({length:6}).map(()=>`
                <div class="skel-card">
                    <div class="flex items-center gap-5"><div class="skel w-4 h-4 rounded"></div><div class="skel w-28 h-3 rounded"></div></div>
                    <div class="skel w-12 h-6 rounded"></div>
                </div>`).join('');
            document.getElementById('mvp-spotlight').innerHTML = `
                <div class="skel-card mb-6" style="border-radius:20px;padding:15px 20px;">
                    <div><div class="skel w-32 h-2 rounded mb-3"></div><div class="skel w-40 h-5 rounded mb-2"></div><div class="skel w-24 h-2 rounded"></div></div>
                    <div class="skel w-14 h-8 rounded"></div>
                </div>`;
        }

        async function fetchSheet(name) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=${encodeURIComponent(name)}`;
            const r = await fetch(url);
            if (!r.ok) throw new Error(`Sheet fetch failed: ${name} (${r.status})`);
            const t = await r.text();
            const j = JSON.parse(t.substr(47).slice(0,-2));
            return j.table.rows.map(row => row.c.map(cell => cell ? (cell.v !== null ? cell.v : '') : ''));
        }

        // Global state — used by shareCard
        let _state = { squads:{}, cumulScores:{}, completedMatches:[] };

        async function updateApp() {
            hideError();
            if (!document.getElementById('leaderboard').querySelector('.glass-card')) renderSkeleton();

            try {
                const [lbRows, rosRows, pcRows, schedRows, standRows] = await Promise.all([
                    fetchSheet('Leaderboard'),
                    fetchSheet('Roster'),
                    fetchSheet('PointsCalc'),
                    fetchSheet('Schedule').catch(() => []),
                    fetchSheet('Standings').catch(() => []),
                ]);

                // Completed matches
                const completedMatches = [...new Set(
                    pcRows.filter(r => r[0] && parseFloat(r[6]) > 0).map(r => r[0].toString().trim())
                )];
                document.getElementById('match-counter').innerText = `MATCHES: ${completedMatches.length}/${TOTAL_SEASON_MATCHES}`;

                // Player cumulative points
                const pPoints = {};
                pcRows.forEach(row => {
                    if (!row[1]) return;
                    const k = fixID(row[1]);
                    const v = parseFloat(row[6]) || 0;
                    const m = parseFloat(row[5]) || 1;
                    if (!pPoints[k]) pPoints[k] = { act:0, raw:0 };
                    pPoints[k].act += v;
                    pPoints[k].raw += (v / m);
                });

                // Last match MVP
                let matchPlayers = [], lastMatchName = '';
                if (pcRows.length) {
                    lastMatchName = pcRows[pcRows.length-1][0];
                    pcRows.forEach(r => {
                        if (r[0] === lastMatchName)
                            matchPlayers.push({ name:r[1], pts:parseFloat(r[6])||0, owner:r[2] });
                    });
                }

                // Squads
                const squads = {};
                rosRows.forEach(row => {
                    const oKey = fixID(row[1]);
                    if (!oKey || oKey.includes('owner')) return;
                    if (!squads[oKey]) squads[oKey] = [];
                    const stats = pPoints[fixID(row[0])] || { act:0, raw:0 };
                    squads[oKey].push({
                        name:row[0], team:row[4], role:row[6],
                        act:Math.round(stats.act), raw:stats.raw,
                        cvc: parseFloat(row[2])===2 ? 'C' : parseFloat(row[2])===1.5 ? 'VC' : ''
                    });
                });

                // Owners
                let owners = lbRows.map(row => {
                    const full = row[0] ? row[0].toString().trim() : '';
                    const id   = full.toLowerCase();
                    if (!full || ['owner name','owner','name'].includes(id)) return null;
                    return { full, score: Math.round(parseFloat(row[1]))||0, id, first:full.split(' ')[0] };
                }).filter(Boolean);

                const active  = owners.filter(o => o.id !== 'unsold').sort((a,b) => b.score - a.score);
                const unsold  = owners.find(o => o.id === 'unsold');
                const allOwners = unsold ? [...active, unsold] : active;

                // Build cumulative scores (for streak + sparklines)
                const cumulScores = buildCumulScores(active, pcRows, completedMatches);

                // Save to global state
                _state = { squads, cumulScores, completedMatches, rosRows, pPoints, pcRows, active, schedRows };

                // Render
                renderMVP(matchPlayers.sort((a,b) => b.pts-a.pts)[0], lastMatchName);
                renderPodium(active);
                renderStreakTracker(active, cumulScores, completedMatches);
                renderLeaderboard(allOwners, squads, cumulScores);
                renderStrategy(active, squads);
                if (schedRows && schedRows.length) renderSchedule(schedRows);
                renderTodayBar(schedRows || []);
                renderWeekly(active, pcRows, completedMatches, squads);
                renderRankArrows(active);
                if (!window._confettiFired) { window._confettiFired = true; setTimeout(fireConfetti, 800); }
                renderStandings(standRows || []);

            } catch(e) {
                console.error('Sync Error:', e);
                showError(e.message || 'Could not reach the data sheet. Retrying in 60s…');
            }
        }

        function buildCumulScores(owners, pcRows, completedMatches) {
            const cumul   = {}, running = {};
            owners.forEach(o => { cumul[o.id]=[]; running[o.id]=0; });

            const nameToId = {};
            owners.forEach(o => {
                nameToId[fixID(o.full)]  = o.id;
                nameToId[fixID(o.first)] = o.id;
                nameToId[o.id]           = o.id;
            });

            completedMatches.forEach(matchName => {
                const totals = {};
                pcRows
                    .filter(r => r[0] && r[0].toString().trim() === matchName && r[2])
                    .forEach(r => {
                        const raw = fixID(r[2]);
                        const id  = nameToId[raw]
                            || owners.find(o => raw.includes(o.id) || o.id.includes(raw))?.id;
                        if (!id) return;
                        totals[id] = (totals[id]||0) + (parseFloat(r[6])||0);
                    });
                owners.forEach(o => {
                    running[o.id] += (totals[o.id]||0);
                    cumul[o.id].push(Math.round(running[o.id]));
                });
            });
            return cumul;
        }

        function renderStreakTracker(owners, cumulScores, completedMatches) {
            const el = document.getElementById('streak-tracker');
            if (!el || completedMatches.length === 0) return;

            const leadCount = {};
            owners.forEach(o => leadCount[o.id] = 0);
            for (let m = 0; m < completedMatches.length; m++) {
                let best=-1, bestId=null;
                owners.forEach(o => { const s=(cumulScores[o.id]||[])[m]||0; if(s>best){best=s;bestId=o.id;} });
                if (bestId) leadCount[bestId]++;
            }

            const leader = [...owners].sort((a,b) => b.score-a.score)[0];
            let streak = 0;
            if (leader) {
                for (let m = completedMatches.length-1; m >= 0; m--) {
                    let best=-1, bestId=null;
                    owners.forEach(o => { const s=(cumulScores[o.id]||[])[m]||0; if(s>best){best=s;bestId=o.id;} });
                    if (bestId === leader.id) streak++; else break;
                }
            }

            const sorted = [...owners].sort((a,b) => (leadCount[b.id]||0)-(leadCount[a.id]||0));
            const lc     = leader ? getColor(leader.id) : '#f1c40f';

            el.innerHTML = `
                <div style="background:rgba(10,15,25,0.98);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:18px 20px;margin-bottom:1rem;">

                    ${leader && streak > 0 ? `

                        </div>
                        <div style="text-align:right;">
                            <p style="font-family:Orbitron,sans-serif;font-size:28px;font-weight:900;color:${lc};line-height:1;">${streak}</p>
                            <p style="font-size:8px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:0.2em;">match days</p>
                        </div>
                    </div>` : ''}
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        ${sorted.slice(0,5).map((o,i) => {
                            const c=getColor(o.id), cnt=leadCount[o.id]||0;
                            const pct=Math.round((cnt/completedMatches.length)*100);
                            return `<div style="display:flex;align-items:center;gap:10px;">
                                <span style="font-size:8px;font-weight:900;color:#334155;width:14px;">${i+1}</span>
                                <span style="font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;flex:1;">${o.first}</span>
                                <div style="flex:2;background:rgba(255,255,255,0.04);border-radius:4px;height:4px;overflow:hidden;">
                                    <div style="height:100%;width:${pct}%;background:${c};border-radius:4px;transition:width 0.8s ease;"></div>
                                </div>
                                <span style="font-family:Orbitron,sans-serif;font-size:9px;font-weight:900;color:${c};min-width:28px;text-align:right;">${cnt}d</span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

                    if (m.dateObj && isToday(m.dateObj.ts)) {
                        playing.add(m.t1.toUpperCase());
                        playing.add(m.t2.toUpperCase());

                });
            }
            return playing;

        const SITE_URL = 'revolution-ipl-2026.vercel.app';

        async function shareCard(cID, ownerFull, score, rank) {
            const color = getColor(cID.replace('c-','').replace(/-/g,' '));
            const squad = (_state.squads[fixID(ownerFull)] || []).sort((a,b) => b.act - a.act);

            // Identify C and VC
            const captain = squad.find(p => p.cvc === 'C');
            const vice    = squad.find(p => p.cvc === 'VC');

            // Canvas dimensions — extra rows for C/VC block + URL footer
            const PLAYER_ROW_H = 24;
            const W  = 600;
            const H  = 240                          // header block
                     + 50                           // C/VC block
                     + 16                           // divider gap
                     + Math.max(squad.length,1) * PLAYER_ROW_H
                     + 60;                          // footer

            const canvas = document.createElement('canvas');
            canvas.width = W*2; canvas.height = H*2;
            const ctx = canvas.getContext('2d');
            ctx.scale(2,2);

            // ── Background ──
            const bg = ctx.createLinearGradient(0,0,W,H);
            bg.addColorStop(0,'#0f172a'); bg.addColorStop(1,'#020617');
            ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

            // Top accent bar
            ctx.fillStyle = color; ctx.fillRect(0,0,W,4);

            // Glow blob
            const glow = ctx.createRadialGradient(W*0.78,H*0.2,0,W*0.78,H*0.2,200);
            glow.addColorStop(0, color+'28'); glow.addColorStop(1,'transparent');
            ctx.fillStyle = glow; ctx.fillRect(0,0,W,H);

            // ── Rank ──
            ctx.font = '700 10px monospace'; ctx.fillStyle = color+'99';
            ctx.fillText(`RANK #${rank}  ·  REVOLUTION IPL 2026`, 28, 46);

            // ── Owner name ──
            ctx.font = '900 28px monospace'; ctx.fillStyle = '#f8fafc';
            ctx.fillText(ownerFull.toUpperCase(), 28, 80);

            // ── Score (right-aligned) ──
            ctx.font = '900 44px monospace'; ctx.fillStyle = color;
            ctx.textAlign = 'right';
            ctx.fillText(score, W-28, 80);
            ctx.textAlign = 'left';

            // ── Sub label ──
            ctx.font = '600 9px monospace'; ctx.fillStyle = '#334155';
            ctx.fillText('TOTAL POINTS', 28, 100);

            // ── Divider ──

        function fireConfetti() {
            const colors = ['#f1c40f','#3498db','#2ecc71','#e74c3c','#9b59b6','#f368e0','#1abc9c','#ff9f43'];
            const count  = 90;
            const origin = { x: window.innerWidth/2, y: 0 };

            for (let i = 0; i < count; i++) {
                const el   = document.createElement('div');
                const size = Math.random()*8+4;
                const col  = colors[Math.floor(Math.random()*colors.length)];
                const isRect = Math.random() > 0.5;
                el.style.cssText = `
                    position:fixed;z-index:9999;pointer-events:none;
                    width:${isRect?size+'px':'6px'};height:${isRect?size*0.4+'px':size+'px'};
                    background:${col};border-radius:${isRect?'1px':'50%'};
                    left:${origin.x + (Math.random()-0.5)*120}px;
                    top:${origin.y}px;opacity:1;`;
                document.body.appendChild(el);

                const angle  = (Math.random()*160 + 10) * Math.PI/180;
                const speed  = Math.random()*12+6;
                const vx     = Math.cos(angle)*speed*(Math.random()>0.5?1:-1);
                const vy     = Math.sin(angle)*speed+4;
                const spin   = (Math.random()-0.5)*20;
                let   posX   = parseFloat(el.style.left);
                let   posY   = parseFloat(el.style.top);
                let   velY   = -vy;
                let   rot    = 0;
                let   life   = 0;
                const maxLife = 80 + Math.floor(Math.random()*40);

                const tick = () => {
                    life++;
                    posX  += vx * 0.6;
                    velY  += 0.35;
                    posY  += velY;
                    rot   += spin;
                    const opacity = Math.max(0, 1 - life/maxLife);
                    el.style.left      = posX + 'px';
                    el.style.top       = posY + 'px';
                    el.style.opacity   = opacity;
                    el.style.transform = `rotate(${rot}deg)`;
                    if (life < maxLife && posY < window.innerHeight + 40) requestAnimationFrame(tick);
                    else el.remove();
                };
                setTimeout(() => requestAnimationFrame(tick), i * 12);
            }
        }

        // ── SCHEDULE HELPERS ──
        const TEAM_NAME_MAP = {
            'royal challengers bengaluru':'RCB','royal challengers bangalore':'RCB',
            'mumbai indians':'MI','chennai super kings':'CSK',
            'kolkata knight riders':'KKR','sunrisers hyderabad':'SRH',
            'rajasthan royals':'RR','punjab kings':'PBKS',
            'gujarat titans':'GT','lucknow super giants':'LSG','delhi capitals':'DC',
        };
        const MONTH_SHORT = {
            'jan':'Jan','feb':'Feb','mar':'Mar','apr':'Apr','may':'May','jun':'Jun',
            'jul':'Jul','aug':'Aug','sep':'Sep','oct':'Oct','nov':'Nov','dec':'Dec'
        };
        const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        function toCode(raw) {
            if (!raw) return 'TBD';
            const s = raw.toString().trim();
            const low = s.toLowerCase();
            if (TEAM_NAME_MAP[low]) return TEAM_NAME_MAP[low];
            if (s.length <= 4) return s.toUpperCase();
            return s; // fallback keep as-is, truncate in render
        }

        // Parse "28-Mar-2026" → { display:"28 Mar", month:"Apr 2026", dayStr:"Sat", ts:Date }
        function parseDate(raw) {
            if (!raw) return { display:'TBD', month:'Playoffs', dayStr:'', ts:null };
            const s = raw.toString().trim();

            // Handle GViz Date(yyyy,m,d) just in case
            const gm = s.match(/Date\((\d+),(\d+),(\d+)\)/);
            if (gm) {
                const dt = new Date(+gm[1], +gm[2], +gm[3]);
                return {
                    display: String(dt.getDate()).padStart(2,'0') + ' ' + MONTH_SHORT[dt.toLocaleString('en',{month:'short'}).toLowerCase()],
                    month:   dt.toLocaleString('en',{month:'short'}) + ' ' + dt.getFullYear(),
                    dayStr:  DAY_NAMES[dt.getDay()], ts: dt
                };
            }

            // Handle "28-Mar-2026"
            const dm = s.match(/(\d{1,2})-([A-Za-z]+)-(\d{4})/);
            if (dm) {
                const d = parseInt(dm[1]), monStr = dm[2].toLowerCase(), y = parseInt(dm[3]);
                const monIdx = Object.keys(MONTH_SHORT).indexOf(monStr);
                const dt = new Date(y, monIdx >= 0 ? monIdx : 0, d);
                return {
                    display: String(d).padStart(2,'0') + ' ' + (MONTH_SHORT[monStr] || dm[2]),
                    month:   (MONTH_SHORT[monStr] || dm[2]) + ' ' + y,
                    dayStr:  DAY_NAMES[dt.getDay()], ts: dt
                };
            }

            // Handle "2026-03-28"
            const iso = s.match(/(\d{4})-(\d{2})-(\d{2})/);
            if (iso) {
                const dt = new Date(+iso[1], +iso[2]-1, +iso[3]);
                const mon = MONTH_SHORT[dt.toLocaleString('en',{month:'short'}).toLowerCase()];
                return {
                    display: String(dt.getDate()).padStart(2,'0') + ' ' + mon,
                    month:   mon + ' ' + dt.getFullYear(),
                    dayStr:  DAY_NAMES[dt.getDay()], ts: dt
                };
            }

            return { display: s, month: 'Upcoming', dayStr:'', ts:null };
        }

        // Shorten result: "Royal Challengers Bengaluru won by 43 runs" → "won by 43 runs"
        // or "Chennai Super Kings won by 5 wickets" → "won by 5 wkts"
        function shortResult(raw, winnerFull) {
            if (!raw) return '';
            let s = raw.toString().trim();
            // Remove the winning team name from the front
            if (winnerFull) {
                const re = new RegExp('^' + winnerFull.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\s*', 'i');
                s = s.replace(re, '');
            }
            // Normalise "wickets" → "wkts", "runs" stays
            s = s.replace(/\bwickets\b/gi,'wkts').replace(/\bwicket\b/gi,'wkt');
            // Trim
            return s.length > 28 ? s.substring(0,26) + '…' : s;
        }

        function isToday(ts) {
            if (!ts) return false;
            const now = new Date();
            return ts.getDate()===now.getDate() && ts.getMonth()===now.getMonth() && ts.getFullYear()===now.getFullYear();
        }

        function renderSchedule(rows) {

                        const t2Full     = (r[4] || '').toString().trim();
                        const winnerFull = (r[6] || '').toString().trim();
                        return {
                            m:       parseInt(r[0]),
                            dateObj,
                            t1:      toCode(t1Full),
                            t2:      toCode(t2Full),
                            winner:  winnerFull ? toCode(winnerFull) : null,

                            result:  shortResult(r[7], winnerFull),
                        };
                    });

        // ── PLAYER SEARCH ──
        let _allPlayers = [];

        function buildPlayerIndex() {
            const { rosRows, pPoints } = _state;
            if (!rosRows) return;
            _allPlayers = [];
            rosRows.forEach(row => {
                const name  = (row[0] || '').toString().trim();
                const owner = (row[1] || '').toString().trim();
                const team  = (row[4] || '').toString().trim();
                const role  = (row[6] || '').toString().trim();
                if (!name || fixID(owner).includes('owner')) return;
                const stats = pPoints[fixID(name)] || { act: 0 };
                _allPlayers.push({ name, owner, team, role, pts: Math.round(stats.act) });
            });
        }

        function onSearchInput(q) {
            const dd = document.getElementById('search-dropdown');
            buildPlayerIndex();
            const query = q.trim().toLowerCase();
            if (!query) { dd.style.display = 'none'; return; }

            const results = _allPlayers
                .filter(p => p.name.toLowerCase().includes(query) || p.team.toLowerCase().includes(query))
                .sort((a, b) => b.pts - a.pts)
                .slice(0, 12);

            if (!results.length) {
                dd.style.display = 'block';
                dd.innerHTML = `<div style="padding:14px 16px;font-size:11px;color:#475569;text-align:center;">No players found</div>`;
                return;
            }

            dd.style.display = 'block';
            dd.innerHTML = results.map(p => {
                const color  = getColor(fixID(p.owner));
                const tc     = TEAM_COLORS[p.team.toUpperCase()] || '#334155';
                return `
                <div class="search-item" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:0.15s;border-bottom:1px solid rgba(255,255,255,0.04);"
                     data-ownerid="${fixID(p.owner)}" onclick="navigateToOwner(this.dataset.ownerid)">
                    <div style="flex:1;min-width:0;">
                        <p style="font-size:12px;font-weight:800;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</p>
                        <p style="font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;margin-top:2px;">

                        <p style="font-size:7px;color:#334155;text-transform:uppercase;font-weight:700;">pts</p>
                    </div>

        function closeSearch() {
            document.getElementById('player-search').value = '';
            document.getElementById('search-dropdown').style.display = 'none';
        }

        function navigateToOwner(ownerId) {
            closeSearch();
            switchTab('main');
            const cID  = 'c-' + ownerId.replace(/\s+/g, '-');

            if (!card) return;
            const sq = document.getElementById('sq-' + cID);

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light');
            document.getElementById('theme-toggle').textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('revo-theme', isLight ? 'light' : 'dark');

                // ── RANK CHANGE ARROWS ──
        let _prevRanks = {};
        function renderRankArrows(active) {
            active.forEach((o, i) => {
                const cID  = 'c-' + o.id.replace(/\s+/g, '-');
                const card = document.getElementById(cID);
                if (!card) return;
                const rankEl = card.querySelector('.font-cyber.text-lg');
                if (!rankEl) return;
                const prev = _prevRanks[o.id];
                const curr = i + 1;
                if (prev !== undefined && prev !== curr) {
                    const up    = curr < prev;
                    const arrow = document.createElement('span');
                    arrow.textContent = up ? ' ↑' : ' ↓';
                    arrow.style.cssText = `font-size:10px;font-weight:900;color:${up?'#4ade80':'#f87171'};opacity:1;transition:opacity 2s ease;`;
                    rankEl.appendChild(arrow);
                    setTimeout(() => arrow.style.opacity = '0', 2500);
                    setTimeout(() => arrow.remove(), 4500);
                }
                _prevRanks[o.id] = curr;
            });
        }

        // ── WEEKLY REPORT ──
        function renderWeekly(active, pcRows, completedMatches, squads) {
            const el = document.getElementById('weekly-list');
            if (!el || !completedMatches.length) return;

            const last7 = completedMatches.slice(-7);
            const all   = completedMatches;

            const weeklyData = active.map(o => {
                let weekPts = 0, bestPlayer = null, bestPts = 0;
                pcRows.forEach(r => {
                    if (!r[1] || !r[2]) return;
                    const ownerRaw = fixID(r[2]);
                    const isOwner  = ownerRaw === o.id ||
                                     ownerRaw.includes(o.id.split(' ')[0]) ||
                                     o.id.includes(ownerRaw.split(' ')[0]);
                    if (!isOwner) return;
                    const pts   = parseFloat(r[6]) || 0;
                    const match = r[0] ? r[0].toString().trim() : '';
                    if (last7.includes(match)) {
                        weekPts += pts;
                        if (pts > bestPts) { bestPts = pts; bestPlayer = r[1]; }
                    }
                });

                const avgMatch = all.length > 0 ? o.score / all.length : 0;
                const weekAvg  = last7.length > 0 ? weekPts / last7.length : 0;
                const trend    = weekAvg > avgMatch ? 'hot' : weekAvg < avgMatch * 0.8 ? 'cold' : 'steady';
                return { ...o, weekPts: Math.round(weekPts), avgMatch: Math.round(avgMatch), weekAvg: Math.round(weekAvg), trend, bestPlayer, bestPts: Math.round(bestPts) };
            }).sort((a, b) => b.weekPts - a.weekPts);

            // Header banner
            const headerHTML = `
                <div style="background:rgba(10,15,25,0.98);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:16px 20px;margin-bottom:1rem;position:relative;overflow:hidden;">

                </div>`;

            const cardsHTML = weeklyData.map((d, i) => {
                const color   = getColor(d.id);
                const tIcon   = d.trend === 'hot' ? '🔥' : d.trend === 'cold' ? '🧊' : '➡️';
                const tColor  = d.trend === 'hot' ? '#4ade80' : d.trend === 'cold' ? '#60a5fa' : '#94a3b8';
                const weekPct = d.avgMatch > 0 ? Math.min(100, Math.round((d.weekAvg / d.avgMatch) * 100)) : 50;
                const isLeader = i === 0;

                return `
                <div style="
                    background:rgba(10,15,25,0.98);
                    border:1px solid ${isLeader ? color+'55' : 'rgba(255,255,255,0.07)'};
                    border-left:3px solid ${color};

                    padding:16px 20px;
                    margin-bottom:8px;

                ">
                    <!-- owner color glow bg -->
                    <div style="position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:${color};opacity:0.04;pointer-events:none;filter:blur(20px);"></div>

                    <!-- rank + name + trend row -->
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;position:relative;z-index:1;">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <span style="font-family:Orbitron,sans-serif;font-size:${isLeader?'16':'11'}px;font-weight:900;color:${isLeader?color:'#334155'};${isLeader?'text-shadow:0 0 10px '+color+'66;':''}">
                                ${isLeader ? '👑' : i+1}
                            </span>
                            <div>
                                <p style="font-family:Orbitron,sans-serif;font-size:13px;font-weight:900;color:#f1f5f9;text-transform:uppercase;letter-spacing:0.05em;">${d.first}</p>
                                <p style="font-size:9px;font-weight:700;color:#475569;margin-top:2px;letter-spacing:0.05em;">
                                    ${tIcon} <span style="color:${tColor}">${d.trend.toUpperCase()}</span>
                                    <span style="color:#334155;margin:0 4px;">·</span>
                                    <span>${d.weekAvg} avg/match</span>
                                </p>
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <p style="font-family:Orbitron,sans-serif;font-size:26px;font-weight:900;color:${color};line-height:1;text-shadow:0 0 12px ${color}55;">${d.weekPts}</p>

                </div>`;
            }).join('');

            el.innerHTML = headerHTML + cardsHTML;
        }

                <span style="font-size:8px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.1em;">Eliminated Zone</span>
            </div>
        </div>`;

    el.innerHTML = headerHTML + colHeader + rowsHTML + legendHTML;
}
        updateApp();
        startPolling();
    </script>
