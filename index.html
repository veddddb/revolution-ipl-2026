<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(10, 15, 25, 0.98); --border: rgba(255, 255, 255, 0.08); }
        body { background: radial-gradient(circle at top, #0f172a 0%, #020617 100%) no-repeat; background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 1rem; position: relative; overflow: hidden; cursor: pointer; }
        .glass-card:hover { transform: translateY(-4px); border-color: var(--owner-color, var(--accent)); box-shadow: 0 0 30px -5px var(--owner-glow, rgba(241, 196, 15, 0.2)); z-index: 20; }
        .logo-bg { position: absolute; right: 10%; top: 50%; transform: translateY(-50%); width: 120px; height: 120px; opacity: 0.12; pointer-events: none; z-index: 0; filter: blur(1px); transition: 0.4s ease; }
        .glass-card:hover .logo-bg { opacity: 0.35; filter: blur(0px); transform: translateY(-50%) scale(1.1); }
        .podium-pillar { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.05); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 10px; }
        .podium-rank-label { font-family: 'Orbitron'; font-size: 8px; font-weight: 900; opacity: 0.5; color: white; letter-spacing: 1px; margin-top: 2px; }
        .trophy-bg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; opacity: 0.08; color: var(--accent); pointer-events: none; }
        .role-tag { font-size: 7px; padding: 2px 5px; border-radius: 4px; background: rgba(255, 255, 255, 0.05); color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-left: 5px; }
        .team-tag { font-size: 7px; color: #475569; text-transform: uppercase; font-weight: 800; margin-left: 4px; }
        .badge { font-size: 8px; padding: 1px 5px; border-radius: 4px; font-weight: 900; border: 1px solid currentColor; margin-left: 6px; }
        .mvp-banner { background: linear-gradient(90deg, rgba(241,196,15,0.15) 0%, rgba(241,196,15,0.05) 100%); border: 1px solid rgba(241,196,15,0.3); border-radius: 20px; padding: 15px 20px; margin-bottom: 25px; box-shadow: 0 0 20px rgba(241, 196, 15, 0.1); }
        .tab-btn { padding: 10px 24px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; transition: 0.3s; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: #64748b; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }
        .squad-container { display: none; padding: 0 24px 24px 24px; border-top: 1px solid rgba(255,255,255,0.05); }
        .squad-container.open { display: block; animation: slideIn 0.3s ease-out; }
        
        /* 0-POINT GHOSTING */
        .player-row-ghost { opacity: 0.25; filter: grayscale(1); transition: 0.3s; }
        .player-row-ghost:hover { opacity: 0.6; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-24">
        <header class="mb-10 text-center">
            <div class="flex justify-between items-center mb-8 px-2">
                <div class="role-tag uppercase tracking-widest px-3 py-1">EST. 2026</div>
                <div id="match-counter" class="role-tag tracking-widest text-yellow-500 uppercase px-3 py-1">MATCHES: 0/74</div>
            </div>
            <h1 class="text-5xl font-black font-cyber gold-glow italic tracking-tighter mb-6 uppercase italic">REVOLUTION</h1>
            <div class="flex justify-center gap-3 bg-black/40 p-1.5 rounded-2xl border border-white/5 inline-flex">
                <button onclick="switchTab('main')" id="btn-main" class="tab-btn active">Live Ranks</button>
                <button onclick="switchTab('strategy')" id="btn-strat" class="tab-btn">OPtimal Picks by Manager!</button>
            </div>
        </header>

        <div id="view-main" class="space-y-6">
            <div id="mvp-spotlight"></div>
            <div id="podium-area" class="flex justify-center items-end gap-3 mb-16 h-48 text-center px-2"></div>
            <div id="leaderboard" class="space-y-2"></div>
        </div>

        <div id="view-strategy" class="hidden space-y-4 pt-4">
            <div id="strategy-list" class="space-y-4"></div>
        </div>

        <footer class="text-center py-20 opacity-20 font-cyber text-[8px] uppercase tracking-[0.6em]">
            Precision Sync • Vedant Bhansali Edition
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const TOTAL_SEASON_MATCHES = 74;
        const ownerColors = { "vedant": "#3498db", "vedant bhansali": "#3498db", "deep": "#e74c3c", "shlok": "#2ecc71", "rahul": "#9b59b6", "soni": "#f1c40f", "yash soni": "#f1c40f", "dheer": "#e67e22", "kunal": "#1abc9c", "puneet": "#ff9f43", "vivek": "#54a0ff", "bokaria": "#5f27cd", "prakshal": "#48dbfb", "rishi": "#ff6b6b", "aamer": "#1dd1a1", "yashshah": "#f368e0", "yash shah": "#f368e0", "jash": "#e67e22" };

        const fixID = (str) => str ? str.toString().toLowerCase().trim() : '';

        async function fetchSheet(name) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=${name}`;
            const r = await fetch(url); const t = await r.text();
            const j = JSON.parse(t.substr(47).slice(0, -2));
            return j.table.rows.map(row => row.c.map(cell => cell ? (cell.v !== null ? cell.v : "") : ""));
        }

        function switchTab(t) {
            document.getElementById('view-main').classList.toggle('hidden', t !== 'main');
            document.getElementById('view-strategy').classList.toggle('hidden', t !== 'strategy');
            document.getElementById('btn-main').classList.toggle('active', t === 'main');
            document.getElementById('btn-strat').classList.toggle('active', t === 'strategy');
        }

        async function updateApp() {
            try {
                const [lbRows, rosRows, lsRows, pcRows] = await Promise.all([
                    fetchSheet('Leaderboard'), fetchSheet('Roster'), fetchSheet('Livescore'), fetchSheet('PointsCalc')
                ]);

                const pPoints = {};
                let matchPlayers = [];
                let lastMatchName = "";

                // MATCH COUNTER LOGIC (Counts only matches with points > 0)
                const completedMatches = [...new Set(pcRows
                    .filter(row => row[0] && parseFloat(row[6]) > 0)
                    .map(row => row[0].toString().trim())
                )];
                document.getElementById('match-counter').innerText = `MATCHES: ${completedMatches.length}/${TOTAL_SEASON_MATCHES}`;

                pcRows.forEach(row => {
                    if (!row[1]) return;
                    const pName = fixID(row[1]);
                    const val = parseFloat(row[6]) || 0;
                    const mult = parseFloat(row[5]) || 1;
                    if (!pPoints[pName]) pPoints[pName] = { act: 0, raw: 0 };
                    pPoints[pName].act += val; pPoints[pName].raw += (val / mult);
                });

                if(pcRows.length > 0) {
                    lastMatchName = pcRows[pcRows.length - 1][0];
                    pcRows.forEach(row => { if (row[0] === lastMatchName) matchPlayers.push({ name: row[1], pts: parseFloat(row[6]) || 0, owner: row[2] }); });
                }

                const squads = {};
                rosRows.forEach(row => {
                    const oKey = fixID(row[1]); if (!oKey || oKey.includes('owner')) return;
                    if (!squads[oKey]) squads[oKey] = [];
                    const stats = pPoints[fixID(row[0])] || { act: 0, raw: 0 };
                    squads[oKey].push({ 
                        name: row[0], team: row[4], role: row[6], act: Math.round(stats.act), raw: stats.raw,
                        cvc: parseFloat(row[2]) === 2 ? 'C' : parseFloat(row[2]) === 1.5 ? 'VC' : ''
                    });
                });

                let owners = lbRows.map(row => {
                    const full = row[0] ? row[0].toString().trim() : "";
                    const check = full.toLowerCase();
                    if (check === "owner name" || check === "owner" || check === "" || check === "name") return null;
                    return { full: full, score: Math.round(parseFloat(row[1])) || 0, id: check, first: full.split(' ')[0] };
                }).filter(o => o !== null);

                const activeOnes = owners.filter(o => o.id !== 'unsold').sort((a,b) => b.score - a.score);
                const unsoldOne = owners.find(o => o.id === 'unsold');
                const finalOrder = unsoldOne ? [...activeOnes, unsoldOne] : activeOnes;

                renderMain(finalOrder, squads);
                renderStrategy(activeOnes, squads);
                renderMVP(matchPlayers.sort((a,b) => b.pts - a.pts)[0], lastMatchName);

            } catch (e) { console.error("Sync Error:", e); }
        }

        function renderMain(owners, squads) {
            const pod = document.getElementById('podium-area');
            const top = owners.filter(o => o.id !== 'unsold');
            if(top.length >= 3) {
                pod.innerHTML = `
                <div class="w-1/3 flex flex-col items-center"><span class="text-[9px] font-cyber mb-2 opacity-60 uppercase">${top[1].first}</span><div class="podium-pillar w-full h-24 rounded-t-2xl"><span class="font-cyber text-lg mt-4">${top[1].score}</span><div class="podium-rank-label">2ND</div></div></div>
                <div class="w-1/3 flex flex-col items-center"><span class="text-[10px] font-cyber mb-2 gold-glow italic uppercase tracking-widest">${top[0].first}</span><div class="podium-pillar w-full h-40 rounded-t-2xl border-t-yellow-500 shadow-[0_-10px_30px_rgba(241,196,15,0.1)]"><div class="trophy-bg"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18,2H6V4H2V9C2,12 4.24,14.64 7.28,14.94C8.25,17.29 10.3,19 12.82,19.26V22H10V24H14V22H11.18V19.26C13.7,19 15.75,17.29 16.72,14.94C19.76,14.64 22,12 22,9V4H18V2M4,9V6H6V12.75C4.83,12.28 4,11.23 4,9M18,12.75V6H20V9C20,11.23 19.17,12.28 18,12.75Z"/></svg></div><span class="font-cyber text-2xl font-black relative z-10 mt-12">${top[0].score}</span><div class="podium-rank-label">1ST</div></div></div>
                <div class="w-1/3 flex flex-col items-center"><span class="text-[9px] font-cyber mb-2 opacity-60 uppercase">${top[2].first}</span><div class="podium-pillar w-full h-16 rounded-t-2xl"><span class="font-cyber text-base text-gray-400 mt-2">${top[2].score}</span><div class="podium-rank-label">3RD</div></div></div>`;
            }

            document.getElementById('leaderboard').innerHTML = owners.map((o, i) => {
                const color = ownerColors[o.id] || ownerColors[o.first.toLowerCase()] || '#64748b';
                const squad = squads[o.id] || [];
                const initials = o.full.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                const cID = "c-" + o.id.replace(/\s+/g, '-');

                return `
                <div id="${cID}" class="glass-card ${o.id === 'unsold' ? 'opacity-40 mt-12' : ''}" style="--owner-color: ${color}; --owner-glow: ${color}33">
                    <div class="logo-bg" style="color: ${color}">
                        <svg viewBox="0 0 100 100" fill="none"><path d="M50 5 L85 20 V50 C85 75 50 95 50 95 C50 95 15 75 15 50 V20 L50 5Z" stroke="currentColor" stroke-width="2" fill="currentColor" fill-opacity="0.05"/><text x="50%" y="62%" text-anchor="middle" font-family="Orbitron" font-size="28" font-weight="900" fill="currentColor" opacity="0.8">${initials}</text></svg>
                    </div>
                    <div class="p-6 flex justify-between items-center relative z-10" onclick="toggleSquad('${cID}')">
                        <div class="flex items-center gap-5">
                            <span class="font-cyber text-lg ${i<3 && o.id !== 'unsold' ? 'gold-glow' : 'text-gray-700'}">${o.id === 'unsold' ? '•' : i+1}</span>
                            <span class="font-black text-sm uppercase tracking-widest italic">${o.full}</span>
                        </div>
                        <span class="font-cyber text-2xl font-black italic tracking-tighter">${o.score}</span>
                    </div>
                    <div id="sq-${cID}" class="squad-container"><div class="space-y-4 pt-4">
                        ${squad.sort((a,b)=>b.act-a.act).map((p, idx) => `
                        <div class="flex justify-between items-center ${p.act === 0 ? 'player-row-ghost' : ''}">
                            <div class="flex items-center">
                                <span class="text-[8px] font-bold text-gray-600 mr-3 w-3">${idx+1}</span>
                                <span class="text-[11px] font-bold text-gray-200">${p.name} <span class="team-tag">(${p.team})</span></span>
                                <span class="role-tag">${p.role}</span>
                                ${p.cvc ? `<span class="badge font-cyber" style="color:${color}; border-color:${color}">${p.cvc}</span>` : ''}
                            </div>
                            <span class="font-cyber text-xs font-bold" style="color:${p.act > 0 ? color : '#334155'}">${p.act}</span>
                        </div>`).join('')}
                    </div></div>
                </div>`;
            }).join('');
        }

        function renderStrategy(owners, squads) {
            const data = owners.map(o => {
                const s = squads[o.id] || [];
                const sorted = [...s].sort((a,b) => b.raw - a.raw);
                const potScore = Math.round( (sorted[0]?.raw||0)*2 + (sorted[1]?.raw||0)*1.5 + sorted.slice(2).reduce((sum, p) => sum + p.raw, 0) );
                return { ...o, pot: potScore, diff: potScore - o.score, ideal: [sorted[0]?.name||'-', sorted[1]?.name||'-'] };
            });

            const sortedByPot = [...data].sort((a,b) => b.pot - a.pot);
            document.getElementById('strategy-list').innerHTML = sortedByPot.map((d, i) => {
                const color = ownerColors[d.id] || ownerColors[d.first.toLowerCase()] || '#fff';
                const currentRank = owners.findIndex(o => o.id === d.id) + 1;
                const potRank = i + 1;
                const shiftIcon = currentRank > potRank ? '🟢 ↑' : currentRank < potRank ? '🔴 ↓' : '⚪';
                return `
                <div class="glass-card p-5" style="border-left: 4px solid ${color}; --owner-color: ${color}; --owner-glow: ${color}33">
                    <div class="flex justify-between items-center mb-4">
                        <div><span class="font-cyber text-[10px]" style="color:${color}">${shiftIcon} POTENTIAL RANK #${potRank}</span><h3 class="font-black uppercase italic">${d.full}</h3></div>
                        <div class="text-right"><span class="font-cyber text-2xl font-black">${d.pot}</span><p class="text-[8px] font-bold opacity-40">MAX POTENTIAL</p></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-4 text-[10px] font-bold">
                        <div><p class="opacity-40 uppercase mb-1">Ideal C/VC</p><p class="text-yellow-500 uppercase">${d.ideal[0]} / ${d.ideal[1]}</p></div>
                        <div class="text-right"><p class="opacity-40 uppercase mb-1">Points Lost</p><p class="text-red-500">-${d.diff} PTS</p></div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderMVP(mvp, matchName) {
            const container = document.getElementById('mvp-spotlight');
            if (!mvp || !mvp.owner) { container.innerHTML = ''; return; }
            const color = ownerColors[fixID(mvp.owner)] || '#f1c40f';
            container.innerHTML = `
                <div class="mvp-banner flex justify-between items-center">
                    <div><p class="text-[8px] font-black text-yellow-500 uppercase tracking-widest mb-1">MATCH HERO • ${matchName}</p><h2 class="text-xl font-black uppercase italic tracking-tighter">${mvp.name}</h2><p class="text-[10px] font-bold opacity-60 uppercase">OWNED BY <span style="color:${color}">${mvp.owner}</span></p></div>
                    <div class="text-right"><p class="font-cyber text-2xl gold-glow font-black italic tracking-tighter">${mvp.pts}</p><p class="text-[8px] font-bold opacity-40 uppercase">POINTS</p></div>
                </div>`;
        }

        function toggleSquad(id) { 
            const s = document.getElementById('sq-' + id);
            if(s) s.classList.toggle('open');
        }
        updateApp(); setInterval(updateApp, 60000);
    </script>
</body>
</html>
