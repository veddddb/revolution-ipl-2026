<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(17, 25, 40, 0.85); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #111827 0%, #030508 100%); color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .glass-card { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glass-card:hover { border-color: rgba(241, 196, 15, 0.3); transform: translateY(-2px); }
        .podium-pillar { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.8) 100%); border-top: 2px solid var(--border); transition: height 1s ease; }
        .rank-1-pillar { border-top-color: var(--accent); box-shadow: 0 -15px 40px rgba(241, 196, 15, 0.15); }
        .squad-view { max-height: 0; overflow: hidden; transition: all 0.6s ease; opacity: 0; }
        .squad-view.open { max-height: 2000px; opacity: 1; padding: 20px; border-top: 1px solid var(--border); }
        .badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); }
        .live-dot { height: 8px; width: 8px; background: #ef4444; border-radius: 50%; display: inline-block; position: relative; }
        .live-dot::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; background: #ef4444; animation: live-pulse 2s infinite; }
        @keyframes live-pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        .win-prob-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; display: flex; }
        .team-a-prob { background: #2563eb; transition: width 1s ease; }
        .team-b-prob { background: #1e3a8a; transition: width 1s ease; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-20">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black font-cyber gold-glow italic tracking-tighter mb-2 uppercase">REVOLUTION</h1>
            <div id="countdown" class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.5em]">Live Intelligence Online</div>
        </header>

        <div id="live-ticker" class="glass-card mb-10 p-5 border-l-4 border-yellow-500 overflow-hidden relative">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-4">
                    <div id="status-container" class="flex items-center gap-2">
                        <div id="status-indicator" class="h-2 w-2 rounded-full bg-gray-600"></div>
                        <span id="live-label" class="font-cyber text-[9px] text-gray-500 uppercase tracking-widest">Standby</span>
                    </div>
                </div>
                <div id="match-venue" class="text-[9px] font-bold text-gray-500 uppercase tracking-tighter">Arun Jaitley Stadium</div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col items-start w-1/3">
                    <img id="local-logo" src="https://via.placeholder.com/40" class="w-10 h-10 mb-2 object-contain opacity-50 grayscale">
                    <span id="local-name" class="font-black text-xs uppercase tracking-tighter text-gray-400">Delhi</span>
                </div>
                <div class="text-center w-1/3">
                    <div id="live-score" class="font-cyber text-2xl font-black gold-glow mb-1">0/0</div>
                    <div id="live-overs" class="text-[10px] font-bold text-gray-400">(0.0 ov)</div>
                </div>
                <div class="flex flex-col items-end w-1/3">
                    <img id="visitor-logo" src="https://via.placeholder.com/40" class="w-10 h-10 mb-2 object-contain opacity-50 grayscale">
                    <span id="visitor-name" class="font-black text-xs uppercase tracking-tighter text-gray-400">Mumbai</span>
                </div>
            </div>

            <div id="in-play-data" class="hidden grid grid-cols-2 gap-4 pt-4 border-t border-white/5 mb-4">
                <div>
                    <p class="text-[8px] font-bold text-gray-500 uppercase mb-1">Batting</p>
                    <p id="striker-name" class="text-[10px] font-bold text-white truncate">---</p>
                </div>
                <div class="text-right">
                    <p class="text-[8px] font-bold text-gray-500 uppercase mb-1">Bowling</p>
                    <p id="bowler-name" class="text-[10px] font-bold text-white truncate">---</p>
                </div>
            </div>

            <div id="win-prob-section" class="pt-2">
                <div class="flex justify-between text-[8px] font-black uppercase tracking-widest mb-1">
                    <span id="prob-a-label" class="text-blue-500">DC 50%</span>
                    <span id="prob-b-label" class="text-blue-900">MI 50%</span>
                </div>
                <div class="win-prob-bar">
                    <div id="bar-a" class="team-a-prob" style="width: 50%"></div>
                    <div id="bar-b" class="team-b-prob" style="width: 50%"></div>
                </div>
            </div>
        </div>

        <div id="podium-area" class="flex justify-center items-end gap-3 mb-14 h-48 text-center"></div>
        <div id="leaderboard" class="space-y-4"></div>

        <div id="unsold-container" class="mt-12 opacity-50">
            <div class="glass-card p-4 flex justify-between items-center cursor-pointer" onclick="toggleSection('sq-unsold-id')">
                <div class="flex items-center gap-3">
                    <span class="text-gray-600 font-cyber text-[10px]">--</span>
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">Unsold Player Pool</span>
                </div>
                <span id="unsold-total-val" class="font-cyber text-sm text-gray-600">0</span>
            </div>
            <div id="sq-unsold-id" class="squad-view">
                <div id="unsold-items-list" class="space-y-1"></div>
            </div>
        </div>

        <footer class="text-center py-10 border-t border-white/5 opacity-30 mt-10">
            <p class="font-cyber text-[9px] uppercase tracking-[0.5em]">Created by Vedant Bhansali</p>
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const SEASON_ID = '1795';
        
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;
        const rosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Roster`;

        async function fetchLiveScores() {
            try {
                const response = await fetch('/api/livescore');
                const json = await response.json();
                
                // We add localteam and visitorteam to include in api/livescore.js if not already there
                const iplMatch = json.data ? json.data.find(m => m.season_id == SEASON_ID) : null;
                
                const dot = document.getElementById('status-indicator');
                const label = document.getElementById('live-label');
                const inPlaySection = document.getElementById('in-play-data');

                if (iplMatch && (iplMatch.status === "Live" || iplMatch.status === "Innings Break")) {
                    dot.className = "live-dot";
                    label.innerText = "Live Now";
                    label.className = "font-cyber text-[9px] text-red-500 uppercase tracking-widest";
                    inPlaySection.classList.remove('hidden');

                    // Set Logos and Names
                    document.getElementById('local-name').innerText = iplMatch.localteam.name;
                    document.getElementById('visitor-name').innerText = iplMatch.visitorteam.name;
                    document.getElementById('local-logo').src = iplMatch.localteam.image_path;
                    document.getElementById('visitor-logo').src = iplMatch.visitorteam.image_path;
                    document.getElementById('local-logo').style.opacity = "1";
                    document.getElementById('visitor-logo').style.opacity = "1";
                    document.getElementById('local-logo').style.filter = "none";
                    document.getElementById('visitor-logo').style.filter = "none";

                    // Score Logic
                    const score = iplMatch.runs[0];
                    if (score) {
                        document.getElementById('live-score').innerText = `${score.score}/${score.wickets}`;
                        document.getElementById('live-overs').innerText = `(${score.overs} ov)`;
                    }

                    // Batter/Bowler logic (Sportmonks include required)
                    if (iplMatch.batting && iplMatch.batting[0]) {
                        document.getElementById('striker-name').innerText = iplMatch.batting[0].player?.data?.fullname || "Batting...";
                    }
                    if (iplMatch.bowling && iplMatch.bowling[0]) {
                        document.getElementById('bowler-name').innerText = iplMatch.bowling[0].player?.data?.fullname || "Bowling...";
                    }

                    // Win Prob Logic (Placeholder if API doesn't provide specific prob)
                    const prob = iplMatch.win_probability || { local_team_charge: 50, visitor_team_charge: 50 };
                    document.getElementById('bar-a').style.width = prob.local_team_charge + "%";
                    document.getElementById('bar-b').style.width = prob.visitor_team_charge + "%";
                    document.getElementById('prob-a-label').innerText = `DC ${prob.local_team_charge}%`;
                    document.getElementById('prob-b-label').innerText = `MI ${prob.visitor_team_charge}%`;

                } else {
                    // STANDBY MODE
                    dot.className = "h-2 w-2 rounded-full bg-gray-600";
                    label.innerText = "Standby";
                    label.className = "font-cyber text-[9px] text-gray-500 uppercase tracking-widest";
                    inPlaySection.classList.add('hidden');
                    document.getElementById('live-score').innerText = "Match 8";
                    document.getElementById('live-overs').innerText = "Starts 3:30 PM IST";
                }
            } catch (e) { console.log("Live Engine Polling..."); }
        }

        async function updateData() {
            try {
                const [lbRes, pcRes, rosRes] = await Promise.all([
                    fetch(lbUrl + '&t=' + Date.now()), fetch(pcUrl + '&t=' + Date.now()), fetch(rosUrl + '&t=' + Date.now())
                ]);
                const lbRows = (await lbRes.text()).split('\n').slice(1);
                const pcRows = (await pcRes.text()).split('\n').slice(1);
                const rosRows = (await rosRes.text()).split('\n').slice(1);

                const masterRoster = {};
                rosRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 2) return;
                    const pName = c[0].replace(/"/g, '').trim();
                    const owner = c[1].replace(/"/g, '').trim().toLowerCase();
                    const mult = parseFloat(c[2].replace(/"/g, '')) || 1;
                    if (owner) {
                        if (!masterRoster[owner]) masterRoster[owner] = [];
                        masterRoster[owner].push({ name: pName, role: mult === 2 ? 'C' : mult === 1.5 ? 'VC' : '', pts: 0 });
                    }
                });

                pcRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 7) return;
                    const pName = c[1].replace(/"/g, '').trim();
                    const owner = c[2].replace(/"/g, '').trim().toLowerCase();
                    const pts = Math.round(parseFloat(c[6].replace(/"/g, '')) || 0);
                    if (owner && masterRoster[owner]) {
                        let pObj = masterRoster[owner].find(p => p.name === pName);
                        if (pObj) pObj.pts += pts;
                    }
                });

                let usPts = 0;
                const owners = lbRows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (!c[0]) return null;
                    const n = c[0].replace(/"/g, '').trim();
                    const s = Math.round(parseFloat(c[1].replace(/"/g, '')) || 0);
                    if (n.toLowerCase() === "unsold") { usPts = s; return null; }
                    return { displayName: n, cleanName: n.toLowerCase(), score: s };
                }).filter(o => o !== null).sort((a,b) => b.score - a.score);

                renderDashboard(owners, masterRoster, usPts);
            } catch (e) { console.error(e); }
        }

        function renderDashboard(owners, squads, unsold) {
            const pod = document.getElementById('podium-area');
            if (owners.length >= 3) {
                pod.innerHTML = `
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[9px] font-bold text-gray-500 mb-2 h-8 flex items-center uppercase text-center">${owners[1].displayName}</div>
                        <div class="w-full podium-pillar h-24 rounded-t-2xl flex flex-col justify-center items-center">
                            <span class="font-cyber text-xl font-bold">${owners[1].score}</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[10px] font-black gold-glow uppercase mb-2 h-8 flex items-center tracking-tighter text-center">${owners[0].displayName}</div>
                        <div class="w-full podium-pillar rank-1-pillar h-36 rounded-t-2xl flex flex-col justify-center items-center">
                            <span class="font-cyber text-2xl font-black gold-glow">${owners[0].score}</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[9px] font-bold text-gray-600 mb-2 h-8 flex items-center uppercase text-center">${owners[2].displayName}</div>
                        <div class="w-full podium-pillar h-16 rounded-t-2xl flex flex-col justify-center items-center">
                            <span class="font-cyber text-lg font-bold text-gray-500">${owners[2].score}</span>
                        </div>
                    </div>`;
            }

            const lb = document.getElementById('leaderboard');
            lb.innerHTML = owners.map((o, i) => `
                <div class="glass-card overflow-hidden">
                    <div class="p-5 flex justify-between items-center cursor-pointer" onclick="toggleSection('sq-${i}')">
                        <div class="flex items-center gap-6">
                            <span class="font-cyber text-lg ${i < 3 ? 'gold-glow' : 'text-gray-700'}">${i+1}</span>
                            <span class="font-bold text-sm tracking-tighter uppercase">${o.displayName}</span>
                        </div>
                        <span class="text-xl font-cyber font-black ${i === 0 ? 'gold-glow' : ''}">${o.score}</span>
                    </div>
                    <div id="sq-${i}" class="squad-view">
                        ${(squads[o.cleanName] || []).sort((a,b)=>b.pts-a.pts).map(p => `
                            <div class="flex justify-between items-center text-[11px] py-1.5 border-b border-white/5">
                                <div class="flex items-center">
                                    <span class="${p.pts > 0 ? 'text-gray-300' : 'text-gray-600'} font-medium">${p.name}</span>
                                    ${p.role ? `<span class="badge font-cyber text-yellow-500 border border-yellow-500/30">${p.role}</span>` : ''}
                                </div>
                                <span class="font-cyber ${p.pts > 0 ? 'text-yellow-500' : 'text-gray-700'}">${p.pts}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`).join('');

            document.getElementById('unsold-total-val').innerText = unsold;
            const unsoldItems = squads["unsold"] || [];
            document.getElementById('unsold-items-list').innerHTML = unsoldItems.sort((a,b)=>b.pts-a.pts).map(p => `
                <div class="flex justify-between text-[10px] text-gray-600 py-1.5 border-b border-white/5">
                    <span>${p.name}</span>
                    <span class="font-cyber">${p.pts}</span>
                </div>
            `).join('') || '<div class="text-[10px] text-center py-4 italic text-gray-700">All players currently assigned.</div>';
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-view').forEach(s => s.classList.remove('open'));
            if (!isOpen) el.classList.add('open');
        }

        // Initial Boot
        updateData();
        fetchLiveScores();
        
        // Dynamic Update Intervals
        setInterval(updateData, 60000); // 1 min for sheet
        setInterval(fetchLiveScores, 15000); // 15 sec for live score feel
    </script>
</body>
</html>
