<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(17, 25, 40, 0.96); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #111827 0%, #030508 100%) no-repeat; background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 20px rgba(241, 196, 15, 0.6); }
        .glass-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 28px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Podium animations */
        .podium-pillar { background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(0,0,0,0.9) 100%); border-top: 3px solid var(--border); transition: height 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .rank-1-pillar { border-top-color: var(--accent); box-shadow: 0 10px 40px rgba(241, 196, 15, 0.1); }

        /* Squad toggle */
        .squad-container { display: none; padding: 20px; border-top: 1px solid var(--border); animation: slideDown 0.3s ease-out; }
        .squad-container.open { display: block; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .tab-btn { padding: 10px 20px; border-radius: 14px; font-size: 11px; font-weight: 800; text-transform: uppercase; transition: 0.4s; border: 1px solid var(--border); background: rgba(255,255,255,0.03); }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .live-pulse { height: 8px; width: 8px; background: #2ecc71; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; margin-right: 8px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-24">
        
        <header class="text-center mb-10 flex flex-col items-center">
            <h1 class="text-6xl font-black font-cyber gold-glow italic tracking-tighter mb-2 uppercase">REVOLUTION</h1>
            <p className="text-gray-400 text-xs font-bold tracking-[0.3em] uppercase mb-6">IPL 2026 OFFICIAL STANDINGS</p>
            
            <div class="flex justify-center gap-3">
                <button onclick="switchTab('main')" id="btn-main" class="tab-btn active">Championship</button>
                <button onclick="switchTab('strategy')" id="btn-strat" class="tab-btn">Strategy</button>
            </div>
        </header>

        <div id="view-main" class="space-y-6">
            <div id="podium-area" class="flex justify-center items-end gap-4 mb-16 h-56 text-center px-4"></div>
            
            <div id="leaderboard" class="space-y-5"></div>
        </div>

        <div id="view-strategy" class="hidden space-y-6">
            <div class="glass-card p-8 border-b-4 border-yellow-500">
                <h3 class="font-cyber text-sm gold-glow uppercase mb-3 tracking-widest">Calculated Potential</h3>
                <p class="text-[10px] text-gray-400 italic">Ranking based on raw points if you had chosen your best performers as C/VC.</p>
                <div id="strategy-list" class="mt-8 space-y-4"></div>
            </div>
        </div>

        <footer class="text-center py-16 opacity-30">
            <p class="font-cyber text-[9px] uppercase tracking-[0.4em]">Live Sync Active • Updated Every 60s</p>
        </footer>
    </div>

    <script>
        // --- DATA SOURCE CONFIG ---
        // Using your sheet ID: 1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        
        // Helper to fetch Google Sheet data as JSON
        async function fetchSheetData(sheetName) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            return json.table.rows.map(row => row.c.map(cell => cell ? cell.v : ''));
        }

        function switchTab(t) {
            document.getElementById('view-main').classList.toggle('hidden', t !== 'main');
            document.getElementById('view-strategy').classList.toggle('hidden', t !== 'strategy');
            document.getElementById('btn-main').classList.toggle('active', t === 'main');
            document.getElementById('btn-strat').classList.toggle('active', t === 'strategy');
        }

        async function updateLeaderboard() {
            try {
                // 1. Fetch Leaderboard and Livescore
                const [lbRows, lsRows] = await Promise.all([
                    fetchSheetData('Leaderboard'),
                    fetchSheetData('Livescore')
                ]);

                // 2. Identify Active Players (from Column B of Livescore)
                const activePlayerNames = lsRows.slice(1).map(row => row[1]);

                // 3. Process Owners
                const owners = lbRows.slice(1).map((row, i) => ({
                    fullName: row[0],
                    score: Math.round(parseFloat(row[1])) || 0,
                    firstName: row[0].split(' ')[0].toLowerCase()
                })).sort((a, b) => b.score - a.score);

                // 4. Render Podium
                renderPodium(owners);

                // 5. Render List
                renderList(owners, activePlayerNames);

            } catch (e) {
                console.error("Sync Error:", e);
            }
        }

        function renderPodium(owners) {
            const pod = document.getElementById('podium-area');
            if (owners.length < 3) return;
            
            pod.innerHTML = `
                <div class="flex flex-col items-center w-1/3">
                    <div class="text-[10px] mb-2 uppercase text-gray-400 font-bold">${owners[1].fullName}</div>
                    <div class="w-full podium-pillar h-32 rounded-t-3xl flex items-center justify-center font-cyber text-xl">${owners[1].score}</div>
                </div>
                <div class="flex flex-col items-center w-1/3">
                    <div class="text-xs gold-glow mb-2 uppercase font-black tracking-widest">${owners[0].fullName}</div>
                    <div class="w-full podium-pillar rank-1-pillar h-48 rounded-t-3xl flex items-center justify-center font-cyber text-3xl gold-glow">${owners[0].score}</div>
                </div>
                <div class="flex flex-col items-center w-1/3">
                    <div class="text-[10px] mb-2 uppercase text-gray-600 font-bold">${owners[2].fullName}</div>
                    <div class="w-full podium-pillar h-24 rounded-t-3xl flex items-center justify-center font-cyber text-lg text-gray-500">${owners[2].score}</div>
                </div>
            `;
        }

        function renderList(owners, activePlayers) {
            const container = document.getElementById('leaderboard');
            container.innerHTML = owners.map((o, i) => `
                <div class="glass-card overflow-hidden transition-transform active:scale-95">
                    <div class="p-6 flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <span class="font-cyber text-lg ${i < 3 ? 'gold-glow' : 'text-gray-600'}">#${i + 1}</span>
                            <div>
                                <span class="font-black text-sm uppercase tracking-widest block">${o.fullName}</span>
                                ${activePlayers.length > 0 ? `
                                    <div class="flex items-center mt-1">
                                        <span class="live-pulse"></span>
                                        <span class="text-[8px] font-bold text-green-500 uppercase">Action Live</span>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                        <span class="font-cyber text-2xl font-black">${o.score}</span>
                    </div>
                </div>
            `).join('');
        }

        // Initialize and Set Intervals
        updateLeaderboard();
        setInterval(updateLeaderboard, 60000); // Sync every minute
    </script>
</body>
</html>
