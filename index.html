<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(10, 15, 25, 0.98); --border: rgba(255, 255, 255, 0.08); }
        body { background: radial-gradient(circle at top, #0f172a 0%, #020617 100%) no-repeat; background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; transition: all 0.4s; margin-bottom: 1rem; position: relative; overflow: hidden; }
        
        .logo-bg { position: absolute; right: 10%; top: 50%; transform: translateY(-50%); width: 120px; height: 120px; opacity: 0.12; pointer-events: none; z-index: 0; filter: blur(1px); }
        
        /* CHEMISTRY BADGE */
        .chem-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); color: #94a3b8; text-transform: uppercase; margin-top: 4px; display: inline-block; border: 1px solid rgba(255,255,255,0.1); }

        .match-badge { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 4px 12px; border-radius: 10px; font-size: 9px; font-weight: 900; color: #64748b; }
        
        /* MVP & SPOILER BANNERS */
        .mvp-banner { background: linear-gradient(90deg, rgba(241,196,15,0.1) 0%, rgba(241,196,15,0.02) 100%); border: 1px solid rgba(241,196,15,0.2); border-radius: 20px; padding: 15px 20px; margin-bottom: 25px; position: relative; overflow: hidden; }
        .spoiler-banner { background: linear-gradient(90deg, rgba(231, 76, 60, 0.15) 0%, rgba(231, 76, 60, 0.02) 100%); border: 1px solid rgba(231, 76, 60, 0.3); border-radius: 20px; padding: 15px 20px; margin-bottom: 25px; position: relative; overflow: hidden; }

        .tab-btn { padding: 10px 24px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; transition: 0.3s; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: #64748b; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }
        .squad-container { display: none; padding: 0 24px 24px 24px; border-top: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 10; }
        .squad-container.open { display: block; animation: slideIn 0.3s ease-out; }
        .player-row-dim { opacity: 0.2; filter: grayscale(1); }
        .role-tag { font-size: 7px; padding: 2px 5px; border-radius: 4px; background: rgba(255, 255, 255, 0.05); color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-left: 5px; }
        .team-tag { font-size: 7px; color: #475569; text-transform: uppercase; font-weight: 800; margin-left: 4px; }
        .badge { font-size: 8px; padding: 1px 5px; border-radius: 4px; font-weight: 900; border: 1px solid currentColor; margin-left: 6px; }
        .live-dot { height: 7px; width: 7px; background: #2ecc71; border-radius: 50%; display: inline-block; position: relative; box-shadow: 0 0 10px #2ecc71; }
        .live-dot::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; background: #2ecc71; animation: live-pulse 2s infinite; }
        @keyframes live-pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-24">
        
        <header class="mb-10 relative">
            <div class="flex justify-between items-center mb-8 px-2">
                <div class="match-badge font-cyber uppercase tracking-widest">EST. 2026</div>
                <div id="match-counter" class="match-badge font-cyber tracking-widest text-yellow-500/80 uppercase">MATCHES: 0/74</div>
            </div>

            <div class="flex flex-col items-center">
                <h1 class="text-5xl font-black font-cyber gold-glow italic tracking-tighter mb-6 uppercase italic">REVOLUTION</h1>
                <div class="flex justify-center gap-3 bg-black/40 p-1.5 rounded-2xl border border-white/5">
                    <button onclick="switchTab('main')" id="btn-main" class="tab-btn active">Live Ranks</button>
                    <button onclick="switchTab('strategy')" id="btn-strat" class="tab-btn">Luckiest Manager</button>
                </div>
            </div>
        </header>

        <div id="view-main" class="space-y-6">
            <div id="mvp-spotlight"></div>
            <div id="podium-area" class="flex justify-center items-end gap-3 mb-16 h-48 text-center px-2"></div>
            <div id="leaderboard" class="space-y-2"></div>
        </div>

        <div id="view-strategy" class="hidden space-y-4 pt-4">
            <div id="strategy-list" class="space-y-4"></div>
        </div>

        <footer class="text-center py-20 opacity-20 font-cyber text-[8px] uppercase tracking-[0.6em]">
            Precision Sync • Vedant Bhansali Edition
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const TOTAL_SEASON_MATCHES = 74;
        const ownerColors = { "vedant": "#3498db", "vedant bhansali": "#3498db", "deep": "#e74c3c", "shlok": "#2ecc71", "rahul": "#9b59b6", "soni": "#f1c40f", "yash soni": "#f1c40f", "dheer": "#e67e22", "kunal": "#1abc9c", "puneet": "#ff9f43", "vivek": "#54a0ff", "bokaria": "#5f27cd", "prakshal": "#48dbfb", "rishi": "#ff6b6b", "aamer": "#1dd1a1", "yashshah": "#f368e0", "yash shah": "#f368e0" };

        async function fetchSheet(name) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${name}`;
            const r = await fetch(url); const t = await r.text();
            const j = JSON.parse(t.substr(47).slice(0, -2));
            return j.table.rows.map(row => row.c.map(cell => cell ? (cell.v !== null ? cell.v : "") : ""));
        }

        function switchTab(t) {
            document.getElementById('view-main').classList.toggle('hidden', t !== 'main');
            document.getElementById('view-strategy').classList.toggle('hidden', t !== 'strategy');
            document.getElementById('btn-main').classList.toggle('active', t === 'main');
            document.getElementById('btn-strat').classList.toggle('active', t === 'strategy');
        }

        async function updateApp() {
            try {
                const [lbRows, rosRows, lsRows, pcRows] = await Promise.all([
                    fetchSheet('Leaderboard'), fetchSheet('Roster'), fetchSheet('Livescore'), fetchSheet('PointsCalc')
                ]);

                const clean = (val) => val.toString().toLowerCase().trim();

                const pPoints = {};
                const matchNameStrings = new Set();
                let matchPlayers = [];
                let lastMatchName = "";
                let maxNumericMatch = 0;

                if (pcRows.length > 1) {
                    pcRows.slice(1).forEach(row => {
                        const mName = row[0] ? row[0].toString() : "";
                        if (!mName) return;
                        const digitMatch = mName.match(/\d+/);
                        if (digitMatch) { maxNumericMatch = Math.max(maxNumericMatch, parseInt(digitMatch[0])); }
                        else { matchNameStrings.add(mName); }

                        const pNameClean = clean(row[1]); if (!pNameClean) return;
                        const val = parseFloat(row[6]) || 0;
                        const mult = parseFloat(row[5]) || 1;
                        if (!pPoints[pNameClean]) pPoints[pNameClean] = { act: 0, raw: 0 };
                        pPoints[pNameClean].act += val; pPoints[pNameClean].raw += (val / mult);
                    });
                    const totalMatchesDone = Math.max(maxNumericMatch, matchNameStrings.size);
                    document.getElementById('match-counter').innerText = `MATCHES: ${totalMatchesDone}/${TOTAL_SEASON_MATCHES}`;
                    lastMatchName = pcRows[pcRows.length - 1][0];
                    pcRows.forEach(row => {
                        if (row[0] === lastMatchName) {
                            matchPlayers.push({ name: row[1], pts: parseFloat(row[6]) || 0, owner: row[2] });
                        }
                    });
                }

                const mvp = matchPlayers.sort((a,b) => b.pts - a.pts)[0];
                const liveNow = lsRows.map(r => clean(r[1])).filter(n => n !== "");

                // SQUAD & CHEMISTRY LOGIC
                const squads = {};
                const chemistry = {};
                rosRows.forEach(row => {
                    const name = row[0];
                    const owner = clean(row[1]); if (!owner) return;
                    const teamCode = row[4];
                    const stats = pPoints[clean(name)] || { act: 0, raw: 0 };
                    const m = parseFloat(row[2]) || 1;
                    
                    if (!squads[owner]) { squads[owner] = []; chemistry[owner] = {}; }
                    squads[owner].push({
                        name, team: teamCode, role: row[6], act: Math.round(stats.act), raw: stats.raw,
                        cvc: m === 2 ? 'C' : m === 1.5 ? 'VC' : '',
                        isLive: liveNow.includes(clean(name))
                    });

                    // Track team counts for chemistry
                    chemistry[owner][teamCode] = (chemistry[owner][teamCode] || 0) + 1;
                });

                let allOwners = lbRows.map(row => {
                    const name = row[0] ? row[0].toString() : "";
                    const score = Math.round(parseFloat(row[1])) || 0;
                    if (!name || clean(name) === "owner") return null;
                    return { full: name, score, id: clean(name), first: clean(name).split(' ')[0] };
                }).filter(o => o !== null);

                const unsoldData = allOwners.find(o => o.id === 'unsold');
                const activeOwners = allOwners.filter(o => o.id !== 'unsold').sort((a,b) => b.score - a.score);
                const finalOrder = unsoldData ? [...activeOwners, unsoldData] : activeOwners;

                renderMVP(mvp, lastMatchName);
                renderMain(finalOrder, squads, chemistry);
                renderStrategy(activeOwners, squads);

            } catch (e) { console.error(e); }
        }

        function getInitials(name) { return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2); }

        function renderMVP(mvp, matchName) {
            const container = document.getElementById('mvp-spotlight');
            if (!mvp || mvp.pts === 0) { container.innerHTML = ''; return; }
            const ownerKey = cleanOwner(mvp.owner);
            const isUnsold = ownerKey === 'unsold';
            const color = isUnsold ? '#e74c3c' : (ownerColors[ownerKey] || '#f1c40f');
            
            container.innerHTML = `
                <div class="${isUnsold ? 'spoiler-banner' : 'mvp-banner'} flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black ${isUnsold ? 'text-red-500' : 'text-yellow-500'} uppercase tracking-[0.3em] mb-1">
                            ${isUnsold ? '⚠ UNSOLD SPOILER' : 'MATCH HERO'} • ${matchName}
                        </p>
                        <h2 class="text-xl font-black uppercase italic tracking-tighter">${mvp.name}</h2>
                        <p class="text-[10px] font-bold opacity-60 uppercase">
                            ${isUnsold ? 'POINTS WASTED IN BIN' : `OWNED BY <span style="color:${color}">${mvp.owner}</span>`}
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="font-cyber text-2xl ${isUnsold ? 'text-red-500' : 'gold-glow'} font-black italic tracking-tighter">${mvp.pts}</p>
                        <p class="text-[8px] font-bold opacity-40 uppercase">POINTS</p>
                    </div>
                </div>`;
        }

        function cleanOwner(val) { return val ? val.toString().toLowerCase().trim() : ""; }

        function renderMain(owners, squads, chemistry) {
            const pod = document.getElementById('podium-area');
            const top = owners.filter(o => o.id !== 'unsold');
            if(top.length >= 3) {
                pod.innerHTML = `
                    <div class="w-1/3 flex flex-col items-center"><span class="text-[9px] font-cyber mb-2 opacity-60 uppercase">${top[1].first}</span><div class="podium-pillar w-full h-24 rounded-t-2xl flex items-center justify-center font-cyber text-lg">${top[1].score}</div></div>
                    <div class="w-1/3 flex flex-col items-center"><span class="text-[10px] font-cyber mb-2 gold-glow italic uppercase tracking-widest">${top[0].first}</span><div class="podium-pillar w-full h-40 rounded-t-2xl border-t-yellow-500 flex items-center justify-center font-cyber text-2xl gold-glow shadow-[0_-10px_30px_rgba(241,196,15,0.1)]">${top[0].score}</div></div>
                    <div class="w-1/3 flex flex-col items-center"><span class="text-[9px] font-cyber mb-2 opacity-40 uppercase">${top[2].first}</span><div class="podium-pillar w-full h-16 rounded-t-2xl flex items-center justify-center font-cyber text-base text-gray-600">${top[2].score}</div></div>
                `;
            }

            document.getElementById('leaderboard').innerHTML = owners.map((o, i) => {
                const squad = squads[o.id] || [];
                const color = ownerColors[o.id] || ownerColors[o.first] || '#64748b';
                const hasLive = squad.some(p => p.isLive);
                const safeId = o.id.replace(/[^a-z0-9]/g, '');
                const initials = getInitials(o.full);

                // Calculate Chemistry Badge
                let chemText = "Tactical Hybrid";
                const ownerChem = chemistry[o.id] || {};
                const topTeam = Object.keys(ownerChem).reduce((a, b) => ownerChem[a] > ownerChem[b] ? a : b, "");
                if (topTeam && ownerChem[topTeam] >= 4) chemText = `${topTeam} LOYALIST`;

                return `
                <div id="card-${safeId}" class="glass-card overflow-hidden ${o.id === 'unsold' ? 'opacity-40 mt-12' : ''}">
                    <div class="logo-bg" style="color: ${color}">
                        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M50 5 L85 20 V50 C85 75 50 95 50 95 C50 95 15 75 15 50 V20 L50 5Z" stroke="currentColor" stroke-width="2" fill="currentColor" fill-opacity="0.05"/>
                            <text x="50%" y="62%" text-anchor="middle" font-family="Orbitron" font-size="28" font-weight="900" fill="currentColor" opacity="0.8">${initials}</text>
                        </svg>
                    </div>

                    <div class="p-6 flex justify-between items-center cursor-pointer relative z-10" onclick="toggleSquad('${safeId}', '${color}')">
                        <div class="flex items-center gap-5">
                            <span class="font-cyber text-lg ${i<3 && o.id !== 'unsold' ? 'gold-glow' : 'text-gray-700'}">${o.id === 'unsold' ? '•' : '#'+(i+1)}</span>
                            <div>
                                <span class="font-black text-sm uppercase tracking-widest block italic tracking-tighter">${o.full}</span>
                                ${o.id !== 'unsold' ? `<span class="chem-badge">${chemText}</span>` : ''}
                                ${hasLive ? `<div class="flex items-center gap-1.5 text-[8px] font-bold text-green-500 uppercase mt-2 tracking-widest"><span class="live-dot"></span> Action Live</div>` : ''}
                            </div>
                        </div>
                        <span class="font-cyber text-2xl font-black italic tracking-tighter">${o.score}</span>
                    </div>
                    <div id="sq-${safeId}" class="squad-container"><div class="space-y-4 pt-4">
                        ${squad.sort((a,b)=>b.act-a.act).map((p, idx) => `
                            <div class="flex justify-between items-center ${p.act === 0 && !p.isLive ? 'player-row-dim' : ''}">
                                <div class="flex items-center">
                                    <span class="text-[8px] font-bold text-gray-600 mr-3 w-3">${idx + 1}</span>
                                    <span class="text-[11px] font-bold text-gray-200">${p.name} <span class="team-tag">(${p.team})</span></span>
                                    <span class="role-tag">${p.role}</span>
                                    ${p.cvc ? `<span class="badge font-cyber" style="color:${color}; border-color:${color}">${p.cvc}</span>` : ''}
                                    ${p.isLive ? `<span class="live-dot ml-2"></span>` : ''}
                                </div>
                                <span class="font-cyber text-xs font-bold" style="color:${p.act > 0 || p.isLive ? color : '#334155'}">${p.act}</span>
                            </div>`).join('')}
                    </div></div>
                </div>`;
            }).join('');
        }

        function renderStrategy(activeOwners, squads) {
            const data = activeOwners.map(o => {
                const s = squads[o.id] || [];
                const sorted = [...s].sort((a,b) => b.raw - a.raw);
                const b1 = sorted[0], b2 = sorted[1];
                let pot = 0;
                s.forEach(p => {
                    if (b1 && p.name === b1.name) pot += (p.raw * 2);
                    else if (b2 && p.name === b2.name) pot += (p.raw * 1.5);
                    else pot += p.raw;
                });
                return { ...o, pot: Math.round(pot), diff: Math.round(pot) - o.score, pair: [b1?.name || '-', b2?.name || '-'] };
            }).sort((a,b) => b.pot - a.pot);
            document.getElementById('strategy-list').innerHTML = data.map((d, i) => {
                const color = ownerColors[d.id] || ownerColors[d.first] || '#fff';
                return `
                <div class="glass-card p-5 border-l-4" style="border-left-color: ${color}">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="font-cyber text-lg" style="color:${color}">#${i+1}</span>
                            <span class="font-black text-xs uppercase tracking-widest italic ml-2">${d.full}</span>
                            <p class="text-[8px] font-bold text-gray-500 mt-2 uppercase italic tracking-wider">Best Pair: ${d.pair[0]} & ${d.pair[1]}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-cyber text-xl italic" style="color:${color}">${d.pot}</p>
                            <p class="text-[9px] font-black ${d.diff > 0 ? 'text-yellow-500' : 'text-gray-600'}">+${d.diff} MISSED</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleSquad(id, color) {
            const el = document.getElementById('sq-' + id);
            const card = document.getElementById('card-' + id);
            const open = el.classList.contains('open');
            document.querySelectorAll('.squad-container').forEach(s => s.classList.remove('open'));
            document.querySelectorAll('.glass-card').forEach(c => { c.style.borderColor = 'rgba(255,255,255,0.08)'; c.style.boxShadow = 'none'; });
            if (!open) { el.classList.add('open'); card.style.borderColor = color; card.style.boxShadow = `0 0 40px ${color}15`; }
        }

        updateApp(); setInterval(updateApp, 60000);
    </script>
</body>
</html>
