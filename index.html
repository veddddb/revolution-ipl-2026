<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(17, 25, 40, 0.8); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #111827 0%, #030508 100%); color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 20px; transition: transform 0.3s; }
        .podium-pillar { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.6) 100%); border-top: 2px solid var(--border); transition: height 1s ease; }
        .rank-1-pillar { border-top-color: var(--accent); box-shadow: 0 -10px 30px rgba(241, 196, 15, 0.15); }
        .squad-view { max-height: 0; overflow: hidden; transition: all 0.5s ease; opacity: 0; }
        .squad-view.open { max-height: 5000px; opacity: 1; padding: 20px; border-top: 1px solid var(--border); }
        .badge { font-size: 8px; padding: 1px 5px; border-radius: 3px; font-weight: 900; margin-left: 6px; background: rgba(255,255,255,0.1); }
        .pulse-red { background: #ef4444; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-20">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black font-cyber gold-glow italic tracking-tighter mb-2 uppercase">REVOLUTION IPL 2026</h1>
            <div id="countdown" class="text-[9px] font-bold text-gray-500 uppercase tracking-[0.4em]">Live System Online</div>
        </header>

        <div id="live-ticker" class="glass-card mb-10 p-4 border-l-4 border-yellow-500">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="status-dot" class="h-2 w-2 rounded-full bg-gray-600"></div>
                    <span id="live-match-name" class="font-cyber text-[10px] text-gray-400 uppercase tracking-wider">No Active Match</span>
                </div>
                <div id="live-match-score" class="font-cyber text-sm font-black gold-glow italic">Upcoming: DC vs MI</div>
            </div>
        </div>

        <div id="podium-area" class="flex justify-center items-end gap-3 mb-14 h-48 text-center"></div>
        <div id="leaderboard" class="space-y-4"></div>

        <div id="unsold-container" class="mt-12 opacity-50">
            <div class="glass-card p-4 flex justify-between items-center cursor-pointer" onclick="toggleSection('sq-unsold-id')">
                <div class="flex items-center gap-3">
                    <span class="text-gray-600 font-cyber text-[10px]">--</span>
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">Unsold Player Pool</span>
                </div>
                <span id="unsold-total-val" class="font-cyber text-sm text-gray-600">0</span>
            </div>
            <div id="sq-unsold-id" class="squad-view">
                <div id="unsold-items-list" class="space-y-1"></div>
            </div>
        </div>

        <footer class="text-center py-10 border-t border-white/5 opacity-30 mt-10">
            <p class="font-cyber text-[9px] uppercase tracking-[0.5em]">Created by Vedant Bhansali</p>
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const SEASON_ID = '1795';
        
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;
        const rosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Roster`;

        async function fetchLiveScores() {
            try {
                const response = await fetch('/api/livescore');
                const json = await response.json();
                
                const iplMatch = json.data ? json.data.find(m => m.season_id == SEASON_ID) : null;
                const dot = document.getElementById('status-dot');
                const matchName = document.getElementById('live-match-name');
                const matchScore = document.getElementById('live-match-score');

                if (iplMatch && (iplMatch.status === "Live" || iplMatch.status === "Innings Break")) {
                    dot.className = "h-2 w-2 rounded-full pulse-red";
                    matchName.innerText = `${iplMatch.localteam.name} vs ${iplMatch.visitorteam.name}`;
                    matchName.classList.remove('text-gray-400');
                    
                    const score = iplMatch.runs[0];
                    if (score) {
                        matchScore.innerText = `${score.score}/${score.wickets} (${score.overs} ov)`;
                    }
                } else {
                    dot.className = "h-2 w-2 rounded-full bg-gray-600";
                    matchName.innerText = "Next: DC vs MI";
                    matchScore.innerText = "Starts 3:30 PM IST";
                }
            } catch (e) { console.log("Live Score Sync Pending..."); }
        }

        async function updateData() {
            try {
                const [lbRes, pcRes, rosRes] = await Promise.all([
                    fetch(lbUrl + '&t=' + Date.now()), fetch(pcUrl + '&t=' + Date.now()), fetch(rosUrl + '&t=' + Date.now())
                ]);
                const lbRows = (await lbRes.text()).split('\n').slice(1);
                const pcRows = (await pcRes.text()).split('\n').slice(1);
                const rosRows = (await rosRes.text()).split('\n').slice(1);

                const masterRoster = {};
                rosRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 2) return;
                    const pName = c[0].replace(/"/g, '').trim();
                    const owner = c[1].replace(/"/g, '').trim().toLowerCase();
                    const mult = parseFloat(c[2].replace(/"/g, '')) || 1;
                    if (owner) {
                        if (!masterRoster[owner]) masterRoster[owner] = [];
                        masterRoster[owner].push({ name: pName, role: mult === 2 ? 'C' : mult === 1.5 ? 'VC' : '', pts: 0 });
                    }
                });

                pcRows.forEach(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length < 7) return;
                    const pName = c[1].replace(/"/g, '').trim();
                    const owner = c[2].replace(/"/g, '').trim().toLowerCase();
                    const pts = Math.round(parseFloat(c[6].replace(/"/g, '')) || 0);
                    if (owner && masterRoster[owner]) {
                        let pObj = masterRoster[owner].find(p => p.name === pName);
                        if (pObj) pObj.pts += pts;
                    }
                });

                let usPts = 0;
                const owners = lbRows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (!c[0]) return null;
                    const n = c[0].replace(/"/g, '').trim();
                    const s = Math.round(parseFloat(c[1].replace(/"/g, '')) || 0);
                    if (n.toLowerCase() === "unsold") { usPts = s; return null; }
                    return { displayName: n, cleanName: n.toLowerCase(), score: s };
                }).filter(o => o !== null).sort((a,b) => b.score - a.score);

                renderDashboard(owners, masterRoster, usPts);
            } catch (e) { console.error(e); }
        }

        function renderDashboard(owners, squads, unsold) {
            const pod = document.getElementById('podium-area');
            if (owners.length >= 3) {
                pod.innerHTML = `
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[9px] font-bold text-gray-500 mb-2 h-8 flex items-center uppercase text-center">${owners[1].displayName}</div>
                        <div class="w-full podium-pillar h-24 rounded-t-2xl flex flex-col justify-center items-center">
                            <span class="font-cyber text-xl font-bold">${owners[1].score}</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[10px] font-black gold-glow uppercase mb-2 h-8 flex items-center tracking-tighter text-center">${owners[0].displayName}</div>
                        <div class="w-full podium-pillar rank-1-pillar h-36 rounded-t-2xl flex flex-col justify-center items-center">
                            <span class="font-cyber text-2xl font-black gold-glow">${owners[0].score}</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-center w-1/3">
                        <div class="text-[9px] font-bold text-gray-600 mb-2 h-8 flex items-center uppercase text-center">${owners[2].displayName}</div>
                        <div class="w-full podium-pillar h-16 rounded-t-2xl flex flex-col justify-center items-center">
                            <span class="font-cyber text-lg font-bold text-gray-500">${owners[2].score}</span>
                        </div>
                    </div>`;
            }

            const lb = document.getElementById('leaderboard');
            lb.innerHTML = owners.map((o, i) => `
                <div class="glass-card overflow-hidden">
                    <div class="p-5 flex justify-between items-center cursor-pointer" onclick="toggleSection('sq-${i}')">
                        <div class="flex items-center gap-6">
                            <span class="font-cyber text-lg ${i < 3 ? 'gold-glow' : 'text-gray-700'}">${i+1}</span>
                            <span class="font-bold text-sm tracking-tighter uppercase">${o.displayName}</span>
                        </div>
                        <span class="text-xl font-cyber font-black ${i === 0 ? 'gold-glow' : ''}">${o.score}</span>
                    </div>
                    <div id="sq-${i}" class="squad-view">
                        ${(squads[o.cleanName] || []).sort((a,b)=>b.pts-a.pts).map(p => `
                            <div class="flex justify-between items-center text-[11px] py-1.5 border-b border-white/5">
                                <div class="flex items-center">
                                    <span class="${p.pts > 0 ? 'text-gray-300' : 'text-gray-600'} font-medium">${p.name}</span>
                                    ${p.role ? `<span class="badge font-cyber text-yellow-500 border border-yellow-500/30">${p.role}</span>` : ''}
                                </div>
                                <span class="font-cyber ${p.pts > 0 ? 'text-yellow-500' : 'text-gray-700'}">${p.pts}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`).join('');

            document.getElementById('unsold-total-val').innerText = unsold;
            const unsoldItems = squads["unsold"] || [];
            document.getElementById('unsold-items-list').innerHTML = unsoldItems.sort((a,b)=>b.pts-a.pts).map(p => `
                <div class="flex justify-between text-[10px] text-gray-600 py-1.5 border-b border-white/5">
                    <span>${p.name}</span>
                    <span class="font-cyber">${p.pts}</span>
                </div>
            `).join('') || '<div class="text-[10px] text-center py-4 italic text-gray-700">All players currently assigned.</div>';
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-view').forEach(s => s.classList.remove('open'));
            if (!isOpen) el.classList.add('open');
        }

        updateData();
        fetchLiveScores();
        setInterval(updateData, 60000);
        setInterval(fetchLiveScores, 30000);
    </script>
</body>
</html>
