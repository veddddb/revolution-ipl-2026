<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(17, 25, 40, 0.96); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #111827 0%, #030508 100%) no-repeat; background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 20px rgba(241, 196, 15, 0.6); }
        .glass-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 24px; transition: all 0.3s ease; }
        
        .squad-container { display: none; padding: 0 24px 24px 24px; border-top: 1px solid rgba(255,255,255,0.05); }
        .squad-container.open { display: block; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 900; border: 1px solid var(--accent); color: var(--accent); margin-left: 8px; }
        .role-tag { font-size: 8px; padding: 2px 5px; border-radius: 4px; background: rgba(255,255,255,0.05); color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-left: 5px; }
        .live-dot { height: 6px; width: 6px; background: #2ecc71; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-24">
        
        <header class="text-center mb-10 flex flex-col items-center">
            <h1 class="text-5xl font-black font-cyber gold-glow italic tracking-tighter mb-2 uppercase">REVOLUTION</h1>
            <p class="text-gray-500 text-[10px] font-bold tracking-[0.4em] uppercase mb-8 text-center">IPL 2026 OFFICIAL STANDINGS</p>
        </header>

        <div id="leaderboard" class="space-y-6">
            </div>

        <footer class="text-center py-16 opacity-20 font-cyber text-[8px] uppercase tracking-[0.5em]">
            Live Sync: Active • Data via Google Gemini Engine
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';

        async function fetchSheet(sheetName) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            return json.table.rows.map(row => row.c.map(cell => cell ? cell.v : ''));
        }

        async function updateApp() {
            try {
                const [lbData, rosData, lsData] = await Promise.all([
                    fetchSheet('Leaderboard'),
                    fetchSheet('Roster'),
                    fetchSheet('Livescore')
                ]);

                // 1. Get Live Player Names
                const activePlayers = lsData.slice(1).map(r => r[1]);

                // 2. Map Roster to Owners
                const squadMap = {};
                rosData.slice(1).forEach(row => {
                    const name = row[0];
                    const owner = row[1] ? row[1].toLowerCase().trim() : '';
                    const multiplier = parseFloat(row[2]) || 1;
                    const team = row[4] || '';
                    const role = row[6] || '';

                    if (owner) {
                        if (!squadMap[owner]) squadMap[owner] = [];
                        squadMap[owner].push({
                            name,
                            team,
                            role,
                            cvc: multiplier === 2 ? 'C' : multiplier === 1.5 ? 'VC' : '',
                            isLive: activePlayers.includes(name)
                        });
                    }
                });

                // 3. Process Leaderboard
                const owners = lbData.slice(1).map(row => ({
                    name: row[0],
                    score: Math.round(parseFloat(row[1])) || 0,
                    id: row[0].toLowerCase().trim()
                })).sort((a, b) => b.score - a.score);

                renderLeaderboard(owners, squadMap);

            } catch (e) {
                console.error("Data Sync Error:", e);
            }
        }

        function renderLeaderboard(owners, squads) {
            const container = document.getElementById('leaderboard');
            container.innerHTML = owners.map((o, i) => {
                const ownerSquad = squads[o.id] || [];
                const hasLive = ownerSquad.some(p => p.isLive);

                return `
                <div class="glass-card overflow-hidden">
                    <div class="p-6 flex justify-between items-center cursor-pointer active:opacity-80" onclick="toggleSquad('${o.id}')">
                        <div class="flex items-center gap-5">
                            <span class="font-cyber text-lg ${i < 3 ? 'gold-glow' : 'text-gray-600'}">#${i + 1}</span>
                            <div>
                                <span class="font-black text-sm uppercase tracking-widest block">${o.name}</span>
                                ${hasLive ? `<span class="text-[8px] text-green-500 font-bold uppercase flex items-center gap-1"><span class="live-dot"></span> Action Live</span>` : ''}
                            </div>
                        </div>
                        <span class="font-cyber text-2xl font-black italic">${o.score}</span>
                    </div>
                    
                    <div id="sq-${o.id}" class="squad-container">
                        <div class="space-y-3 pt-2">
                            ${ownerSquad.map(p => `
                                <div class="flex justify-between items-center py-2 border-b border-white/5 opacity-80">
                                    <div class="flex items-center">
                                        <span class="text-xs font-bold text-gray-200">${p.name}</span>
                                        <span class="role-tag">${p.role}</span>
                                        <span class="text-[8px] opacity-40 ml-2 uppercase font-bold">${p.team}</span>
                                        ${p.cvc ? `<span class="badge font-cyber">${p.cvc}</span>` : ''}
                                    </div>
                                    ${p.isLive ? `<span class="live-dot"></span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function toggleSquad(id) {
            const el = document.getElementById('sq-' + id);
            const all = document.querySelectorAll('.squad-container');
            const wasOpen = el.classList.contains('open');
            
            all.forEach(s => s.classList.remove('open'));
            if (!wasOpen) el.classList.add('open');
        }

        updateApp();
        setInterval(updateApp, 60000);
    </script>
</body>
</html>
