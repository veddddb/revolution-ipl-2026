<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: #e6edf3; font-family: 'Inter', sans-serif; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: #11141b; border: 1px solid #30363d; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass:hover { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241, 196, 15, 0.1); }
        .gold-glow { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.6); }
        .rank-gradient { background: linear-gradient(180deg, #f1c40f 0%, #b8860b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Smooth Accordion */
        .squad-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out, opacity 0.3s ease; opacity: 0; }
        .squad-active { max-height: 1000px; opacity: 1; padding: 16px; border-top: 1px solid #30363d; background: rgba(0,0,0,0.2); }
        
        .live-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black font-cyber gold-glow italic tracking-tighter">REVOLUTION</h1>
            <div class="flex justify-center items-center gap-2 mt-2">
                <span class="w-2 h-2 bg-green-500 rounded-full live-pulse"></span>
                <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em]">Live Feed • Season 2026</p>
            </div>
        </header>

        <div id="leaderboard" class="space-y-4">
            <div class="text-center py-20 text-gray-600 animate-pulse font-cyber">Syncing Satellite Data...</div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;

        async function init() {
            try {
                const [lbRes, pcRes] = await Promise.all([
                    fetch(lbUrl + '&cache=' + Date.now()), 
                    fetch(pcUrl + '&cache=' + Date.now())
                ]);
                const lbText = await lbRes.text();
                const pcText = await pcRes.text();

                // Process Leaderboard
                const lbRows = lbText.split('\n').slice(1);
                const owners = lbRows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        name: cols[0] ? cols[0].replace(/"/g, '').trim() : null,
                        total: cols[1] ? Math.round(parseFloat(cols[1].replace(/"/g, ''))) : 0
                    };
                }).filter(o => o.name).sort((a, b) => b.total - a.total);

                // Process Players
                const pcRows = pcText.split('\n').slice(1);
                const squads = {};
                pcRows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 7) return;
                    const pName = cols[1].replace(/"/g, '');
                    const owner = cols[2].replace(/"/g, '').trim();
                    const pts = parseFloat(cols[6].replace(/"/g, '')) || 0;
                    if (!owner || owner === "Unsold") return;
                    if (!squads[owner]) squads[owner] = {};
                    squads[owner][pName] = (squads[owner][pName] || 0) + pts;
                });

                render(owners, squads);
            } catch (e) {
                document.getElementById('leaderboard').innerHTML = `<div class="text-red-500 text-center font-cyber">CONNECTION LOST</div>`;
            }
        }

        function render(owners, squads) {
            const container = document.getElementById('leaderboard');
            container.innerHTML = owners.map((owner, i) => `
                <div class="glass rounded-2xl overflow-hidden shadow-2xl">
                    <div class="p-5 flex items-center justify-between cursor-pointer active:scale-95 transition" onclick="toggleSquad('${i}')">
                        <div class="flex items-center gap-5">
                            <span class="font-cyber text-2xl ${i === 0 ? 'rank-gradient' : 'text-gray-700'}">${i + 1}</span>
                            <span class="font-bold text-lg tracking-tight text-gray-200">${owner.name}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black font-cyber ${i === 0 ? 'gold-glow' : 'text-white'}">${owner.total}</span>
                        </div>
                    </div>
                    <div id="squad-${i}" class="squad-content space-y-3">
                        <div class="text-[10px] text-gray-500 uppercase tracking-widest font-bold mb-1">Squad Breakdown</div>
                        ${renderPlayers(squads[owner.name])}
                    </div>
                </div>
            `).join('');
        }

        function renderPlayers(players) {
            if (!players || Object.keys(players).length === 0) return '<div class="text-xs text-gray-600 italic">No points deployed yet</div>';
            return Object.entries(players)
                .sort((a, b) => b[1] - a[1])
                .map(([name, pts]) => `
                    <div class="flex justify-between items-center text-sm group">
                        <span class="text-gray-400 group-hover:text-white transition">${name}</span>
                        <span class="font-bold text-gray-300 font-cyber text-[12px]">${Math.round(pts)}</span>
                    </div>
                `).join('');
        }

        function toggleSquad(id) {
            const el = document.getElementById(`squad-${id}`);
            const isActive = el.classList.contains('squad-active');
            
            // Close all others
            document.querySelectorAll('.squad-content').forEach(s => s.classList.remove('squad-active'));
            
            // If it wasn't active, open it
            if (!isActive) {
                el.classList.add('squad-active');
            }
        }

        init();
        setInterval(init, 60000); // 60s Refresh
    </script>
</body>
</html>
