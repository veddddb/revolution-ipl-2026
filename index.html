<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION IPL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f1c40f; --glass: rgba(17, 25, 40, 0.85); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top, #111827 0%, #030508 100%) no-repeat; background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .gold-glow { color: var(--accent); text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .glass-card { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 24px; }
        .tab-btn { padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; border: 1px solid var(--border); background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .podium-pillar { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.8) 100%); border-top: 2px solid var(--border); transition: height 1s ease; }
        .rank-1-pillar { border-top-color: var(--accent); box-shadow: 0 -15px 40px rgba(241, 196, 15, 0.15); }
        .squad-view { max-height: 0; overflow: hidden; transition: all 0.5s ease; opacity: 0; }
        .squad-view.open { max-height: 2000px; opacity: 1; padding: 15px 20px; border-top: 1px solid var(--border); }
        .badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 6px; background: rgba(241, 196, 15, 0.15); border: 1px solid rgba(241, 196, 15, 0.3); color: var(--accent); }
        .role-tag { font-size: 7px; padding: 1px 4px; border-radius: 3px; background: rgba(255, 255, 255, 0.05); color: #94a3b8; text-transform: uppercase; margin-left: 5px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); }
        .live-dot { height: 8px; width: 8px; background: #ef4444; border-radius: 50%; display: inline-block; position: relative; }
        .live-dot::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; background: #ef4444; animation: live-pulse 2s infinite; }
        @keyframes live-pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        .impact-glow { color: #f1c40f !important; font-weight: 900 !important; text-shadow: 0 0 12px rgba(241, 196, 15, 0.9); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto pb-20">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black font-cyber gold-glow italic tracking-tighter mb-2 uppercase">REVOLUTION</h1>
            <div class="flex justify-center gap-2 mt-4">
                <button onclick="switchTab('main')" id="btn-main" class="tab-btn active">Live Ranks</button>
                <button onclick="switchTab('strategy')" id="btn-strat" class="tab-btn">Strategic Insights</button>
            </div>
        </header>

        <div id="live-ticker" class="glass-card mb-10 p-6 border-l-4 border-yellow-500 relative">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <div id="status-indicator" class="h-2 w-2 rounded-full bg-gray-600"></div>
                    <span id="live-label" class="font-cyber text-[8px] text-gray-500 uppercase tracking-widest">Standby</span>
                </div>
                <div id="match-venue" class="text-[9px] font-bold text-gray-500 uppercase tracking-tighter text-right">Venue Syncing...</div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col items-center w-1/3 text-center">
                    <div class="w-12 h-12 rounded-full bg-blue-600/20 border border-blue-500/30 flex items-center justify-center overflow-hidden relative">
                        <span id="local-code" class="absolute font-black text-[10px] text-blue-400">HOME</span>
                        <img id="local-logo" src="" onerror="this.style.opacity='0'" class="w-full h-full object-contain relative z-20">
                    </div>
                    <span id="local-name" class="mt-2 font-black text-[10px] uppercase text-gray-500 tracking-tighter">HOME TEAM</span>
                </div>
                <div class="text-center w-1/3">
                    <div id="live-score" class="font-cyber text-2xl font-black gold-glow mb-1 italic">IPL 2026</div>
                    <div id="live-overs" class="text-[10px] font-bold text-gray-500 tracking-widest">Awaiting Toss</div>
                </div>
                <div class="flex flex-col items-center w-1/3 text-center">
                    <div class="w-12 h-12 rounded-full bg-blue-900/20 border border-blue-800/30 flex items-center justify-center overflow-hidden relative">
                        <span id="visitor-code" class="absolute font-black text-[10px] text-blue-700">AWAY</span>
                        <img id="visitor-logo" src="" onerror="this.style.opacity='0'" class="w-full h-full object-contain relative z-20">
                    </div>
                    <span id="visitor-name" class="mt-2 font-black text-[10px] uppercase text-gray-500 tracking-tighter">AWAY TEAM</span>
                </div>
            </div>
        </div>

        <div id="view-main">
            <div id="podium-area" class="flex justify-center items-end gap-3 mb-14 h-48 text-center"></div>
            <div id="leaderboard" class="space-y-4"></div>
            <div id="unsold-container" class="mt-12 glass-card overflow-hidden opacity-60">
                <div class="p-4 flex justify-between items-center cursor-pointer" onclick="toggleSection('sq-unsold')">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400 italic">Unsold Player Pool</span>
                    </div>
                    <span id="unsold-total-val" class="font-cyber text-sm text-gray-600">0</span>
                </div>
                <div id="sq-unsold" class="squad-view">
                    <div id="unsold-items-list" class="space-y-1"></div>
                </div>
            </div>
        </div>

        <div id="view-strategy" class="hidden space-y-6">
            <div class="glass-card p-6 border-b-2 border-yellow-500/30">
                <h3 class="font-cyber text-xs gold-glow uppercase mb-2 tracking-widest">The Season Perfectionist Table</h3>
                <p class="text-[9px] text-gray-400 italic mb-6 uppercase tracking-tighter">Ranking based on optimal Season-long C/VC picks from Column F.</p>
                <div id="strategy-list" class="space-y-4"></div>
            </div>
        </div>

        <footer class="text-center py-10 opacity-30 mt-10">
            <p class="font-cyber text-[9px] uppercase tracking-[0.5em]">Dashboard by Vedant Bhansali</p>
        </footer>
    </div>

    <script>
        const SHEET_ID = '1xIRCNr0tteFfMk6l7inIkKeSJMb7WLBswsXepHRqjio';
        const SEASON_ID = '1795';
        const lbUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Leaderboard`;
        const pcUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=PointsCalc`;
        const rosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Roster`;

        let activePlayers = [];

        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                const result = [];
                let current = '', inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    if (line[i] === '"') inQuotes = !inQuotes;
                    else if (line[i] === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                    else current += line[i];
                }
                result.push(current.trim());
                return result;
            }).filter(row => row.length > 1);
        }

        function switchTab(tab) {
            document.getElementById('view-main').style.display = tab === 'main' ? 'block' : 'none';
            document.getElementById('view-strategy').style.display = tab === 'strategy' ? 'block' : 'none';
            document.getElementById('btn-main').classList.toggle('active', tab === 'main');
            document.getElementById('btn-strat').classList.toggle('active', tab === 'strategy');
        }

        async function fetchLiveScores() {
            try {
                const response = await fetch('/api/livescore');
                const json = await response.json();
                const matches = (json.data && Array.isArray(json.data)) ? json.data.filter(m => m.season_id == SEASON_ID) : [];
                const iplMatch = matches.length > 0 ? matches[matches.length - 1] : null;
                if (iplMatch) {
                    document.getElementById('match-venue').innerText = iplMatch.venue?.data?.name || "Arun Jaitley Stadium";
                    document.getElementById('local-name').innerText = iplMatch.localteam?.name || "Delhi";
                    document.getElementById('visitor-name').innerText = iplMatch.visitorteam?.name || "Mumbai";
                    document.getElementById('local-code').innerText = iplMatch.localteam?.code || "DC";
                    document.getElementById('visitor-code').innerText = iplMatch.visitorteam?.code || "MI";

                    if (iplMatch.status === "Live" || iplMatch.status === "Innings Break") {
                        document.getElementById('status-indicator').className = "live-dot";
                        document.getElementById('live-label').innerText = "Live Now";
                        document.getElementById('live-label').style.color = "#ef4444";
                        activePlayers = [];
                        if (iplMatch.batting) iplMatch.batting.forEach(b => activePlayers.push(b.player?.data?.fullname));
                        if (iplMatch.bowling) iplMatch.bowling.forEach(bw => activePlayers.push(bw.player?.data?.fullname));
                        if (iplMatch.localteam?.image_path) document.getElementById('local-logo').src = iplMatch.localteam.image_path;
                        if (iplMatch.visitorteam?.image_path) document.getElementById('visitor-logo').src = iplMatch.visitorteam.image_path;
                        const score = iplMatch.runs ? iplMatch.runs[0] : null;
                        if (score) {
                            document.getElementById('live-score').innerText = `${score.score}/${score.wickets}`;
                            document.getElementById('live-overs').innerText = `(${score.overs} ov)`;
                        }
                    }
                }
            } catch (e) { console.log("Live Score Sync Error"); }
        }

        async function updateData() {
            try {
                const [lbData, pcData, rosData] = await Promise.all([
                    fetch(lbUrl + '&t=' + Date.now()).then(r => r.text()),
                    fetch(pcUrl + '&t=' + Date.now()).then(r => r.text()),
                    fetch(rosUrl + '&t=' + Date.now()).then(r => r.text())
                ]);

                const lbRows = parseCSV(lbData).slice(1);
                const pcRows = parseCSV(pcData).slice(1);
                const rosRows = parseCSV(rosData).slice(1);

                const masterRoster = {};
                rosRows.forEach(c => {
                    const name = c[0], owner = c[1]?.toLowerCase(), team = c[4] || "", type = c[6] || "", mult = parseFloat(c[2]) || 1;
                    if (owner) {
                        if (!masterRoster[owner]) masterRoster[owner] = [];
                        masterRoster[owner].push({ name, role: mult === 2 ? 'C' : mult === 1.5 ? 'VC' : '', pts: 0, rawTotal: 0, team, type });
                    }
                });

                pcRows.forEach(c => {
                    const name = c[1], owner = c[2]?.toLowerCase();
                    const actualPts = Math.round(parseFloat(c[6])) || 0; // Col G
                    const rawPts = Math.round(parseFloat(c[5])) || 0;    // Col F (Pure points)
                    if (owner && masterRoster[owner]) {
                        let p = masterRoster[owner].find(x => x.name === name);
                        if (p) {
                            p.pts += actualPts;
                            p.rawTotal += rawPts; // CRITICAL: This is the only place rawTotal is built
                        }
                    }
                });

                let usTotalScore = 0;
                const owners = lbRows.map(c => {
                    const n = c[0], s = Math.round(parseFloat(c[1])) || 0;
                    if (n?.toLowerCase() === 'unsold') { usTotalScore = s; return null; }
                    return { displayName: n, cleanName: n?.toLowerCase(), score: s };
                }).filter(o => o !== null).sort((a,b) => b.score - a.score);

                renderDashboard(owners, masterRoster, usTotalScore);
            } catch (e) { console.error("Leaderboard Sync Error", e); }
        }

        function renderDashboard(owners, squads, unsoldPts) {
            // Podium
            const pod = document.getElementById('podium-area');
            if (owners.length >= 3) {
                pod.innerHTML = `
                    <div class="flex flex-col items-center w-1/3"><div class="text-[9px] mb-2 uppercase">${owners[1].displayName}</div><div class="w-full podium-pillar h-24 rounded-t-2xl flex flex-col justify-center items-center text-gray-400 border border-white/5"><span class="font-cyber text-xl font-bold">${owners[1].score}</span></div></div>
                    <div class="flex flex-col items-center w-1/3"><div class="text-[10px] gold-glow mb-2 uppercase font-black">${owners[0].displayName}</div><div class="w-full podium-pillar rank-1-pillar h-36 rounded-t-2xl flex flex-col justify-center items-center"><span class="font-cyber text-2xl font-black gold-glow">${owners[0].score}</span></div></div>
                    <div class="flex flex-col items-center w-1/3"><div class="text-[9px] mb-2 text-gray-600 uppercase">${owners[2].displayName}</div><div class="w-full podium-pillar h-16 rounded-t-2xl flex flex-col justify-center items-center text-gray-600 border border-white/5"><span class="font-cyber text-lg font-bold">${owners[2].score}</span></div></div>`;
            }

            // Main Leaderboard
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = owners.map((o, i) => `
                <div class="glass-card overflow-hidden">
                    <div class="p-5 flex justify-between items-center cursor-pointer" onclick="toggleSection('sq-${i}')">
                        <div class="flex items-center gap-6"><span class="font-cyber text-lg ${i < 3 ? 'gold-glow' : 'text-gray-700'}">${i+1}</span><span class="font-bold text-sm tracking-widest uppercase">${o.displayName}</span></div>
                        <span class="text-xl font-cyber font-black ${i === 0 ? 'gold-glow' : ''}">${o.score}</span>
                    </div>
                    <div id="sq-${i}" class="squad-view">
                        ${(squads[o.cleanName] || []).sort((a,b)=>b.pts-a.pts).map((p, idx) => {
                            const isLive = activePlayers.some(name => name && name.includes(p.name));
                            return `<div class="flex justify-between items-center text-[11px] py-1.5 border-b border-white/5">
                                <div class="flex items-center"><span class="text-[9px] font-bold text-gray-500 mr-2 w-4">${idx+1}.</span><span class="${isLive ? 'impact-glow' : (p.pts > 0 ? 'text-gray-300' : 'text-gray-600')} font-medium">${p.name} (${p.team})</span>${p.type ? `<span class="role-tag">${p.type}</span>` : ''}${p.role ? `<span class="badge font-cyber">${p.role}</span>` : ''}${isLive ? `<span class="ml-2 h-1.5 w-1.5 rounded-full bg-yellow-500 animate-ping"></span>` : ''}</div>
                                <span class="font-cyber ${p.pts > 0 ? 'text-yellow-500' : 'text-gray-700'}">${p.pts}</span>
                            </div>`}).join('')}
                    </div>
                </div>`).join('');

            // FIXED STRATEGY TAB (Sorting + Column F logic)
            const stratData = owners.map(o => {
                const s = squads[o.cleanName] || [];
                const sortedRaw = [...s].sort((a,b) => b.rawTotal - a.rawTotal);
                const top1 = sortedRaw[0], top2 = sortedRaw[1];
                let potential = 0;
                s.forEach(p => {
                    if (top1 && p.name === top1.name) potential += (p.rawTotal * 2);
                    else if (top2 && p.name === top2.name) potential += (p.rawTotal * 1.5);
                    else potential += p.rawTotal;
                });
                return { name: o.displayName, potential: Math.round(potential), current: o.score, t1: top1?.name || '--', t2: top2?.name || '--' };
            }).sort((a, b) => b.potential - a.potential); // Sort by potential

            document.getElementById('strategy-list').innerHTML = stratData.map((d, i) => {
                const diff = d.potential - d.current;
                return `<div class="p-4 rounded-xl bg-white/5 border border-white/5 mb-3 flex justify-between items-center">
                    <div class="flex items-center gap-4"><span class="font-cyber text-xs text-gray-600">${i + 1}</span>
                    <div><p class="text-[11px] font-black uppercase tracking-widest">${d.name}</p>
                    <div class="flex gap-2 mt-1"><span class="text-[8px] text-blue-500 font-bold uppercase">C: ${d.t1}</span><span class="text-[8px] text-purple-500 font-bold uppercase">VC: ${d.t2}</span></div></div></div>
                    <div class="text-right"><p class="font-cyber text-sm gold-glow">${d.potential}</p><p class="text-[8px] uppercase font-black ${diff > 0 ? 'text-green-500' : 'text-gray-600'}">${diff > 0 ? `+${diff} Possible` : 'Perfect Setup'}</p></div>
                </div>`;
            }).join('');

            // Unsold Pool
            document.getElementById('unsold-total-val').innerText = unsoldPts;
            const unsoldPlayers = squads['unsold'] || [];
            document.getElementById('unsold-items-list').innerHTML = unsoldPlayers.sort((a,b)=>b.pts-a.pts).map((p, idx) => `
                <div class="flex justify-between items-center text-[11px] py-1.5 border-b border-white/5 opacity-80">
                    <div class="flex items-center"><span class="text-[9px] font-bold text-gray-700 mr-2 w-4">${idx+1}.</span><span class="text-gray-400 font-medium">${p.name} (${p.team})</span>${p.type ? `<span class="role-tag">${p.type}</span>` : ''}</div>
                    <span class="font-cyber text-gray-500">${p.pts}</span>
                </div>`).join('') || '<div class="text-[10px] text-center py-4 italic text-gray-700">All players assigned.</div>';
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.squad-view').forEach(s => s.classList.remove('open'));
            if (!isOpen) el.classList.add('open');
        }

        updateData(); fetchLiveScores();
        setInterval(updateData, 60000); setInterval(fetchLiveScores, 15000);
    </script>
</body>
</html>
